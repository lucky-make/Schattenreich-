<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Schattenreich: The Shadow Language</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06001a;--bg2:#0d0028;--bg3:#12003a;
  --gold:#c9a84c;--gold2:#e8c97a;--cream:#f0e6d3;
  --slate:#7b8ca8;--dim:#4a5568;
  --green:#3d8b5e;--green2:#52c47a;
  --red:#8b1a2a;--red2:#c0392b;
  --purple:#2d1b54;--purple2:#4a2d7a;
  --r:8px;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:15px;
  line-height:1.5;
}
#root{height:100%;overflow:hidden}
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:radial-gradient(ellipse at 30% 20%,#1a0a3e 0%,#06001a 70%);
  overflow:hidden;
}
/* HUD */
.hud{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid rgba(201,168,76,0.2);
  flex-shrink:0;
  backdrop-filter:blur(10px);
}
.hud-level{
  font-family:'Cinzel',serif;
  font-size:11px;color:var(--gold);
  border:1px solid var(--gold);
  padding:2px 8px;border-radius:4px;
  white-space:nowrap;
}
.hud-xp{flex:1;position:relative;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.hud-xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width 0.5s}
.hud-stat{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:500;white-space:nowrap}
.hud-stat span{font-size:16px}
/* SCREEN WRAPPER */
.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px;
  -webkit-overflow-scrolling:touch;
}
/* START SCREEN */
.start-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;text-align:center;gap:24px;padding:32px 16px;
}
.start-logo{
  font-family:'Cinzel',serif;font-size:32px;font-weight:700;
  color:var(--gold2);
  text-shadow:0 0 40px rgba(201,168,76,0.5);
  letter-spacing:2px;
}
.start-sub{font-family:'EB Garamond',serif;font-size:18px;color:var(--slate);font-style:italic}
.fox-svg{width:80px;height:80px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.4))}
.start-desc{max-width:320px;color:var(--slate);font-size:14px;line-height:1.7}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 28px;border-radius:var(--r);border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:500;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
  outline:none;
}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0a00;font-weight:600}
.btn-gold:active{transform:scale(0.96)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,0.4)}
.btn-outline:active{background:rgba(201,168,76,0.1)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-danger{background:var(--red2);color:white}
/* CARDS */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:12px;padding:16px;margin-bottom:12px;
}
.card-title{
  font-family:'Cinzel',serif;font-size:14px;
  color:var(--gold);letter-spacing:1px;margin-bottom:8px;
}
/* WORLD MAP */
.map-header{text-align:center;padding:8px 0 16px}
.map-header h2{font-family:'Cinzel',serif;font-size:20px;color:var(--gold)}
.map-header p{color:var(--slate);font-size:13px;margin-top:4px}
.map-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.zone-node{
  aspect-ratio:1;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;border:1px solid transparent;
  transition:all 0.2s;position:relative;
  -webkit-tap-highlight-color:transparent;
  font-size:20px;
  overflow:hidden;
}
.zone-node.locked{opacity:0.3;cursor:default;filter:grayscale(1)}
.zone-node.completed{border-color:var(--gold)!important}
.zone-node.completed::after{
  content:'✓';position:absolute;top:4px;right:6px;
  font-size:10px;color:var(--gold);font-weight:700;
}
.zone-node:not(.locked):active{transform:scale(0.93)}
.zone-num{font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px}
/* ZONE VIEW */
.zone-header{text-align:center;margin-bottom:20px}
.zone-emoji{font-size:40px;margin-bottom:8px}
.zone-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);margin-bottom:4px}
.zone-subtitle{color:var(--slate);font-size:13px}
.zone-level-badge{
  display:inline-block;
  background:var(--purple);border:1px solid var(--purple2);
  padding:3px 10px;border-radius:20px;font-size:11px;
  color:var(--gold);font-family:'Cinzel',serif;
  margin-top:6px;
}
.grammar-box{
  background:rgba(45,27,84,0.4);border:1px solid rgba(74,45,122,0.5);
  border-radius:10px;padding:14px;margin-bottom:16px;
}
.grammar-box h3{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:8px}
.grammar-rule{font-size:13px;color:var(--slate);margin-bottom:6px}
.grammar-rule strong{color:var(--cream);font-style:italic;font-family:'EB Garamond',serif;font-size:15px}
/* TRIALS */
.trial-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.trial-item{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:12px 14px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all 0.2s;
}
.trial-item.done{border-color:rgba(61,139,94,0.5);background:rgba(61,139,94,0.08)}
.trial-item:active{transform:scale(0.98)}
.trial-icon{font-size:22px;flex-shrink:0}
.trial-info{flex:1}
.trial-name{font-weight:500;font-size:14px;color:var(--cream)}
.trial-desc{font-size:12px;color:var(--dim);margin-top:2px}
.trial-check{color:var(--green2);font-size:18px}
/* BOSS */
.boss-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#3d0000,#8b0000);
  border:1px solid rgba(192,57,43,0.5);
  border-radius:12px;color:white;
  font-family:'Cinzel',serif;font-size:15px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all 0.2s;
}
.boss-btn:disabled{opacity:0.4;cursor:default}
.boss-btn:not(:disabled):active{transform:scale(0.98)}
/* VOCAB TRIAL */
.flashcard{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(201,168,76,0.2);
  border-radius:16px;padding:28px 20px;
  text-align:center;margin-bottom:20px;
}
.flashcard-de{
  font-family:'EB Garamond',serif;font-size:32px;
  color:var(--cream);font-style:italic;margin-bottom:4px;
}
.flashcard-article{font-size:14px;color:var(--gold);margin-bottom:8px;font-style:normal;font-family:'Inter',sans-serif}
.flashcard-en{color:var(--slate);font-size:16px;margin-bottom:12px}
.flashcard-ex{
  font-family:'EB Garamond',serif;font-style:italic;
  color:var(--dim);font-size:14px;
  border-top:1px solid rgba(255,255,255,0.06);
  padding-top:10px;margin-top:4px;
}
.speak-btn{
  background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);padding:6px 16px;border-radius:20px;
  font-size:13px;cursor:pointer;margin-top:8px;
  -webkit-tap-highlight-color:transparent;
}
/* QUIZ */
.quiz-question{
  font-family:'EB Garamond',serif;font-size:22px;
  font-style:italic;text-align:center;
  color:var(--cream);margin-bottom:20px;padding:16px;
  background:rgba(255,255,255,0.04);border-radius:10px;
}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{
  padding:14px 16px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-size:15px;text-align:left;color:var(--cream);
  transition:all 0.15s;
}
.quiz-opt:active:not(.correct):not(.wrong){background:rgba(255,255,255,0.1)}
.quiz-opt.correct{background:rgba(61,139,94,0.25);border-color:var(--green2);color:var(--green2)}
.quiz-opt.wrong{background:rgba(139,26,42,0.25);border-color:var(--red2);color:var(--red2)}
/* PROGRESS */
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width 0.3s}
.trial-header{
  font-family:'Cinzel',serif;font-size:13px;
  color:var(--gold);letter-spacing:1px;text-align:center;
  margin-bottom:16px;
}
/* SENTENCE TRIAL */
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;min-height:48px}
.word-chip{
  padding:8px 14px;border-radius:20px;
  background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);font-size:14px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
  font-family:'EB Garamond',serif;font-style:italic;font-size:16px;
}
.word-chip:active{transform:scale(0.95)}
.word-chip.used{opacity:0.3;cursor:default}
.answer-zone{
  min-height:52px;background:rgba(255,255,255,0.04);
  border:1px dashed rgba(201,168,76,0.2);border-radius:10px;
  padding:10px;display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:16px;
}
.answer-chip{
  padding:6px 12px;border-radius:16px;
  background:rgba(74,45,122,0.4);border:1px solid var(--purple2);
  color:var(--cream);font-size:14px;cursor:pointer;
  font-family:'EB Garamond',serif;font-style:italic;font-size:16px;
  -webkit-tap-highlight-color:transparent;
}
/* LISTENING */
.listen-input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;color:var(--cream);
  font-size:16px;font-family:'EB Garamond',serif;
  outline:none;resize:none;
  -webkit-appearance:none;
}
.listen-input:focus{border-color:rgba(201,168,76,0.4)}
.diff-result{
  font-family:'EB Garamond',serif;font-size:18px;
  padding:12px;background:rgba(255,255,255,0.04);border-radius:8px;
}
.diff-correct{color:var(--green2)}
.diff-wrong{color:var(--red2);text-decoration:underline}
/* RESULT */
.result-screen{text-align:center;padding:32px 16px;display:flex;flex-direction:column;align-items:center;gap:20px}
.result-icon{font-size:64px}
.result-title{font-family:'Cinzel',serif;font-size:24px;color:var(--gold)}
.result-score{font-size:48px;font-weight:700;color:var(--cream)}
.result-rewards{display:flex;gap:24px;justify-content:center}
.result-reward{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:13px;color:var(--slate)}
.result-reward strong{font-size:20px;color:var(--cream)}
/* BOSS BATTLE */
.boss-arena{text-align:center;padding:8px 0 16px}
.boss-hp{height:10px;background:rgba(139,26,42,0.3);border-radius:5px;margin:12px 0;overflow:hidden}
.boss-hp-fill{height:100%;background:linear-gradient(90deg,#8b1a2a,#c0392b);transition:width 0.5s}
.timer-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:12px;overflow:hidden}
.timer-fill{height:100%;background:var(--gold);transition:width 1s linear}
/* RECAP */
.recap-screen{padding:16px}
.recap-header{text-align:center;margin-bottom:20px}
.recap-header h2{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);margin-bottom:4px}
.recap-header p{color:var(--slate);font-size:13px}
/* VAULT / SHOP */
.vault-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.vault-item{
  aspect-ratio:1;border-radius:10px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:28px;gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all 0.2s;
}
.vault-item.owned{border-color:var(--gold);background:rgba(201,168,76,0.08)}
.vault-item:active{transform:scale(0.95)}
.vault-item-name{font-size:9px;color:var(--slate);text-align:center}
.vault-item-cost{font-size:10px;color:var(--gold)}
/* BERTRAM */
.bertram{
  position:fixed;bottom:80px;right:16px;
  display:flex;align-items:flex-end;gap:8px;
  z-index:10;pointer-events:none;
}
.bertram-bubble{
  background:rgba(13,0,40,0.95);
  border:1px solid rgba(201,168,76,0.3);
  border-radius:12px 12px 0 12px;
  padding:10px 14px;font-size:13px;
  color:var(--cream);max-width:200px;
  font-family:'EB Garamond',serif;font-style:italic;
  line-height:1.4;
}
.bertram-fox{font-size:32px;flex-shrink:0}
/* BACK BTN */
.back-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{
  background:transparent;border:none;color:var(--slate);
  font-size:20px;cursor:pointer;padding:4px;
  -webkit-tap-highlight-color:transparent;
}
/* WRITING TRIAL */
.writing-prompt{
  font-family:'EB Garamond',serif;font-size:18px;
  font-style:italic;color:var(--cream);
  padding:14px;background:rgba(255,255,255,0.04);
  border-radius:10px;margin-bottom:12px;
}
.model-answer{
  padding:12px;background:rgba(61,139,94,0.12);
  border:1px solid rgba(61,139,94,0.3);border-radius:8px;
  font-family:'EB Garamond',serif;font-style:italic;font-size:16px;
  color:var(--green2);margin-bottom:10px;
}
/* SETTINGS */
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);
}
.settings-label{font-size:15px;color:var(--cream)}
.settings-sublabel{font-size:12px;color:var(--dim);margin-top:2px}
.toggle{
  width:44px;height:24px;border-radius:12px;
  background:rgba(255,255,255,0.1);border:none;cursor:pointer;
  position:relative;transition:background 0.2s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.toggle.on{background:var(--green)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:20px;height:20px;border-radius:50%;background:white;
  transition:transform 0.2s;
}
.toggle.on::after{transform:translateX(20px)}
/* STREAK */
.streak-flame{font-size:20px}
/* TABS */
.tab-bar{
  display:flex;border-bottom:1px solid rgba(255,255,255,0.08);
  margin-bottom:16px;
}
.tab{
  flex:1;padding:10px;text-align:center;
  font-size:12px;color:var(--slate);cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* MISC */
.section-title{
  font-family:'Cinzel',serif;font-size:13px;
  color:var(--gold);letter-spacing:1px;
  margin-bottom:12px;
}
.empty{text-align:center;color:var(--dim);padding:40px 0;font-size:14px}
.tag{
  display:inline-block;padding:2px 8px;border-radius:4px;
  font-size:11px;font-family:'Cinzel',serif;
}
.tag-a1{background:rgba(61,139,94,0.2);color:var(--green2)}
.tag-a2{background:rgba(74,45,122,0.3);color:#9b7fd4}
.tag-b1{background:rgba(201,168,76,0.15);color:var(--gold)}
.tag-b2{background:rgba(139,26,42,0.25);color:#e07070}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useReducer, useRef, useCallback, useMemo } = React;

// ─── VOCAB DATA ───────────────────────────────────────────────────────────────
const VOCAB = {
  greetings:[
    {de:"Hallo",en:"Hello",article:null,example:"Hallo! Wie geht's?"},

  ],
  family:[
    {de:"die Mutter",en:"mother",article:"die",example:"Meine Mutter kocht sehr gut."},
    {de:"der Vater",en:"father",article:"der",example:"Mein Vater arbeitet im Büro."},
    {de:"die Schwester",en:"sister",article:"die",example:"Meine Schwester ist Ärztin."},
    {de:"der Bruder",en:"brother",article:"der",example:"Mein Bruder spielt gern Fußball."},
    {de:"die Großmutter",en:"grandmother",article:"die",example:"Meine Großmutter backt leckere Kuchen."},
    {de:"der Großvater",en:"grandfather",article:"der",example:"Mein Großvater erzählt Geschichten."},
    {de:"die Eltern",en:"parents",article:"die",example:"Meine Eltern wohnen in Berlin."},
    {de:"das Kind",en:"child",article:"das",example:"Das Kind spielt im Garten."},
    {de:"die Familie",en:"family",article:"die",example:"Meine Familie ist sehr groß."},
    {de:"der Mann",en:"man / husband",article:"der",example:"Mein Mann kocht heute Abend."},
    {de:"die Frau",en:"woman / wife",article:"die",example:"Meine Frau ist Lehrerin."},
    {de:"die Tante",en:"aunt",article:"die",example:"Meine Tante wohnt in München."},

const shuffle = arr => [...arr].sort(()=>Math.random()-0.5);
const pick = (arr,n) => shuffle(arr).slice(0,n);
const getVocab = (zone) => {
  const pool=[];
  zone.vocab.forEach(theme=>{
    if(VOCAB[theme]) pool.push(...VOCAB[theme]);
  });
  return pool.length ? pool : VOCAB.greetings;
};

// TTS
let speechVoice=null;
const loadVoice=()=>{
  const voices=window.speechSynthesis?.getVoices()||[];
  speechVoice=voices.find(v=>v.lang.startsWith('de-'))||voices.find(v=>v.lang.startsWith('de'))||null;
};
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=loadVoice;
  loadVoice();
}
const speak=(text)=>{
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.85; u.pitch=1.1;
  if(speechVoice) u.voice=speechVoice;
  window.speechSynthesis.speak(u);
};

const initialState={
  screen:'start', currentZone:1, completedTrials:{}, bossDefeated:{},
  xp:0, gold:0, level:1, streak:0, recapCompleted:{}, artifacts:[],
  settings:{sound:true, difficulty:'normal'},
  currentTrial:null,
};
const XP_PER_LEVEL=500;

function reducer(state,action){
  switch(action.type){
    case 'LOAD': return {...initialState,...action.payload,screen:'map'};
    case 'START': return {...state,screen:'map'};
    case 'GOTO_MAP': return {...state,screen:'map',currentTrial:null};
    case 'GOTO_ZONE': {
      const z=action.zoneId;
      if(z>1&&!state.bossDefeated[z-1]) return state;
      return {...state,currentZone:z,screen:'zone',currentTrial:null};
    }
    case 'GOTO_TRIAL': return {...state,screen:'trial',currentTrial:action.trial};
    case 'COMPLETE_TRIAL': {
      const ct={...state.completedTrials};
      const key=`${state.currentZone}_${action.trial}`;
      ct[key]=true;
      const xp=state.xp+action.xp;
      const gold=state.gold+action.gold;
      const level=Math.floor(xp/XP_PER_LEVEL)+1;
      return {...state,completedTrials:ct,xp,gold,level,screen:'zone',currentTrial:null};
    }
    case 'DEFEAT_BOSS': {
      const bd={...state.bossDefeated,[state.currentZone]:true};
      return {...state,bossDefeated:bd,xp:state.xp+200,gold:state.gold+150,screen:'zone'};
    }
    case 'COMPLETE_RECAP': {
      const rc={...state.recapCompleted,[state.currentZone]:true};
      return {...state,recapCompleted:rc};
    }
    case 'BUY_ARTIFACT': {
      if(state.gold<action.cost) return state;
      return {...state,gold:state.gold-action.cost,artifacts:[...state.artifacts,action.id]};
    }
    case 'UPDATE_SETTINGS': return {...state,settings:{...state.settings,...action.settings}};
    case 'RESET': return initialState;
    default: return state;
  }
}

// ─── LEXICON TRIAL ─────────────────────────────────────────────────────────────
function LexiconTrial({zone,dispatch}){
  const vocab=useMemo(()=>pick(getVocab(zone),10),[zone.id]);
  const [phase,setPhase]=useState('study'); // study | quiz
  const [idx,setIdx]=useState(0);
  const [score,setScore]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [quizQ,setQuizQ]=useState(null);

  const allVocab=getVocab(zone);

  const makeQuestion=(word,all)=>{
    const wrongs=shuffle(all.filter(w=>w.en!==word.en)).slice(0,3);
    const opts=shuffle([word,...wrongs]);
    return {word,opts,correct:opts.indexOf(word)};
  };

  const [quizWords]=useState(()=>pick(getVocab(zone),8));
  const [quizIdx,setQuizIdx]=useState(0);
  const [quizChosen,setQuizChosen]=useState(null);
  const [quizScore,setQuizScore]=useState(0);
  const [done,setDone]=useState(false);

  const currentQ=useMemo(()=>{
    if(phase!=='quiz'||quizIdx>=quizWords.length) return null;
    return makeQuestion(quizWords[quizIdx],allVocab);
  },[quizIdx,phase]);

  const answerQ=(i)=>{
    if(quizChosen!==null) return;
    setQuizChosen(i);
    if(i===currentQ.correct){
      setQuizScore(s=>s+1);
      if(zone.id&&window.speechSynthesis) speak(currentQ.word.de);
    }
    setTimeout(()=>{
      if(quizIdx+1>=quizWords.length) setDone(true);
      else{setQuizIdx(q=>q+1);setQuizChosen(null);}
    },800);
  };

  if(done){
    return (
      <ResultScreen
        icon="📖" title="Lexikon-Keller" score={quizScore} total={quizWords.length}
        xp={quizScore*15} gold={quizScore*5}
        onContinue={()=>dispatch({type:'COMPLETE_TRIAL',trial:'lexicon',xp:quizScore*15,gold:quizScore*5})}
      />
    );
  }

  if(phase==='study'){
    const word=vocab[idx];
    return (
      <div className="fade-in">
        <div className="trial-header">📖 LEXIKON-KELLER</div>
        <div className="progress-bar"><div className="progress-fill" style={{width:((idx+1)/vocab.length*100)+'%'}}/></div>
        <div className="flashcard">
          {word.article&&<div className="flashcard-article">{word.article}</div>}
          <div className="flashcard-de">{word.de.replace(/^(der|die|das)\s/,'')}</div>
          <div className="flashcard-en">{word.en}</div>
          {word.example&&<div className="flashcard-ex">{word.example}</div>}
          <button className="speak-btn" onClick={()=>speak(word.de)}>🔊 Hören</button>
        </div>
        <div style={{display:'flex',gap:10}}>
          {idx>0&&<button className="btn btn-outline btn-sm" onClick={()=>setIdx(i=>i-1)}>← Back</button>}
          {idx<vocab.length-1
            ?<button className="btn btn-gold btn-sm" style={{flex:1}} onClick={()=>setIdx(i=>i+1)}>Next →</button>
            :<button className="btn btn-gold btn-sm" style={{flex:1}} onClick={()=>setPhase('quiz')}>Start Quiz →</button>
          }
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div className="trial-header">📖 LEXIKON-KELLER — QUIZ</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:((quizIdx+1)/quizWords.length*100)+'%'}}/></div>
      <div className="quiz-question">{currentQ?.word.de}</div>
      <div className="quiz-opts">
        {currentQ?.opts.map((opt,i)=>(
          <button key={i} className={`quiz-opt ${quizChosen!==null?i===currentQ.correct?'correct':i===quizChosen?'wrong':'':''}`}
            onClick={()=>answerQ(i)}>
            {opt.en}
          </button>
        ))}
      </div>
      <div style={{textAlign:'center',color:'var(--slate)',fontSize:13,marginTop:16}}>
        {quizIdx+1} / {quizWords.length} · Score: {quizScore}
      </div>
    </div>
  );
}

  const [usedIdx,setUsedIdx]=useState(new Set());
  const [checked,setChecked]=useState(false);
  const [correct,setCorrect]=useState(false);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);

  const sent=sentences[idx];
  const words=sent?shuffle([...sent.parts]):[];
  const [wordList]=useState(()=>words);

  const reset=()=>{setAnswer([]);setUsedIdx(new Set());setChecked(false);setCorrect(false);};

  const addWord=(i)=>{
    if(usedIdx.has(i)||checked) return;
    setAnswer(a=>[...a,{w:wordList[i],i}]);
    setUsedIdx(s=>new Set([...s,i]));
  };
  const removeWord=(pos)=>{
    if(checked) return;
    const item=answer[pos];
    setAnswer(a=>a.filter((_,j)=>j!==pos));
    setUsedIdx(s=>{const n=new Set(s);n.delete(item.i);return n;});
  };
  const check=()=>{
    const ans=answer.map(a=>a.w).join(' ');
    const correct_=ans===sent.parts.join(' ');
    setCorrect(correct_);
    setChecked(true);
    if(correct_) setScore(s=>s+1);
  };
  const next=()=>{
    if(idx+1>=sentences.length) setDone(true);
    else{setIdx(i=>i+1);reset();}
  };

  if(done){
    return <ResultScreen icon="⚔️" title="Satz-Schmiede" score={score} total={sentences.length}
      xp={score*20} gold={score*8}
      onContinue={()=>dispatch({type:'COMPLETE_TRIAL',trial:'sentence',xp:score*20,gold:score*8})}/>;
  }

  return (
    <div className="fade-in">
      <div className="trial-header">⚔️ SATZ-SCHMIEDE</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:((idx+1)/sentences.length*100)+'%'}}/></div>
      <div className="card" style={{textAlign:'center',marginBottom:12}}>
        <div style={{fontSize:13,color:'var(--slate)',marginBottom:6}}>Translate:</div>
        <div style={{fontFamily:'EB Garamond',fontStyle:'italic',fontSize:18,color:'var(--cream)'}}>{sent?.tr}</div>
      </div>
      <div className="answer-zone">
        {answer.length===0&&<span style={{color:'var(--dim)',fontSize:13,padding:'8px'}}>Tap words to build the sentence…</span>}
        {answer.map((item,pos)=>(
          <div key={pos} className="answer-chip" onClick={()=>removeWord(pos)}>{item.w}</div>
        ))}
      </div>
      <div className="word-bank">
        {wordList.map((w,i)=>(
          <div key={i} className={`word-chip ${usedIdx.has(i)?'used':''}`} onClick={()=>addWord(i)}>{w}</div>
        ))}
      </div>
      {checked&&(
        <div className="card" style={{borderColor:correct?'var(--green2)':'var(--red2)',textAlign:'center',marginBottom:12}}>
          {correct?<span style={{color:'var(--green2)'}}>✓ Correct!</span>:<span style={{color:'var(--red2)'}}>✗ Should be: <em>{sent.parts.join(' ')}</em></span>}
        </div>
      )}
      {!checked
        ?<button className="btn btn-gold" style={{width:'100%'}} onClick={check} disabled={answer.length===0}>Check</button>
        :<button className="btn btn-gold" style={{width:'100%'}} onClick={next}>{idx+1<sentences.length?'Next →':'Finish'}</button>
      }
    </div>
  );
}

// ─── LISTENING TRIAL ──────────────────────────────────────────────────────────
function ListeningTrial({zone,dispatch}){
  const sents=useMemo(()=>pick(zone.dictation,Math.min(3,zone.dictation.length)),[zone.id]);
  const [idx,setIdx]=useState(0);
  const [input,setInput]=useState('');
  const [checked,setChecked]=useState(false);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);

  const check=()=>{
    setChecked(true);
    const clean=s=>s.toLowerCase().replace(/[.,!?]/g,'').trim();
    if(clean(input)===clean(sents[idx])) setScore(s=>s+1);
  };
  const next=()=>{
    if(idx+1>=sents.length) setDone(true);
    else{setIdx(i=>i+1);setInput('');setChecked(false);}
  };

  if(done){
    return <ResultScreen icon="👂" title="Hör-Gewölbe" score={score} total={sents.length}
      xp={score*18} gold={score*6}
      onContinue={()=>dispatch({type:'COMPLETE_TRIAL',trial:'listening',xp:score*18,gold:score*6})}/>;
  }

  const correct_ans=sents[idx];
  const userWords=input.split(' ');
  const correctWords=correct_ans?.split(' ')||[];

  return (
    <div className="fade-in">
      <div className="trial-header">👂 HÖR-GEWÖLBE</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:((idx+1)/sents.length*100)+'%'}}/></div>
      <div style={{textAlign:'center',marginBottom:20}}>
        <button className="btn btn-gold" style={{fontSize:20,padding:'14px 32px'}}
          onClick={()=>speak(correct_ans)}>🔊 Hören</button>
        <div style={{fontSize:12,color:'var(--dim)',marginTop:8}}>Tap to hear, then type what you hear</div>
      </div>
      <textarea className="listen-input" rows={3} value={input}
        onChange={e=>setInput(e.target.value)}
        placeholder="Type what you heard…" disabled={checked}/>
      {checked&&(
        <div style={{margin:'12px 0'}}>
          <div style={{fontSize:12,color:'var(--slate)',marginBottom:6}}>Your answer vs. correct:</div>
          <div className="diff-result">
            {correctWords.map((w,i)=>{
              const uw=(userWords[i]||'').toLowerCase().replace(/[.,!?]/g,'');
              const cw=w.toLowerCase().replace(/[.,!?]/g,'');
              return <span key={i} className={uw===cw?'diff-correct':'diff-wrong'}>{w} </span>;
            })}
          </div>
        </div>
      )}
      {!checked
        ?<button className="btn btn-gold" style={{width:'100%',marginTop:12}} onClick={check} disabled={!input.trim()}>Check</button>
        :<button className="btn btn-gold" style={{width:'100%',marginTop:12}} onClick={next}>{idx+1<sents.length?'Next →':'Finish'}</button>
      }
    </div>
  );
}

// ─── SPEAKING TRIAL ───────────────────────────────────────────────────────────
function SpeakingTrial({zone,dispatch}){
  const prompts=useMemo(()=>pick(zone.writing||[],Math.min(2,zone.writing?.length||0)),[zone.id]);
  const defaultPrompts=[
    {prompt:"Introduce yourself in German.",model:"Hallo, ich heiße [Name]. Ich komme aus [Land] und lerne Deutsch."},
    {prompt:"Say what you did yesterday.",model:"Gestern habe ich Deutsch gelernt und Musik gehört."},
  ];
  const speaks=[...(prompts.length>0?prompts:defaultPrompts)].slice(0,2);
  const [idx,setIdx]=useState(0);
  const [recording,setRecording]=useState(false);
  const [transcript,setTranscript]=useState('');
  const [selfRate,setSelfRate]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const recRef=useRef(null);

  const startRec=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setTranscript('(Speech recognition not available on this device)');return;}
    const r=new SR(); r.lang='de-DE'; r.interimResults=false;
    r.onresult=e=>setTranscript(e.results[0][0].transcript);
    r.onerror=()=>setTranscript('(Could not capture audio)');
    r.onend=()=>setRecording(false);
    recRef.current=r; r.start(); setRecording(true);
  };
  const stopRec=()=>{recRef.current?.stop();setRecording(false);};
  const rate=(r)=>{
    setSelfRate(r);
    if(r>=3) setScore(s=>s+1);
    setTimeout(()=>{
      if(idx+1>=speaks.length) setDone(true);
      else{setIdx(i=>i+1);setTranscript('');setSelfRate(null);}
    },600);
  };

  if(done){
    return <ResultScreen icon="🎤" title="Sprech-Halle" score={score} total={speaks.length}
      xp={score*25} gold={score*10}
      onContinue={()=>dispatch({type:'COMPLETE_TRIAL',trial:'speaking',xp:score*25,gold:score*10})}/>;
  }

  const cur=speaks[idx];
  return (
    <div className="fade-in">
      <div className="trial-header">🎤 SPRECH-HALLE</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:((idx+1)/speaks.length*100)+'%'}}/></div>
      <div className="writing-prompt">{cur?.prompt}</div>
      <div style={{textAlign:'center',marginBottom:16}}>
        <button className={`btn ${recording?'btn-danger':'btn-gold'}`}
          style={{fontSize:18,padding:'14px 28px'}}
          onClick={recording?stopRec:startRec}>
          {recording?'⏹ Stop':'🎙 Record'}
        </button>
        {recording&&<div className="pulse" style={{color:'var(--red2)',marginTop:8,fontSize:13}}>Recording…</div>}
      </div>
      {transcript&&(
        <div className="card" style={{marginBottom:12}}>
          <div style={{fontSize:12,color:'var(--slate)',marginBottom:4}}>You said:</div>
          <div style={{fontFamily:'EB Garamond',fontStyle:'italic',fontSize:16}}>{transcript}</div>
        </div>
      )}
      <div className="model-answer">
        <div style={{fontSize:11,color:'var(--slate)',marginBottom:4,fontStyle:'normal'}}>MODEL ANSWER:</div>
        {cur?.model}
      </div>
      {!selfRate&&(
        <div>
          <div style={{textAlign:'center',fontSize:13,color:'var(--slate)',marginBottom:10}}>Rate your answer:</div>
          <div style={{display:'flex',gap:8,justifyContent:'center'}}>
            {[1,2,3,4,5].map(r=>(
              <button key={r} className="btn btn-outline btn-sm" onClick={()=>rate(r)} style={{minWidth:44}}>
                {'⭐'.repeat(r)}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── GRAMMAR TRIAL ────────────────────────────────────────────────────────────
function GrammarTrial({zone,dispatch}){
  const vocab=getVocab(zone);
  const questions=useMemo(()=>{
    const arts=['der','die','das','einen','einem','einer'];
    const qs=[];
    for(let i=0;i<5;i++){
      const w=vocab[i%vocab.length];
      if(w.article){
        const wrongArts=shuffle(arts.filter(a=>a!==w.article)).slice(0,3);
        const opts=shuffle([w.article,...wrongArts]);
        qs.push({q:`___ ${w.de.replace(/^(der|die|das)\s/,'')} (${w.en})`,opts,correct:opts.indexOf(w.article),explain:`Article of "${w.de}" is "${w.article}"`});
      } else {
        const verbOpts=['bin','bist','ist','sind'];
        const correct='ist';
        const idx_=verbOpts.indexOf(correct);
        qs.push({q:`Er ___ müde.`,opts:verbOpts,correct:idx_,explain:'With "er" use "ist".'});
      }
    }
    return qs;
  },[zone.id]);

  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);

  const answer=(i)=>{
    if(chosen!==null) return;
    setChosen(i);
    if(i===questions[idx].correct) setScore(s=>s+1);
    setTimeout(()=>{
      if(idx+1>=questions.length) setDone(true);
      else{setIdx(j=>j+1);setChosen(null);}
    },900);
  };

  if(done){
    return <ResultScreen icon="📜" title="Grammatik-Keller" score={score} total={questions.length}
      xp={score*20} gold={score*8}
      onContinue={()=>dispatch({type:'COMPLETE_TRIAL',trial:'grammar',xp:score*20,gold:score*8})}/>;
  }

  const q=questions[idx];
  return (
    <div className="fade-in">
      <div className="trial-header">📜 GRAMMATIK-KELLER</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:((idx+1)/questions.length*100)+'%'}}/></div>
      <div className="quiz-question">{q.q}</div>
      <div className="quiz-opts">
        {q.opts.map((opt,i)=>(
          <button key={i} className={`quiz-opt ${chosen!==null?i===q.correct?'correct':i===chosen?'wrong':'':''}`}
            onClick={()=>answer(i)}>{opt}</button>
        ))}
      </div>
      {chosen!==null&&(
        <div className="card" style={{marginTop:12,fontSize:13,color:'var(--slate)'}}>
          💡 {q.explain}
        </div>
      )}
    </div>
  );
}

// ─── BOSS BATTLE ──────────────────────────────────────────────────────────────
function BossBattle({zone,state,dispatch}){
  const vocab=getVocab(zone);
  const makeQs=()=>{
    const qs=[];
    // Vocab questions
    const ws=pick(vocab,5);
    ws.forEach(w=>{
      const wrongs=shuffle(vocab.filter(v=>v.en!==w.en)).slice(0,3);
      const opts=shuffle([w,...wrongs]);
      qs.push({q:`What does "${w.de}" mean?`,opts:opts.map(o=>o.en),correct:opts.indexOf(w),type:'vocab'});
    });
    // Grammar questions
    zone.grammar.forEach(g=>{
      qs.push({
        q:`Which rule is: "${g.ex}"?`,
        opts:[g.title,'Passive Voice','Dative Case','Modal Particles'],
        correct:0,type:'grammar'
      });
    });
    // Sentence
    zone.sentences.slice(0,2).forEach(s=>{
      const jumbled=shuffle([...s.parts]);
      qs.push({
        q:`Rearrange: ${jumbled.join(' / ')}`,
        opts:[s.parts.join(' '),shuffle([...s.parts]).join(' '),shuffle([...s.parts]).join(' '),shuffle([...s.parts]).join(' ')],
        correct:0,type:'sentence'
      });
    });
    return pick(qs,8);
  };
  const [questions]=useState(()=>makeQs());
  const [idx,setIdx]=useState(0);
  const [score,setScore]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [timer,setTimer]=useState(30);
  const [done,setDone]=useState(false);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(done||chosen!==null) return;
    timerRef.current=setInterval(()=>{
      setTimer(t=>{
        if(t<=1){
          clearInterval(timerRef.current);
          next();
          return 30;
        }
        return t-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[idx,chosen,done]);

  const next=()=>{
    clearInterval(timerRef.current);
    if(idx+1>=questions.length) setDone(true);
    else{setIdx(i=>i+1);setChosen(null);setTimer(30);}
  };
  const answer=(i)=>{
    if(chosen!==null) return;
    clearInterval(timerRef.current);
    setChosen(i);
    if(i===questions[idx].correct) setScore(s=>s+1);
    setTimeout(next,800);
  };

  if(done){
    const passed=score>=Math.ceil(questions.length*0.85);
    return (
      <div className="result-screen fade-in">
        <div className="result-icon">{passed?'👑':'💀'}</div>
        <div className="result-title">{passed?'Boss Defeated!':'Boss Victorious'}</div>
        <div className="result-score" style={{color:passed?'var(--gold)':'var(--red2)'}}>
          {score}/{questions.length}
        </div>
        {passed?(
          <div>
            <div style={{color:'var(--slate)',textAlign:'center',marginBottom:16}}>
              The zone is conquered. +200 XP · +150 Gold
            </div>
            <button className="btn btn-gold" onClick={()=>dispatch({type:'DEFEAT_BOSS'})}>
              Claim Victory
            </button>
          </div>
        ):(
          <div>
            <div style={{color:'var(--slate)',textAlign:'center',marginBottom:16}}>
              Score 85% to win. You need {Math.ceil(questions.length*0.85)} correct.
            </div>
            <button className="btn btn-outline" onClick={()=>dispatch({type:'GOTO_ZONE',zoneId:zone.id})}>
              Retreat & Train
            </button>
          </div>
        )}
      </div>
    );
  }

  const q=questions[idx];
  const bossHp=100-(idx/questions.length)*100;
  return (
    <div className="fade-in">
      <div className="boss-arena">
        <div style={{fontSize:40}}>🐉</div>
        <div style={{fontFamily:'Cinzel',color:'var(--red2)',fontSize:16,margin:'4px 0'}}>ZONE BOSS</div>
        <div className="boss-hp"><div className="boss-hp-fill" style={{width:bossHp+'%'}}/></div>
      </div>
      <div className="timer-bar"><div className="timer-fill" style={{width:(timer/30*100)+'%'}}/></div>
      <div style={{textAlign:'right',fontSize:12,color:timer<10?'var(--red2)':'var(--slate)',marginBottom:8}}>
        ⏱ {timer}s
      </div>
      <div className="quiz-question">{q.q}</div>
      <div className="quiz-opts">
        {q.opts.map((opt,i)=>(
          <button key={i} className={`quiz-opt ${chosen!==null?i===q.correct?'correct':i===chosen?'wrong':'':''}`}
            onClick={()=>answer(i)}>{opt}</button>
        ))}
      </div>
      <div style={{textAlign:'center',color:'var(--slate)',fontSize:13,marginTop:12}}>
        Q {idx+1}/{questions.length} · Score: {score}
      </div>
    </div>
  );
}

  ];
  return (
    <div style={{display:'flex',borderTop:'1px solid rgba(255,255,255,0.08)',
      background:'rgba(0,0,0,0.5)',flexShrink:0,backdropFilter:'blur(10px)'}}>
      {tabs.map(t=>(
        <button key={t.id}
          style={{flex:1,padding:'10px 0',background:'transparent',border:'none',cursor:'pointer',
            color:tab===t.id?'var(--gold)':'var(--slate)',fontSize:11,fontFamily:'Inter',
            display:'flex',flexDirection:'column',alignItems:'center',gap:2,
            WebkitTapHighlightColor:'transparent'}}
          onClick={()=>setTab(t.id)}>
          <span style={{fontSize:20}}>{t.icon}</span>
          {t.label}
        </button>
      ))}
    </div>
  );
}

// ─── VAULT ────────────────────────────────────────────────────────────────────
const ARTIFACTS=[
  {id:'shadow_cloak',name:'Shadow Cloak',icon:'🌑',cost:100},
  {id:'golden_quill',name:'Golden Quill',icon:'✒️',cost:150},
  {id:'rune_stone',name:'Rune Stone',icon:'🪨',cost:200},
  {id:'moon_amulet',name:'Moon Amulet',icon:'🌙',cost:250},
  {id:'dragon_seal',name:'Dragon Seal',icon:'🐉',cost:300},
  {id:'crystal_orb',name:'Crystal Orb',icon:'🔮',cost:350},
  {id:'iron_key',name:'Iron Key',icon:'🗝️',cost:400},
  {id:'ghost_lantern',name:'Ghost Lantern',icon:'🏮',cost:450},
  {id:'star_fragment',name:'Star Fragment',icon:'⭐',cost:500},
];
function VaultScreen({state,dispatch}){
  return (
    <div className="fade-in">
      <div className="section-title">VAULT — Artifacts</div>
      <div style={{color:'var(--slate)',fontSize:13,marginBottom:14}}>💰 Gold: {state.gold}</div>
      <div className="vault-grid">
        {ARTIFACTS.map(a=>{
          const owned=state.artifacts.includes(a.id);
          return (
            <div key={a.id} className={`vault-item ${owned?'owned':''}`}
              onClick={()=>{if(!owned)dispatch({type:'BUY_ARTIFACT',id:a.id,cost:a.cost})}}>
              <span>{a.icon}</span>
              <div className="vault-item-name">{a.name}</div>
              {owned
                ?<div style={{fontSize:10,color:'var(--green2)'}}>Owned</div>
                :<div className="vault-item-cost">{a.cost}g</div>
              }
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [state,dispatch]=useReducer(reducer,initialState);
  const [tab,setTab]=useState('map');
  const [foxMsg,setFoxMsg]=useState(FOX_MSGS.start);

  useEffect(()=>{
    try{
      const saved=localStorage.getItem(SAVE_KEY);
      if(saved) dispatch({type:'LOAD',payload:JSON.parse(saved)});
    }catch(e){}
  },[]);

  useEffect(()=>{
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}
  },[state]);

  useEffect(()=>{
    if(state.screen==='map') setFoxMsg(FOX_MSGS.map);
    else if(state.screen==='zone') setFoxMsg(FOX_MSGS.trial);
    else if(state.screen==='trial'&&state.currentTrial==='boss') setFoxMsg(FOX_MSGS.boss);
  },[state.screen,state.currentTrial]);

  const showNav=state.screen!=='start'&&state.screen!=='trial';

  return (
    <div className="app">
      {state.screen!=='start'&&<HUD state={state}/>}
      <div className="screen">
        {state.screen==='start'&&<StartScreen dispatch={dispatch}/>}
        {state.screen==='map'&&tab==='map'&&<WorldMap state={state} dispatch={dispatch}/>}
        {state.screen==='map'&&tab==='vault'&&<VaultScreen state={state} dispatch={dispatch}/>}
        {state.screen==='map'&&tab==='settings'&&<SettingsScreen state={state} dispatch={dispatch}/>}
        {state.screen==='zone'&&<ZoneView state={state} dispatch={dispatch}/>}
        {state.screen==='trial'&&<TrialScreen state={state} dispatch={dispatch}/>}
      </div>
      {showNav&&<NavBar tab={tab} setTab={(t)=>{setTab(t);if(state.screen!=='map')dispatch({type:'GOTO_MAP'});}}/>}
      {state.screen!=='start'&&state.screen!=='trial'&&<Bertram message={foxMsg}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
