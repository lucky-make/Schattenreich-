<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schattenreich: Der Nigerianische Weg</title>
<style>
:root {
  --bg-deep: #0a0020;
  --bg-mid: #1a0a3e;
  --bg-card: #12002e;
  --text-cream: #F5E6D3;
  --text-muted: #a89880;
  --gold: #FFD700;
  --gold-dim: #b8960a;
  --correct: #4CAF50;
  --wrong: #8B0000;
  --wrong-bright: #cc2222;
  --blue: #00BFFF;
  --blue-dim: #006080;
  --border: rgba(255,215,0,0.2);
  --border-bright: rgba(255,215,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg-deep);
  color: var(--text-cream);
  font-family: system-ui, -apple-system, sans-serif;
  overflow: hidden;
}
#root { width: 100%; height: 100%; }

/* SCREEN SYSTEM */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.screen-content {
  flex: 1; overflow-y: auto;
  padding: 16px;
  padding-bottom: 80px;
  -webkit-overflow-scrolling: touch;
}
.hidden { display: none !important; }

/* HUD */
.hud {
  background: rgba(10,0,32,0.95);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
  backdrop-filter: blur(10px);
}
.hud-stat {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; font-weight: 600;
}
.hud-stat .icon { font-size: 16px; }
.hud-gold { color: var(--gold); }
.hud-xp { color: var(--blue); }
.hud-streak { color: #ff6b35; }
.xp-bar-wrap {
  flex: 1; height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden;
}
.xp-bar {
  height: 100%; background: linear-gradient(90deg, var(--blue-dim), var(--blue));
  border-radius: 3px; transition: width 0.5s ease;
}
.back-btn {
  background: none; border: none; color: var(--gold);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
  flex-shrink: 0;
}

/* CARDS */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.card-gold {
  border-color: var(--border-bright);
  background: linear-gradient(135deg, #0d0025, #1a0a3e);
}

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #000; font-weight: 700; font-size: 15px;
  border: none; border-radius: 10px;
  padding: 12px 20px; cursor: pointer;
  width: 100%; margin-bottom: 10px;
  transition: transform 0.1s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-secondary {
  background: linear-gradient(135deg, #1a0a3e, #2a1a5e);
  color: var(--text-cream);
  border: 1px solid var(--border-bright);
}
.btn-correct {
  background: linear-gradient(135deg, #1a4a1a, var(--correct));
  color: #fff;
}
.btn-wrong {
  background: linear-gradient(135deg, #4a1a1a, var(--wrong-bright));
  color: #fff;
}
.btn-blue {
  background: linear-gradient(135deg, var(--blue-dim), var(--blue));
  color: #000;
}
.btn-sm {
  width: auto; padding: 8px 14px;
  font-size: 13px; margin-bottom: 0;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* TYPOGRAPHY */
h1 { font-size: 28px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
h2 { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
h3 { font-size: 16px; font-weight: 700; color: var(--text-cream); margin-bottom: 6px; }
p { font-size: 14px; line-height: 1.6; color: var(--text-muted); margin-bottom: 8px; }
.german-text {
  font-family: Georgia, serif;
  font-size: 18px; font-weight: 600;
  color: var(--text-cream);
  line-height: 1.5;
}
.english-text {
  font-size: 14px; color: var(--text-muted); font-style: italic;
}
.gold-text { color: var(--gold); }
.blue-text { color: var(--blue); }
.correct-text { color: var(--correct); }
.wrong-text { color: var(--wrong-bright); }

/* BERTRAM */
.bertram-wrap {
  display: flex; gap: 12px; align-items: flex-start;
  margin-bottom: 16px;
}
.bertram-fox {
  font-size: 40px; flex-shrink: 0;
  animation: foxFloat 3s ease-in-out infinite;
}
@keyframes foxFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
.bertram-bubble {
  background: linear-gradient(135deg, #0d0025, #1a0a3e);
  border: 1px solid var(--gold);
  border-radius: 12px 12px 12px 4px;
  padding: 12px 14px;
  flex: 1;
  font-size: 14px; line-height: 1.6;
  color: var(--text-cream);
  font-style: italic;
}

/* WORLD MAP */
.world-map {
  background: linear-gradient(180deg, #0a0020 0%, #0a1a20 50%, #001a0a 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
  min-height: 200px;
}
.map-path {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
}
.zone-node {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform 0.2s;
  border: 2px solid transparent;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.zone-node:active { transform: scale(0.9); }
.zone-locked {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.2);
  cursor: not-allowed;
}
.zone-unlocked {
  background: linear-gradient(135deg, #1a0a3e, #2a1a5e);
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
  animation: zonePulse 2s ease-in-out infinite;
}
@keyframes zonePulse {
  0%,100% { box-shadow: 0 0 10px rgba(255,215,0,0.3); }
  50% { box-shadow: 0 0 20px rgba(255,215,0,0.6); }
}
.zone-completed {
  background: linear-gradient(135deg, #0a2a0a, #1a4a1a);
  border-color: var(--correct);
  color: var(--correct);
}
.zone-boss {
  background: linear-gradient(135deg, #2a0a0a, #4a1a1a);
  border-color: var(--wrong-bright);
  color: var(--wrong-bright);
}
.zone-level-badge {
  font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
  margin-bottom: 8px; display: inline-block;
}
.badge-a1 { background: rgba(255,215,0,0.2); color: var(--gold); }
.badge-a2 { background: rgba(0,191,255,0.2); color: var(--blue); }
.badge-b1 { background: rgba(76,175,80,0.2); color: var(--correct); }

/* TRIAL CARDS */
.trial-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s;
  display: flex; align-items: center; gap: 12px;
}
.trial-card:active { border-color: var(--gold); }
.trial-card.trial-done { border-color: var(--correct); }
.trial-card.trial-active { border-color: var(--gold); background: linear-gradient(135deg, #0d0025, #1a0a3e); }
.trial-num {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,215,0,0.1);
  border: 1px solid var(--border-bright);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--gold);
  flex-shrink: 0;
}
.trial-num.done { background: rgba(76,175,80,0.2); border-color: var(--correct); color: var(--correct); }

/* QUIZ */
.quiz-question {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  text-align: center;
}
.quiz-progress {
  display: flex; gap: 6px; margin-bottom: 16px;
}
.quiz-dot {
  flex: 1; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.1);
}
.quiz-dot.done { background: var(--correct); }
.quiz-dot.current { background: var(--gold); }
.option-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  width: 100%; margin-bottom: 8px;
  color: var(--text-cream);
  font-size: 14px; cursor: pointer;
  text-align: left; transition: border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}
.option-btn:active { border-color: var(--gold); }
.option-btn.correct { border-color: var(--correct); background: rgba(76,175,80,0.1); color: var(--correct); }
.option-btn.wrong { border-color: var(--wrong-bright); background: rgba(139,0,0,0.2); color: var(--wrong-bright); }
.option-btn:disabled { cursor: default; }

/* WORD TILES */
.word-tiles {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 16px;
}
.word-tile {
  background: linear-gradient(135deg, #1a0a3e, #2a1a5e);
  border: 1px solid var(--border-bright);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: Georgia, serif;
  font-size: 15px; color: var(--text-cream);
  cursor: pointer; user-select: none;
  transition: transform 0.1s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.word-tile:active { transform: scale(0.95); }
.word-tile.used { opacity: 0.3; cursor: not-allowed; }
.answer-slots {
  min-height: 50px;
  border: 1px dashed var(--border-bright);
  border-radius: 10px;
  padding: 10px;
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 16px;
  background: rgba(255,215,0,0.02);
}
.answer-slot-word {
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #000; border-radius: 6px;
  padding: 6px 10px;
  font-family: Georgia, serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* LISTENING */
.waveform {
  display: flex; align-items: center; justify-content: center;
  gap: 3px; height: 40px; margin: 12px 0;
}
.wave-bar {
  width: 4px; border-radius: 2px;
  background: var(--blue);
  animation: waveAnim 0.8s ease-in-out infinite;
}
.wave-bar:nth-child(2) { animation-delay: 0.1s; }
.wave-bar:nth-child(3) { animation-delay: 0.2s; }
.wave-bar:nth-child(4) { animation-delay: 0.3s; }
.wave-bar:nth-child(5) { animation-delay: 0.4s; }
.wave-bar:nth-child(6) { animation-delay: 0.3s; }
.wave-bar:nth-child(7) { animation-delay: 0.2s; }
.wave-bar:nth-child(8) { animation-delay: 0.1s; }
@keyframes waveAnim {
  0%,100% { height: 8px; }
  50% { height: 32px; }
}
.waveform.idle .wave-bar { height: 4px; animation: none; }

/* HACK JOURNAL */
.hack-card {
  background: linear-gradient(135deg, #0d0025, #1a0a3e);
  border: 1px solid var(--gold);
  border-radius: 10px; padding: 14px;
  margin-bottom: 10px;
}
.hack-title {
  font-size: 14px; font-weight: 700; color: var(--gold);
  margin-bottom: 6px;
}
.hack-body {
  font-size: 13px; color: var(--text-cream); line-height: 1.6;
}
.hack-example {
  font-family: Georgia, serif;
  font-size: 14px; color: var(--blue);
  margin-top: 6px;
}

/* BOSS BATTLE */
.boss-wrap {
  text-align: center;
  padding: 20px 0;
}
.boss-health {
  display: flex; gap: 12px; margin-bottom: 20px;
}
.health-bar-wrap {
  flex: 1;
}
.health-bar-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.health-bar {
  height: 10px; border-radius: 5px;
  background: rgba(255,255,255,0.1); overflow: hidden;
}
.health-fill {
  height: 100%; border-radius: 5px;
  transition: width 0.5s ease;
}
.health-player { background: linear-gradient(90deg, var(--correct), #8BC34A); }
.health-boss { background: linear-gradient(90deg, var(--wrong-bright), #ff4444); }
.timer-circle {
  width: 60px; height: 60px; border-radius: 50%;
  border: 3px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: var(--gold);
  margin: 0 auto 16px;
}
.timer-circle.urgent { border-color: var(--wrong-bright); color: var(--wrong-bright); animation: pulse 0.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* REWARD FLASH */
.reward-flash {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(255,215,0,0.95);
  color: #000; border-radius: 20px;
  padding: 20px 32px;
  font-size: 28px; font-weight: 800;
  z-index: 1000; pointer-events: none;
  transition: transform 0.2s, opacity 0.3s;
}
.reward-flash.show { transform: translate(-50%, -50%) scale(1); }
.reward-flash.hide { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }

/* DOPAMINE SUMMARY */
.summary-stat {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
}
.summary-val { font-weight: 800; font-size: 22px; color: var(--gold); }

/* SCROLL HELPERS */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }

/* INPUT */
.text-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-bright);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text-cream);
  font-size: 15px; font-family: Georgia, serif;
  margin-bottom: 12px;
  outline: none;
}
.text-input:focus { border-color: var(--gold); }

/* DIFF DISPLAY */
.diff-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.diff-word { font-size: 15px; font-family: Georgia, serif; }
.diff-ok { color: var(--correct); }
.diff-bad { color: var(--wrong-bright); text-decoration: underline; }
.diff-miss { color: var(--text-muted); font-style: italic; }

/* START SCREEN */
.start-bg {
  background: radial-gradient(ellipse at center, #1a0a3e 0%, #0a0020 70%);
  min-height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 20px; text-align: center;
}
.start-title {
  font-family: Georgia, serif;
  font-size: 32px; font-weight: 800;
  color: var(--gold);
  margin-bottom: 4px;
  text-shadow: 0 0 40px rgba(255,215,0,0.5);
}
.start-sub {
  font-size: 14px; color: var(--text-muted);
  margin-bottom: 32px;
  letter-spacing: 2px; text-transform: uppercase;
}
.start-fox { font-size: 80px; margin-bottom: 16px; animation: foxFloat 3s ease-in-out infinite; }

/* REPLACE METHOD */
.sentence-template { 
  font-family: Georgia, serif; font-size: 17px;
  line-height: 1.8; color: var(--text-cream);
}
.slot-word {
  display: inline-block;
  background: rgba(255,215,0,0.15);
  border: 1px solid var(--gold);
  border-radius: 6px; padding: 2px 8px;
  color: var(--gold); cursor: pointer;
  margin: 2px; font-weight: 700;
  transition: background 0.2s;
}
.slot-word:active { background: rgba(255,215,0,0.3); }
.slot-options {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin: 10px 0; padding: 10px;
  background: rgba(0,0,0,0.3); border-radius: 8px;
}
.slot-option {
  background: rgba(255,215,0,0.1);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px;
  color: var(--text-cream); cursor: pointer;
  font-family: Georgia, serif; font-size: 14px;
  -webkit-tap-highlight-color: transparent;
}
.slot-option:active { background: rgba(255,215,0,0.25); border-color: var(--gold); }
.slot-option.selected { border-color: var(--gold); color: var(--gold); }

/* NOTIFICATION */
.notif {
  position: fixed; top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg-mid);
  border: 1px solid var(--gold);
  border-radius: 10px; padding: 10px 20px;
  font-size: 14px; color: var(--text-cream);
  z-index: 999; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  text-align: center; max-width: 280px;
  pointer-events: none;
}
.notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root"></div>

<div id="reward-flash" class="reward-flash">+XP! 🌟</div>
<div id="notif" class="notif"></div>

<script>
// ============================================================
// GAME DATA
// ============================================================

const ZONES = [
  // ---- A1 ZONES 1-16 ----
  {
    id:1, level:"A1", name:"Das Stille Tor von Lagos", parallel:"First Steps in German",
    grammar:"Verb second position, W-questions, nicht, sein/haben",
    hackIds:[0,1],
    sentences:[
      {de:"Ich heiße Dike und ich komme aus Nigeria.", en:"My name is Dike and I come from Nigeria.", slots:[{word:"Dike",opts:["Max","Anna","Emre"]},{word:"Nigeria",opts:["Deutschland","Ghana","England"]}]},
      {de:"Wie heißen Sie? Ich bin Lehrerin.", en:"What is your name? I am a teacher.", slots:[{word:"Lehrerin",opts:["Student","Arzt","Ingenieur"]}]},
      {de:"Haben Sie einen Ausweis?", en:"Do you have an ID?", slots:[{word:"Ausweis",opts:["Pass","Führerschein","Visum"]}]},
      {de:"Ich bin nicht müde, ich bin hungrig.", en:"I am not tired, I am hungry.", slots:[{word:"müde",opts:["krank","glücklich","traurig"]},{word:"hungrig",opts:["durstig","wach","fertig"]}]},
      {de:"Wo wohnen Sie? Ich wohne in Berlin.", en:"Where do you live? I live in Berlin.", slots:[{word:"Berlin",opts:["Mannheim","Hamburg","München"]}]},
      {de:"Was machen Sie beruflich?", en:"What do you do for work?", slots:[{word:"beruflich",opts:["heute","hier","jetzt"]}]},
      {de:"Er hat eine Frage. Sie hat keine Zeit.", en:"He has a question. She has no time.", slots:[{word:"Frage",opts:["Antwort","Idee","Lösung"]},{word:"Zeit",opts:["Geld","Arbeit","Plan"]}]},
      {de:"Wie viel kostet das? Es kostet fünf Euro.", en:"How much does that cost? It costs five euros.", slots:[{word:"fünf",opts:["drei","zehn","zwanzig"]}]},
      {de:"Sprechen Sie Deutsch? Ja, ein bisschen.", en:"Do you speak German? Yes, a little.", slots:[{word:"Deutsch",opts:["Englisch","Französisch","Spanisch"]}]},
      {de:"Das ist nicht richtig. Das ist falsch.", en:"That is not right. That is wrong.", slots:[{word:"richtig",opts:["gut","schön","einfach"]},{word:"falsch",opts:["schwierig","teuer","langsam"]}]},
      {de:"Ich heiße nicht Max. Ich heiße Dike.", en:"My name is not Max. My name is Dike.", slots:[{word:"Max",opts:["Thomas","Jan","Felix"]}]},
      {de:"Woher kommen Sie? Ich komme aus Lagos.", en:"Where are you from? I come from Lagos.", slots:[{word:"Lagos",opts:["Abuja","Accra","Nairobi"]}]},
      {de:"Wer ist das? Das ist mein Freund.", en:"Who is that? That is my friend.", slots:[{word:"Freund",opts:["Bruder","Chef","Kollege"]}]},
      {de:"Wann beginnt die Arbeit? Um acht Uhr.", en:"When does work start? At eight o'clock.", slots:[{word:"Arbeit",opts:["Schule","Ausbildung","Kurs"]}]},
      {de:"Ich bin zwanzig Jahre alt.", en:"I am twenty years old.", slots:[{word:"zwanzig",opts:["achtzehn","einundzwanzig","fünfundzwanzig"]}]},

      {de:"Haben wir morgen Schule?", en:"Do we have school tomorrow?", slots:[{word:"morgen",opts:["heute","übermorgen","nächste Woche"]}]},
      {de:"Was ist das? Das ist ein Computer.", en:"What is that? That is a computer.", slots:[{word:"Computer",opts:["Handy","Buch","Tisch"]}]},
      {de:"Ich verstehe das nicht. Können Sie das wiederholen?", en:"I don't understand that. Can you repeat that?", slots:[{word:"wiederholen",opts:["erklären","übersetzen","sagen"]}]},
      {de:"Wie geht es Ihnen? Danke, gut.", en:"How are you? Thanks, good.", slots:[{word:"gut",opts:["sehr gut","so lala","nicht so gut"]}]}
    ],
    bossQuestions:[
      {q:"Translate: 'What is your name?'",opts:["Wie heißen Sie?","Wo wohnen Sie?","Was machen Sie?"],a:0},
      {q:"Fill in: 'Ich ___ nicht müde.'",opts:["bin","habe","ist"],a:0},
      {q:"Which is correct?",opts:["Ich komme aus Nigeria.","Ich komme Nigeria.","Ich aus Nigeria komme."],a:0},
      {q:"'Haben Sie' means:",opts:["Do you have","Are you","Do you know"],a:0},

const HACKS = [
  {id:0, title:"-en Verb Hack", body:"Remove -en from any infinitive → add e/st/t/en/t/en for ich/du/er/wir/ihr/sie", example:"mach-en → ich mache, du machst, er macht"},
  {id:1, title:"Every Noun Capitalized", body:"EVERY noun in German is capitalized. You can spot nouns instantly when reading.", example:"der Mann, die Frau, das Kind, der Computer, die Information"},
  {id:2, title:"-tion Words Stay -tion", body:"English -tion words keep -tion in German, and are ALWAYS feminine (die).", example:"Information, Situation, Nation, Kommunikation, Motivation"},
  {id:3, title:"Compound Word Gluing", body:"German glues nouns together. Longer word = more specific meaning.", example:"Hand + Schuh = Handschuh (glove), Kühl + Schrank = Kühlschrank (fridge)"},
  {id:4, title:"-lich Hack (English -ly)", body:"-ly adjectives become -lich in German. Spot the pattern and generate words.", example:"friendly = freundlich, possible = möglich, natural = natürlich, logical = logisch"},
  {id:5, title:"un- Prefix Works Like English", body:"un- means the opposite, exactly like English. Endless vocabulary for free.", example:"möglich → unmöglich, glücklich → unglücklich, klar → unklar"},
  {id:6, title:"-ment Words Stay -ment", body:"English -ment words keep -ment in German (usually neuter, das).", example:"Dokument, Instrument, Argument, Kommentar, Experiment"},
  {id:7, title:"ge- Prefix = Past Participle", body:"ge- at the start of a word usually signals a past participle (something that happened).", example:"gemacht (made), gesagt (said), gegangen (gone), geschrieben (written)"},
  {id:8, title:"-ist Words Stay -ist", body:"English -ist words keep -ist in German. They are always masculine (der).", example:"Journalist, Optimist, Terrorist, Pessimist, Activist"},
  {id:9, title:"Adjective = Adverb Hack", body:"In German, adjectives and adverbs are the same word. No -ly needed.", example:"schnell (fast/quickly), laut (loud/loudly), gut (good/well), langsam (slow/slowly)"},
  {id:10, title:"-ik Words (English -ic/-ics)", body:"English -ic/-ics becomes -ik in German. Always feminine (die).", example:"Musik, Mathematik, Physik, Informatik, Ethik, Technik"},
  {id:11, title:"Capital Letters Show Nouns", body:"If you see a capital in the middle of a sentence, that word is 100% a noun.", example:"Ich lerne die Sprache in der Schule. → Sprache and Schule are nouns"},
  {id:12, title:"Numbers Pattern Hack", body:"German numbers 13-19 follow a pattern: single digit + zehn.", example:"dreizehn (3+10), vierzehn (4+10), siebzehn (7+10), neunzehn (9+10)"},
  {id:13, title:"Time: halb/viertel Shortcut", body:"halb X = X:30 (half towards X), Viertel nach X = X:15, Viertel vor X = X:45", example:"halb acht = 7:30 | Viertel nach drei = 3:15 | Viertel vor vier = 3:45"},
  {id:14, title:"-er Suffix = More (Comparative)", body:"Add -er to any adjective to make it comparative, just like English.", example:"schnell → schneller (faster), groß → größer (bigger), alt → älter (older)"},
  {id:15, title:"am + -sten = Most (Superlative)", body:"am + adjective + -sten/esten = the most. Simple formula.", example:"am schnellsten (fastest), am größten (biggest), am besten (best, irregular)"},
  {id:16, title:"würde = Would Hack", body:"würde + infinitive = would + verb. Konjunktiv II made easy for most verbs.", example:"ich würde gehen (I would go), er würde kaufen (he would buy)"},
  {id:17, title:"werden = Will/Become (Dual)", body:"'werden' means BOTH 'will' (future) AND 'become'. Context tells you which.", example:"Ich werde Arzt (I will become a doctor) | Er wird kommen (He will come)"},
  {id:18, title:"hätte = Had / Would Have", body:"hätte is Konjunktiv II of haben. Used for hypotheticals and polite requests.", example:"Ich hätte Zeit (I would have time) | Hätten Sie eine Frage? (Would you have a question?)"},
  {id:19, title:"wäre = Was / Would Be", body:"wäre is Konjunktiv II of sein. Same word, different time contexts.", example:"Das wäre gut (That would be good) | Wenn ich reich wäre... (If I were rich...)"},
  {id:20, title:"hatte + Participle = Had Done", body:"hatte + past participle = Plusquamperfekt = had done. The past-in-the-past tense.", example:"Ich hatte gegessen (I had eaten) | Er hatte geschlafen (He had slept)"},
  {id:21, title:"war + Participle = Had Gone", body:"war + past participle (for movement/change) = had gone/arrived etc.", example:"Ich war gegangen (I had gone) | Sie war angekommen (She had arrived)"},
  {id:22, title:"einerseits/andererseits = Essay Hack", body:"einerseits...andererseits instantly sounds sophisticated in any argument or essay.", example:"Einerseits ist es teuer, andererseits ist es sehr nützlich."},
  {id:23, title:"Meiner Meinung nach = In My Opinion", body:"Use 'Meiner Meinung nach' at the start of any sentence to express opinions formally.", example:"Meiner Meinung nach ist Deutsch lernbar. (In my opinion, German is learnable.)"},
  {id:24, title:"Passive = wird + Partizip II", body:"German passive voice formula: wird + past participle. That's literally all it is.", example:"Das wird gemacht. (That is done.) | Der Server wird gesichert. (The server is secured.)"},
  {id:25, title:"Subordinate Clause Verb to END", body:"This is the biggest German secret. In any clause after weil/dass/obwohl etc., verb goes to the end.", example:"...weil ich Deutsch LERNE. | ...dass er kommt. | ...obwohl es schwer IST."},
  {id:26, title:"doch = The Most Misunderstood Word", body:"doch has 3 meanings: 1) Yes-to-a-negative 2) Contrast/but 3) Emphasis particle. Context is everything.", example:"Kommst du? Doch! (You're not coming? Yes I am!) | Das ist doch klar! (That's obvious!)"},
  {id:27, title:"mal Softens Commands", body:"Adding 'mal' to a request instantly makes it sound friendlier and more natural.", example:"Erklär das! (Explain that!) → Erklär das mal! (Could you explain that?)"},
  {id:28, title:"Genitive = 's in English", body:"German genitive works like English possessive 's. des/der shows possession.", example:"das Auto des Mannes = the man's car | die Tasche der Frau = the woman's bag"},
  {id:29, title:"von as Genitive Shortcut", body:"In spoken German, 'von + Dative' replaces genitive. Equally understood and sounds natural.", example:"das Auto des Mannes → das Auto von dem Mann (the man's car)"}
];

const SAVE_KEY = "schattenreich_nigerian_save";

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function defaultState() {
  return {
    screen: "start",
    currentZoneId: 1,
    completedTrials: {}, // {zoneId: [0,1,2,3,4]}
    bossDefeated: {},    // {zoneId: true}
    recapCompleted: {},  // {zoneId: true}
    xp: 0, gold: 0, level: 1,
    streak: 0, lastPlayedDate: null,
    unlockedHacks: [],
    weakSpots: {},       // {grammarKey: count}
    settings: { audioEnabled: true },
    sessionStats: { sentences: 0, hacks: 0, xpEarned: 0 }
  };
}

let STATE = loadSave() || defaultState();

function saveState() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(STATE)); } catch(e) {}
}

function updateStreak() {
  const today = new Date().toDateString();
  if(STATE.lastPlayedDate !== today) {
    const yesterday = new Date(Date.now()-86400000).toDateString();
    if(STATE.lastPlayedDate === yesterday) {
      STATE.streak = (STATE.streak||0)+1;
    } else if(STATE.lastPlayedDate !== today) {
      STATE.streak = 1;
    }
    STATE.lastPlayedDate = today;
    saveState();
  }
}

function getUnlockedZones() {
  const unlocked = new Set([1]);
  for(let id=1; id<=76; id++) {
    if(STATE.bossDefeated[id]) {
      if(id<76) unlocked.add(id+1);
    }
  }
  return unlocked;
}

// ============================================================
// AUDIO
// ============================================================
let speechVoice = null;
function initSpeech() {
  if(!window.speechSynthesis) return;
  function findVoice() {
    const voices = speechSynthesis.getVoices();
    speechVoice = voices.find(v=>v.lang.startsWith('de-DE')) ||
                  voices.find(v=>v.lang.startsWith('de')) ||
                  null;
  }
  findVoice();
  speechSynthesis.onvoiceschanged = findVoice;
}

function speak(text, rate=0.85) {
  if(!STATE.settings.audioEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'de-DE';
  utt.rate = rate;
  utt.pitch = 1.05;
  if(speechVoice) utt.voice = speechVoice;
  speechSynthesis.speak(utt);
}

function $(id) { return document.getElementById(id); }
function show(id) { $(id) && $(id).classList.remove('hidden'); }
function hide(id) { $(id) && $(id).classList.add('hidden'); }
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html) e.innerHTML = html;
  return e;
}
function showNotif(msg, duration=2500) {
  const n = $('notif'); if(!n) return;
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'), duration);
}
function flashReward(msg) {
  const r = $('reward-flash'); if(!r) return;
  r.textContent = msg;
  r.classList.add('show');
  r.classList.remove('hide');
  setTimeout(()=>{ r.classList.add('hide'); setTimeout(()=>r.classList.remove('show','hide'),300); }, 1200);
}
function addXP(amount, giveGold=0) {
  STATE.xp += amount;
  STATE.gold += giveGold;
  STATE.sessionStats.xpEarned += amount;
  // Level up every 500 XP
  const newLevel = Math.floor(STATE.xp/500)+1;
  if(newLevel > STATE.level) {
    STATE.level = newLevel;
    showNotif(`⬆️ Level ${STATE.level} erreicht!`);
  }
  saveState();
  updateHUD();
}

  CURRENT_ZONE = getZone(id);
  STATE.currentZoneId = id;
  // Check recap needed (not for zone 1, not if already done)
  if(id > 1 && !STATE.recapCompleted[id] && STATE.bossDefeated[id-1]) {
    showScreen('recap');
    renderRecap(id);
    return;
  }
  showScreen('zone');
  renderZone();
}

let CURRENT_TRIAL = -1;
let TRIAL_SCORE = 0;

function startTrial(trialIdx) {
  CURRENT_TRIAL = trialIdx;
  TRIAL_SCORE = 0;
  showScreen('trial');
  const renderers = [renderSatzSpeicher, renderMusterSchmiede, renderHoerGewoelbe, renderSprechHalle, renderHackLab];
  renderers[trialIdx] && renderers[trialIdx]();
}

function completeTrialSuccess() {
  const z = CURRENT_ZONE;
  if(!STATE.completedTrials[z.id]) STATE.completedTrials[z.id] = [];
  if(!STATE.completedTrials[z.id].includes(CURRENT_TRIAL)) {
    STATE.completedTrials[z.id].push(CURRENT_TRIAL);
  }
  STATE.sessionStats.sentences += 5;
  addXP(50, 30);
  saveState();
  flashReward('+50 XP! +30 Gold 🌟');
  setTimeout(()=>{ showScreen('zone'); renderZone(); }, 1400);
}

function openSlot(word) {
  const z = CURRENT_ZONE;
  const sent = z.sentences[satzIdx % z.sentences.length];
  const slot = sent.slots.find(sl=>sl.word===word);
  if(!slot) return;
  satzSelectedSlot = slot;
  const area = $('slot-options-area'); if(!area) return;
  let html = `<div class="slot-options">`;
  slot.opts.forEach(opt=>{
    html += `<div class="slot-option" onclick="selectSlotOpt('${opt}','${word}')">${opt}</div>`;
  });
  html += `</div>`;
  area.innerHTML = html;
}

function selectSlotOpt(newWord, oldWord) {
  const z = CURRENT_ZONE;
  const sent = z.sentences[satzIdx % z.sentences.length];
  const newDe = sent.de.replace(oldWord, newWord);
  const genDiv = $('generated-sentence');
  if(genDiv) { genDiv.style.display='block'; genDiv.textContent = newDe; speak(newDe); }
  flashReward('Neuer Satz! 🌟');
}

let satzQuizIdx = 0;
function renderSatzQuiz() {
  satzQuizIdx = 0; satzQuizAnswered = [];

}

function renderSatzQuizQ() {
  const s = $('s-trial'); if(!s) return;
  const z = CURRENT_ZONE;
  if(satzQuizIdx >= 5) { completeTrialSuccess(); return; }
  const sent = z.sentences[satzQuizIdx];
  // Word reconstruction quiz: show shuffled words
  const words = sent.de.replace(/[.,?!]/g,'').split(' ');
  const shuffled = [...words].sort(()=>Math.random()-0.5);
  let html = `<div id="hud" class="hud"><button class="back-btn" onclick="showScreen('zone');renderZone()">←</button><span style="flex:1;text-align:center;font-size:13px;color:var(--gold)">📚 Quiz — ${satzQuizIdx+1}/5</span></div>`;
  html += `<div class="screen-content">`;
  html += `<div class="quiz-progress">${[0,1,2,3,4].map(i=>`<div class="quiz-dot ${i<satzQuizIdx?'done':i===satzQuizIdx?'current':''}"></div>`).join('')}</div>`;
  html += `<div class="quiz-question"><p style="color:var(--text-muted);margin-bottom:8px">Auf Deutsch übertragen:</p><p class="german-text" style="font-size:20px">${sent.en}</p></div>`;
  html += `<p style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Tippe auf Wörter in der richtigen Reihenfolge:</p>`;
  html += `<div class="answer-slots" id="answer-area"></div>`;
  html += `<div class="word-tiles" id="word-pool">`;
  shuffled.forEach((w,i)=>{ html += `<div class="word-tile" id="tile-${i}" onclick="addWordToAnswer('${w}',${i})">${w}</div>`; });
  html += `</div>`;
  html += `<div style="display:flex;gap:8px"><button class="btn btn-sm btn-secondary" onclick="clearAnswer()">↺ Reset</button><button class="btn btn-sm" onclick="checkSatzAnswer('${words.join(' ')}')">✓ Prüfen</button></div>`;
  html += `</div>`;
  s.innerHTML = html;
  window._answerWords = [];
  window._usedTiles = [];
}

function addWordToAnswer(word, tileIdx) {
  if(window._usedTiles.includes(tileIdx)) return;
  window._answerWords = window._answerWords || [];
  window._answerWords.push({word, tileIdx});
  window._usedTiles = window._usedTiles || [];
  window._usedTiles.push(tileIdx);
  const tile = $('tile-'+tileIdx);
  if(tile) tile.classList.add('used');
  const area = $('answer-area'); if(!area) return;
  const w = el('div','answer-slot-word');
  w.textContent = word;
  w.onclick = ()=>removeWordFromAnswer(tileIdx, w);
  area.appendChild(w);
}

function removeWordFromAnswer(tileIdx, wordEl) {
  window._answerWords = (window._answerWords||[]).filter(w=>w.tileIdx!==tileIdx);
  window._usedTiles = (window._usedTiles||[]).filter(t=>t!==tileIdx);
  const tile = $('tile-'+tileIdx);
  if(tile) tile.classList.remove('used');
  if(wordEl && wordEl.parentNode) wordEl.parentNode.removeChild(wordEl);
}

function clearAnswer() {
  window._answerWords = []; window._usedTiles = [];
  renderSatzQuizQ();
}

function checkSatzAnswer(correctStr) {
  const userStr = (window._answerWords||[]).map(w=>w.word).join(' ');
  if(userStr.toLowerCase() === correctStr.toLowerCase()) {
    flashReward('Richtig! ✓');
    speak(correctStr);
    satzQuizIdx++;
    setTimeout(renderSatzQuizQ, 1000);
  } else {
    showNotif(`Falsch. Richtig: "${correctStr}"`);
    logWeakSpot('sentence_reconstruction');
  }
}

function playHoer(text) {
  const wf = $('waveform');
  if(wf) wf.classList.remove('idle');
  speak(text, 0.75);
  setTimeout(()=>{ const wf=$('waveform'); if(wf) wf.classList.add('idle'); }, 3000);
}

function checkHoer(correct) {
  const input = $('hoer-input'); if(!input) return;
  const userText = input.value.trim().replace(/[.,?!]/g,'').toLowerCase();
  const correctText = correct.replace(/[.,?!]/g,'').toLowerCase();
  const userWords = userText.split(' ');
  const correctWords = correctText.split(' ');
  const diff = $('hoer-diff'); if(!diff) return;
  let diffHTML = '<div class="diff-wrap">';
  const maxLen = Math.max(userWords.length, correctWords.length);
  let correct_count = 0;
  correctWords.forEach((cw,i)=>{
    const uw = userWords[i] || '';
    if(uw === cw) { diffHTML += `<span class="diff-word diff-ok">${cw}</span>`; correct_count++; }
    else if(uw) { diffHTML += `<span class="diff-word diff-bad">${uw}→${cw}</span>`; }
    else { diffHTML += `<span class="diff-word diff-miss">[${cw}]</span>`; }
  });
  diffHTML += '</div>';
  diff.innerHTML = diffHTML;
  const accuracy = correct_count / correctWords.length;
  if(accuracy >= 0.7) {
    flashReward('Gut gehört! 🎧');
    hoerIdx++;
    setTimeout(renderHoerQ, 1500);
  } else {
    logWeakSpot('listening');
    showNotif(`Weiter üben! Richtig: "${correct}"`);
  }
}

function renderHackQ() {

function checkHack(chosen, correct, btn) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b,i)=>{ b.disabled=true; if(i===correct) b.classList.add('correct'); else if(i===chosen) b.classList.add('wrong'); });
  const z = CURRENT_ZONE;

  setTimeout(renderHackQ, 1200);

    // Reset recap
    logWeakSpot('recap');
    showNotif('Falsch! Neustart mit neuen Fragen...');
    setTimeout(()=>renderRecap(recapZoneId), 1500);
  }
}

// ============================================================
// BOSS BATTLE
// ============================================================
let bossQs = [];
let bossIdx = 0;
let bossPlayerHP = 100;
let bossBossHP = 100;
let bossCorrect = 0;
let bossTimer = null;
let bossTimeLeft = 45;

function startBoss() {
  const z = CURRENT_ZONE;
  bossQs = [...z.bossQuestions].sort(()=>Math.random()-0.5);
  bossIdx = 0; bossPlayerHP = 100; bossBossHP = 100; bossCorrect = 0;
  showScreen('boss');
  renderBossQ();
}

function renderBossQ() {
  const s = $('s-boss'); if(!s) return;
  if(bossIdx >= bossQs.length) {
    clearInterval(bossTimer);
    const passed = bossCorrect >= 9;
    renderBossResult(passed);
    return;
  }
  const q = bossQs[bossIdx];
  bossTimeLeft = 45;
  let html = `<div id="hud" class="hud"><button class="back-btn" onclick="clearInterval(bossTimer);showScreen('zone');renderZone()">✗</button><span style="flex:1;text-align:center;font-size:13px;color:var(--wrong-bright)">⚔️ Boss-Kampf — ${bossIdx+1}/10</span></div>`;
  html += `<div class="screen-content">`;
  html += `<div class="boss-health">
    <div class="health-bar-wrap">
      <div class="health-bar-label">Du</div>
      <div class="health-bar"><div class="health-fill health-player" id="player-hp" style="width:${bossPlayerHP}%"></div></div>
    </div>
    <div class="health-bar-wrap">
      <div class="health-bar-label">Boss</div>
      <div class="health-bar"><div class="health-fill health-boss" id="boss-hp" style="width:${bossBossHP}%"></div></div>
    </div>
  </div>`;
  html += `<div class="timer-circle" id="boss-timer">${bossTimeLeft}</div>`;
  html += `<div class="quiz-question"><p class="german-text">${q.q}</p></div>`;
  q.opts.forEach((opt,i)=>{
    html += `<button class="option-btn" id="bopt-${i}" onclick="checkBoss(${i},${q.a})">${opt}</button>`;
  });
  html += `</div>`;
  s.innerHTML = html;
  startBossTimer(q.a);
}

function startBossTimer(correct) {
  clearInterval(bossTimer);
  bossTimer = setInterval(()=>{
    bossTimeLeft--;
    const td = $('boss-timer');
    if(td) { td.textContent = bossTimeLeft; if(bossTimeLeft<=10) td.classList.add('urgent'); }
    if(bossTimeLeft<=0) {
      clearInterval(bossTimer);
      checkBoss(-1, correct);
    }
  }, 1000);
}

function checkBoss(chosen, correct) {
  clearInterval(bossTimer);
  const btns = document.querySelectorAll('#s-boss .option-btn');
  btns.forEach((b,i)=>{ b.disabled=true; if(i===correct) b.classList.add('correct'); else if(i===chosen) b.classList.add('wrong'); });
  if(chosen===correct) {
    bossCorrect++;
    bossBossHP = Math.max(0, bossBossHP - 10);
    flashReward('⚔️ Treffer!');
  } else {
    bossPlayerHP = Math.max(0, bossPlayerHP - 15);
    logWeakSpot('boss');
  }
  const php = $('player-hp'); if(php) php.style.width = bossPlayerHP+'%';
  const bhp = $('boss-hp'); if(bhp) bhp.style.width = bossBossHP+'%';
  if(bossPlayerHP <= 0) { clearInterval(bossTimer); renderBossResult(false); return; }
  bossIdx++;
  setTimeout(renderBossQ, 1000);
}

function renderBossResult(passed) {
  const s = $('s-boss'); if(!s) return;
  const z = CURRENT_ZONE;
  if(passed) {
    STATE.bossDefeated[z.id] = true;
    addXP(200, 150);
    STATE.sessionStats.sentences += 10;
    saveState();
  } else {
    STATE.gold = Math.max(0, STATE.gold-40);
    saveState();
  }
  let html = `<div id="hud" class="hud"></div><div class="screen-content" style="text-align:center;padding-top:40px">`;
  if(passed) {
    html += `<div style="font-size:60px">🏆</div><h2 style="color:var(--correct)">Boss besiegt!</h2>`;
    html += `<p>${bossCorrect}/10 richtig</p>`;
    html += `<div class="card" style="text-align:left"><div class="summary-stat"><span>XP gewonnen</span><span class="summary-val">+200</span></div><div class="summary-stat"><span>Gold gewonnen</span><span class="summary-val">+150</span></div></div>`;
    html += `<div class="bertram-wrap" style="text-align:left"><span class="bertram-fox">🦊</span><div class="bertram-bubble">Interessante Leistung. Zone ${z.id+1} wartet. Die Ausbildung wartet nicht.</div></div>`;
    html += `<button class="btn" onclick="showSummary()">→ Sessionszusammenfassung</button>`;
  } else {
    html += `<div style="font-size:60px">💀</div><h2 style="color:var(--wrong-bright)">Nicht bestanden</h2>`;
    html += `<p>${bossCorrect}/10 richtig. Benötigt: 9/10</p><p style="color:var(--text-muted)">-40 Gold Strafe</p>`;
    html += `<div class="bertram-wrap" style="text-align:left"><span class="bertram-fox">🦊</span><div class="bertram-bubble">Interessante Wahl. Falsch, aber interessant. Die Trials nochmal, dann nochmal kämpfen.</div></div>`;
    html += `<button class="btn btn-secondary" onclick="startBoss()">↺ Nochmal versuchen</button>`;
    html += `<button class="btn btn-secondary" onclick="showScreen('zone');renderZone()">← Zone zurück</button>`;
  }
  html += `</div>`;
  s.innerHTML = html;
  updateHUD();
}

// ============================================================
// DOPAMINE SUMMARY
// ============================================================
function showSummary() {
  const s = $('s-summary'); if(!s) return;
  showScreen('summary');
  const stats = STATE.sessionStats;
  let html = `<div id="hud" class="hud"></div><div class="screen-content" style="text-align:center;padding-top:24px">`;
  html += `<div style="font-size:60px">⭐</div>`;
  html += `<h2>Session abgeschlossen!</h2>`;
  html += `<div class="bertram-wrap" style="text-align:left;margin-top:16px"><span class="bertram-fox">🦊</span><div class="bertram-bubble">Dangote hat nicht in einem Tag gebaut. Du auch nicht. Aber du hast heute gebaut. Sei morgen wieder hier.</div></div>`;
  html += `<div class="card" style="text-align:left;margin-top:16px">`;
  html += `<div class="summary-stat"><span>📚 Sätze gelernt</span><span class="summary-val">${stats.sentences}</span></div>`;
  html += `<div class="summary-stat"><span>🔮 Hacks freigeschaltet</span><span class="summary-val">${stats.hacks}</span></div>`;
  html += `<div class="summary-stat"><span>⚡ XP verdient</span><span class="summary-val">+${stats.xpEarned}</span></div>`;
  html += `<div class="summary-stat"><span>🔥 Streak</span><span class="summary-val">${STATE.streak} Tage</span></div>`;
  html += `</div>`;
  html += `<button class="btn" style="margin-top:20px" onclick="showScreen('map');renderMap()">→ Zur Weltkarte</button>`;
  html += `<button class="btn btn-secondary" onclick="showScreen('start');renderStart()">🏠 Startseite</button>`;
  html += `</div>`;
  s.innerHTML = html;
  STATE.sessionStats = { sentences: 0, hacks: 0, xpEarned: 0 };
  saveState();
}

// ============================================================
// HACK JOURNAL
// ============================================================
function renderJournal() {
  const s = $('s-journal'); if(!s) return;
  const unlocked = HACKS.filter(h=>STATE.unlockedHacks.includes(h.id));
  const categories = ['Verb Hacks','Noun Hacks','Adjective Hacks','Vocabulary Hacks','Grammar Hacks','Pronunciation Hacks'];
  let html = `<div id="hud" class="hud"><button class="back-btn" onclick="showScreen('start');renderStart()">←</button><span style="flex:1;text-align:center;font-size:13px;color:var(--gold)">📖 Bertrams Journal</span></div>`;
  html += `<div class="screen-content">`;
  html += `<div class="bertram-wrap"><span class="bertram-fox">🦊</span><div class="bertram-bubble">${unlocked.length} von ${HACKS.length} Hacks gesammelt. Die Ausländerbehörde hat keine Shortcuts. Aber die Sprache hat welche.</div></div>`;
  if(unlocked.length === 0) {
    html += `<div class="card"><p>Noch keine Hacks freigeschaltet. Schließe Hack Lab Trials ab.</p></div>`;
  }
  unlocked.forEach(h=>{
    html += `<div class="hack-card"><div class="hack-title">🔮 ${h.title}</div><div class="hack-body">${h.body}</div><div class="hack-example">${h.example}</div></div>`;
  });
  // Show locked hacks dimmed
  const locked = HACKS.filter(h=>!STATE.unlockedHacks.includes(h.id));
  if(locked.length > 0) {
    html += `<p style="color:var(--text-muted);font-size:13px;margin:16px 0 8px">Noch gesperrt:</p>`;
    locked.forEach(h=>{
      html += `<div class="hack-card" style="opacity:0.3"><div class="hack-title">🔒 ${h.title}</div></div>`;
    });
  }
  html += `<button class="btn btn-secondary" style="margin-top:20px" onclick="showScreen('start');renderStart()">← Zurück</button>`;
  html += `</div>`;
  s.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================
function initApp() {
  const root = $('root');
  root.innerHTML = `
    <div id="s-start" class="screen"></div>
    <div id="s-map" class="screen hidden"></div>
    <div id="s-zone" class="screen hidden"></div>
    <div id="s-trial" class="screen hidden"></div>
    <div id="s-boss" class="screen hidden"></div>
    <div id="s-summary" class="screen hidden"></div>
    <div id="s-journal" class="screen hidden"></div>
    <div id="s-recap" class="screen hidden"></div>
  `;
  initSpeech();
  updateStreak();
  renderStart();
  showScreen('start');
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
