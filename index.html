<!DOCTYPE html>
<html lang="de">
<head>

  <title>Schattenreich · The Shadow Language</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #0a0020; --bg-mid: #1a0a3e; --surface: rgba(255,255,255,0.04);
      --border: rgba(255,215,0,0.2); --cream: #F5E6D3; --gold: #FFD700;
      --gold-dim: rgba(255,215,0,0.6); --slate: #7B8CA8; --correct: #7EC8A0;
      --wrong: #8B3A4A; --wrong-light: rgba(139,58,74,0.3);
      --correct-light: rgba(126,200,160,0.2); --panel: rgba(10,0,32,0.85);
      --card-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    body {
      background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
      min-height: 100vh; color: var(--cream);
      font-family: 'Crimson Text', Georgia, serif; overflow-x: hidden;
    }
    #schattenreich { min-height: 100vh; }
    .hud { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,0,32,0.92); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
    .hud-logo { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; flex-shrink: 0; }
    .hud-spacer { flex: 1; }
    .hud-stat { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--cream); }
    .hud-xp-bar { width: 80px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .hud-xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #ff9500); border-radius: 3px; transition: width 0.5s ease; }
    .hud-btn { background: var(--surface); border: 0.5px solid var(--border); color: var(--cream); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s ease; }
    .hud-btn:hover { background: rgba(255,215,0,0.1); border-color: var(--gold); }
    .world-map { padding: 100px 20px 40px; max-width: 900px; margin: 0 auto; }
    .map-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2rem; text-align: center; margin-bottom: 8px; }
    .map-subtitle { color: var(--slate); text-align: center; margin-bottom: 40px; font-style: italic; }
    .map-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
    .zone-node { width: 120px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 16px 10px; cursor: pointer; text-align: center; transition: all 0.3s ease; position: relative; }
    .zone-node:hover:not(.locked) { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(255,215,0,0.2); border-color: var(--gold); }
    .zone-node.locked { opacity: 0.4; cursor: not-allowed; }
    .zone-node.locked::after { content: "🔒"; position: absolute; top: 4px; right: 4px; font-size: 0.7rem; }
    .zone-node.completed { border-color: var(--gold); background: rgba(255,215,0,0.08); }
    .zone-node.completed::after { content: "✓"; position: absolute; top: 4px; right: 6px; color: var(--gold); font-size: 0.8rem; }
    .zone-emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }
    .zone-name { font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--gold); letter-spacing: 0.5px; display: block; margin-bottom: 2px; }
    .zone-level { color: var(--slate); font-size: 0.65rem; }
    .zone-view { padding: 90px 20px 40px; max-width: 700px; margin: 0 auto; }
    .zone-header { text-align: center; margin-bottom: 32px; }
    .zone-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; margin-bottom: 4px; }
    .zone-subtitle-text { color: var(--slate); font-style: italic; }
    .trial-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .trial-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s ease; position: relative; }
    .trial-card:hover:not(.locked-trial) { transform: translateY(-3px); box-shadow: var(--card-shadow); border-color: var(--gold); }
    .trial-card.locked-trial { opacity: 0.5; cursor: not-allowed; }
    .trial-card.done { border-color: var(--correct); background: var(--correct-light); }
    .trial-icon { font-size: 2rem; margin-bottom: 8px; }
    .trial-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; }
    .trial-desc { color: var(--slate); font-size: 0.75rem; margin-top: 4px; }
    .boss-card { background: rgba(139,58,74,0.15); border: 0.5px solid rgba(139,58,74,0.5); border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
    .boss-card:hover:not(.locked-trial) { background: rgba(139,58,74,0.25); transform: translateY(-3px); }
    .boss-card.defeated { border-color: var(--gold); background: rgba(255,215,0,0.08); }
    .boss-name { font-family: 'Cinzel', serif; color: #ff6b8a; font-size: 1.1rem; }
    .trial-container { padding: 90px 20px 40px; max-width: 700px; margin: 0 auto; }
    .trial-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .trial-header h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.3rem; }
    .back-btn { background: none; border: 0.5px solid var(--border); color: var(--slate); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    .back-btn:hover { color: var(--cream); border-color: var(--gold); }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #ff9500); border-radius: 2px; transition: width 0.4s ease; }
    .vocab-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; box-shadow: var(--card-shadow); transition: all 0.3s ease; margin-bottom: 24px; }
    .vocab-card.flash-correct { box-shadow: 0 0 40px rgba(255,215,0,0.6), var(--card-shadow); border-color: var(--gold); }
    .vocab-card.flash-wrong { box-shadow: 0 0 40px rgba(139,58,74,0.6), var(--card-shadow); border-color: var(--wrong); }
    .vocab-article { color: var(--slate); font-size: 0.9rem; margin-bottom: 4px; }
    .vocab-de { font-family: Georgia, serif; font-size: 2.2rem; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
    .vocab-example { color: var(--slate); font-size: 0.8rem; font-style: italic; }
    .speak-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--gold-dim); transition: color 0.3s; margin-left: 8px; }
    .speak-btn:hover { color: var(--gold); }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .option-btn { background: var(--surface); border: 0.5px solid var(--border); color: var(--cream); padding: 14px 16px; border-radius: 12px; cursor: pointer; font-size: 0.95rem; font-family: inherit; transition: all 0.3s ease; }
    .option-btn:hover:not(:disabled) { background: rgba(255,215,0,0.08); border-color: var(--gold); transform: translateY(-2px); }
    .option-btn.correct { background: var(--correct-light); border-color: var(--correct); color: var(--correct); }
    .option-btn.wrong { background: var(--wrong-light); border-color: var(--wrong); color: #e87a8a; }
    .option-btn:disabled { cursor: default; }
    .chip-pool { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 0.5px solid var(--border); margin-bottom: 16px; }
    .word-chip { background: rgba(123,140,168,0.2); border: 0.5px solid var(--slate); color: var(--cream); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: Georgia, serif; transition: all 0.2s; }
    .word-chip:hover { background: rgba(255,215,0,0.1); border-color: var(--gold); transform: translateY(-2px); }
    .word-chip.placed { opacity: 0.3; cursor: default; }
    .build-area { min-height: 60px; padding: 12px; background: rgba(255,215,0,0.04); border: 0.5px dashed var(--gold-dim); border-radius: 12px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
    .placed-chip { background: rgba(255,215,0,0.12); border: 0.5px solid var(--gold-dim); color: var(--gold); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: Georgia, serif; transition: all 0.2s; }
    .placed-chip:hover { background: rgba(139,58,74,0.2); border-color: var(--wrong); }
    .build-area.shake { animation: shake 0.4s ease; }
    .translation-hint { color: var(--slate); font-size: 0.8rem; font-style: italic; margin-bottom: 12px; }
    .listen-textarea { width: 100%; background: var(--surface); border: 0.5px solid var(--border); color: var(--cream); padding: 14px; border-radius: 12px; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 80px; outline: none; }
    .listen-textarea:focus { border-color: var(--gold-dim); }
    .diff-result { display: flex; flex-wrap: wrap; gap: 6px; padding: 16px; background: var(--surface); border-radius: 12px; border: 0.5px solid var(--border); margin-top: 12px; }
    .diff-word { padding: 4px 8px; border-radius: 6px; font-family: Georgia, serif; }
    .diff-correct { background: var(--correct-light); color: var(--correct); }
    .diff-wrong { background: var(--wrong-light); color: #e87a8a; }
    .prompt-box { font-size: 1.1rem; color: var(--cream); padding: 24px; background: var(--surface); border-radius: 16px; border: 0.5px solid var(--border); margin-bottom: 20px; text-align: center; }
    .record-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(139,58,74,0.3); border: 2px solid var(--wrong); color: #ff6b8a; font-size: 2rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; margin: 20px auto; }
    .record-btn.recording { background: rgba(139,58,74,0.6); border-color: #ff4466; animation: pulse 1s infinite; box-shadow: 0 0 20px rgba(139,58,74,0.6); }
    .self-rate { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
    .rate-btn { padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.3s; }
    .rate-needs { background: rgba(139,58,74,0.2); border: 0.5px solid var(--wrong); color: #e87a8a; }
    .rate-good { background: var(--correct-light); border: 0.5px solid var(--correct); color: var(--correct); }
    .boss-screen { padding: 90px 20px 40px; max-width: 700px; margin: 0 auto; }
    .boss-title { font-family: 'Cinzel', serif; color: #ff6b8a; font-size: 2rem; text-align: center; margin-bottom: 6px; text-shadow: 0 0 20px rgba(139,58,74,0.8); }
    .boss-subtitle { color: var(--slate); text-align: center; font-style: italic; margin-bottom: 32px; }
    .timer-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
    .timer-fill { height: 100%; background: linear-gradient(90deg, var(--correct), var(--gold)); border-radius: 2px; transition: width 0.5s linear; }
    .boss-question { font-family: Georgia, serif; font-size: 1.2rem; color: var(--cream); margin-bottom: 24px; text-align: center; padding: 20px; background: var(--surface); border-radius: 12px; border: 0.5px solid rgba(139,58,74,0.4); }
    .boss-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .score-display { text-align: center; padding: 40px; }
    .score-num { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold); }
    .score-label { color: var(--slate); }
    .grammar-card { background: rgba(123,140,168,0.08); border: 0.5px solid rgba(123,140,168,0.3); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .grammar-title { font-family: 'Cinzel', serif; color: var(--slate); font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 6px; }
    .grammar-rule { color: var(--cream); font-size: 0.85rem; margin-bottom: 8px; }
    .grammar-example { color: var(--gold-dim); font-family: Georgia, serif; font-size: 0.9rem; font-style: italic; }

    .artifact-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.3s; }

    .fox { position: fixed; bottom: 20px; left: 20px; z-index: 200; cursor: pointer; }
    .fox-svg { animation: float 3s ease-in-out infinite; display: block; }
    .fox-bubble { position: absolute; bottom: 65px; left: 0; background: rgba(10,0,32,0.95); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; max-width: 260px; font-size: 0.8rem; color: var(--cream); line-height: 1.5; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: normal; }
    .fox-bubble.visible { opacity: 1; }

    .toast { position: fixed; top: 80px; right: 20px; background: rgba(10,0,32,0.95); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 0.85rem; z-index: 500; transition: all 0.3s ease; transform: translateX(120%); }
    .toast.show { transform: translateX(0); }
    .toast.correct-toast { border-color: var(--correct); color: var(--correct); }
    .toast.wrong-toast { border-color: var(--wrong); color: #e87a8a; }
    .btn-gold { background: rgba(255,215,0,0.1); border: 0.5px solid var(--gold); color: var(--gold); padding: 12px 24px; border-radius: 12px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 1px; transition: all 0.3s; }
    .btn-gold:hover { background: rgba(255,215,0,0.2); box-shadow: 0 4px 16px rgba(255,215,0,0.2); }
    .btn-ghost { background: none; border: 0.5px solid var(--border); color: var(--slate); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.3s; }

    .flex-center { display: flex; align-items: center; justify-content: center; }
    .text-center { text-align: center; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-16 { margin-bottom: 16px; }
    .page-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
    .section-label { font-family: 'Cinzel', serif; color: var(--slate); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    /* Flashcard preview */
    .flashcard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .flashcard-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; }
    .flashcard-item:hover { border-color: var(--gold); transform: translateY(-3px); }
    .flashcard-front { color: var(--gold); font-family: Georgia, serif; font-size: 1.2rem; font-weight: 600; }
    .flashcard-back { color: var(--slate); margin-top: 8px; font-size: 0.85rem; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(139,58,74,0.6)} 50%{box-shadow:0 0 40px rgba(139,58,74,0.9)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation: fadeIn 0.4s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 3px; }
    @media (max-width: 600px) {
      .trial-grid { grid-template-columns: 1fr; }
      .options-grid, .boss-options { grid-template-columns: 1fr; }
      .zone-node { width: 90px; padding: 12px 6px; }
      .map-row { gap: 10px; }
    }
  </style>
</head>

    // Audio utilities
    let germanVoice = null;
    const initVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      const preferred = ["Google Deutsch","Anna","Markus","Microsoft Hedda","de-DE"];
      for (const p of preferred) {
        const v = voices.find(v => v.name.includes(p) || v.lang.startsWith("de"));
        if (v) { germanVoice = v; break; }
      }
      if (!germanVoice) germanVoice = voices.find(v => v.lang.startsWith("de")) || null;
    };
    if (typeof window !== "undefined") {
      window.speechSynthesis.onvoiceschanged = initVoice;
      setTimeout(initVoice, 500);
    }
    const speak = (text, rate = 0.85, pitch = 1.1) => {
      if (!text) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      if (germanVoice) utt.voice = germanVoice;
      utt.lang = "de-DE";
      utt.rate = rate;
      utt.pitch = pitch;
      utt.volume = 1.0;
      window.speechSynthesis.speak(utt);
    };
    const playTone = (freq, dur, type = "sine") => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = type;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur / 1000);
        osc.start(); osc.stop(ctx.currentTime + dur / 1000);
      } catch(e) {}
    };

    const SAVE_KEY = "schattenreich_save";
    const initialState = {
      screen: "map", currentZone: 1, trialZone: null, trialType: null,

      artifacts: [], streak: { count: 0, lastDate: null },
      settings: { ttsRate: 0.85, audioOn: true },
    };
    const getLevelFromXp = xp => Math.floor(xp / 500) + 1;
    const reducer = (state, action) => {
      switch (action.type) {
        case "LOAD": return { ...state, ...action.payload };
        case "GOTO": return { ...state, screen: action.screen, trialZone: action.zone ?? state.trialZone, trialType: action.trialType ?? state.trialType, currentZone: action.zone ?? state.currentZone };
        case "EARN_XP": { const xp = state.xp + action.amount; return { ...state, xp, level: getLevelFromXp(xp) }; }
        case "EARN_GOLD": return { ...state, gold: Math.max(0, state.gold + action.amount) };
        case "COMPLETE_TRIAL": {
          return { ...state, completedTrials: { ...state.completedTrials, [action.zone]: { ...(state.completedTrials[action.zone] || {}), [action.trial]: true } } };
        }
        case "DEFEAT_BOSS": return { ...state, bossDefeated: [...new Set([...state.bossDefeated, action.zone])] };
        case "ADD_ARTIFACT": return { ...state, artifacts: [...state.artifacts, action.artifact] };
        case "SET_SETTING": return { ...state, settings: { ...state.settings, [action.key]: action.value } };
        case "UPDATE_STREAK": {
          const today = new Date().toISOString().slice(0, 10);
          const { lastDate, count } = state.streak;
          const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
          const newCount = lastDate === today ? count : lastDate === yesterday ? count + 1 : 1;
          return { ...state, streak: { count: newCount, lastDate: today } };
        }
        default: return state;
      }
    };

    function TrialLexicon({ state, dispatch, setFoxMsg, showToast }) {

        return [...wrongs, word.en].sort(() => Math.random() - 0.5);
      });
      useEffect(() => {

        if (selected !== null) return;

        else { dispatch({ type: "EARN_GOLD", amount: -2 }); playTone(150, 150, "square"); setFoxMsg(`Nicht ganz. Die richtige Antwort: "${word.en}"`); showToast("−2 Gold", "wrong"); }
        setTimeout(() => { if (idx < vocab.length - 1) setIdx(i => i + 1); else { dispatch({ type: "COMPLETE_TRIAL", zone: state.trialZone, trial: "lexicon" }); dispatch({ type: "ADD_ARTIFACT", artifact: { word: word.de, emoji: zone.artifact.emoji, zoneId: zone.id } }); setDone(true); } }, 1500);

          <div className="progress-bar"><div className="progress-fill" style={{ width: `${(idx / vocab.length) * 100}%` }}/></div>

            <div className="vocab-example" onClick={() => speak(word.example)}>{word.example} <span>🔊</span></div>
          </div>
          <div className="options-grid">{opts.map((opt, i) => (<button key={i} className={`option-btn ${selected !== null ? (opt === word.en ? "correct" : opt === selected ? "wrong" : "") : ""}`} disabled={selected !== null} onClick={() => handleSelect(opt)}>{opt}</button>))}</div>
        </div>

    function TrialSentence({ state, dispatch, setFoxMsg, showToast }) {
      const zone = ZONES[state.trialZone - 1];
      const allSentences = zone.sentences;
      const [roundSentences, setRoundSentences] = useState(() => shuffleArray(allSentences).slice(0, 5));
      const [idx, setIdx] = useState(0);
      const [placed, setPlaced] = useState([]);
      const [shake, setShake] = useState(false);
      const [checked, setChecked] = useState(null);
      const [done, setDone] = useState(false);
      const sent = roundSentences[idx];
      const [chips, setChips] = useState(() => [...sent.parts].sort(() => Math.random() - 0.5).map((word, i) => ({ word, id: i, used: false })));
      useEffect(() => { setChips([...sent.parts].sort(() => Math.random() - 0.5).map((word, i) => ({ word, id: i, used: false }))); setPlaced([]); setChecked(null); }, [idx]);
      const placeChip = (chip) => { if (chip.used || checked) return; setChips(c => c.map(ch => ch.id === chip.id ? { ...ch, used: true } : ch)); setPlaced(p => [...p, chip]); };
      const removeChip = (chip) => { if (checked) return; setPlaced(p => p.filter(c => c.id !== chip.id)); setChips(c => c.map(ch => ch.id === chip.id ? { ...ch, used: false } : ch)); };
      const check = () => {
        const answer = placed.map(c => c.word).join(" ");
        if (answer.toLowerCase() === sent.parts.join(" ").toLowerCase()) {
          setChecked("correct"); dispatch({ type: "EARN_XP", amount: 20 }); dispatch({ type: "EARN_GOLD", amount: 10 }); speak(sent.parts.join(" ")); playTone(880, 120); setTimeout(() => playTone(1100, 120), 150); setFoxMsg("Richtig. Der Nebel weicht."); showToast("+20 XP · +10 Gold", "correct");
          setTimeout(() => { if (idx < roundSentences.length - 1) setIdx(i => i + 1); else { dispatch({ type: "COMPLETE_TRIAL", zone: state.trialZone, trial: "sentence" }); setDone(true); } }, 1800);
        } else {
          setShake(true); setTimeout(() => setShake(false), 500); playTone(160, 200, "square"); setFoxMsg("Das Verb steht an zweiter Stelle. Versuche es nochmal."); showToast("Versuch es noch einmal", "wrong");
          setPlaced([]); setChips(c => c.map(ch => ({ ...ch, used: false })));
        }
      };
      if (done) return (<div className="trial-container animate-in text-center"><div style={{ fontSize: "3rem" }}>⚒️</div><h2 style={{ fontFamily: "Cinzel, serif", color: "var(--gold)" }}>Schmiede geschlossen!</h2><p style={{ color: "var(--slate)" }}>Alle Sätze gebaut.</p><button className="btn-gold mt-16" onClick={() => dispatch({ type: "GOTO", screen: "zone" })}>← Zone</button></div>);
      return (
        <div className="trial-container animate-in">
          <div className="trial-header"><button className="back-btn" onClick={() => dispatch({ type: "GOTO", screen: "zone" })}>← Zone</button><h2>⚒️ Satz-Schmiede</h2></div>
          <div className="progress-bar"><div className="progress-fill" style={{ width: `${(idx / roundSentences.length) * 100}%` }}/></div>
          <p className="translation-hint">📖 {sent.translation}</p>
          <p className="section-label">Verfügbare Wörter</p>
          <div className="chip-pool">{chips.map(chip => (<div key={chip.id} className={`word-chip ${chip.used ? "placed" : ""}`} onClick={() => placeChip(chip)}>{chip.word}</div>))}</div>
          <p className="section-label">Dein Satz</p>
          <div className={`build-area ${shake ? "shake" : ""}`}>
            {placed.length === 0 && <span style={{ color: "var(--slate)", fontSize: "0.8rem" }}>Wörter antippen...</span>}
            {placed.map(chip => (<div key={chip.id} className="placed-chip" onClick={() => removeChip(chip)}>{chip.word}</div>))}
          </div>
          <div className="flex-center mt-16"><button className="btn-gold" onClick={check} disabled={placed.length === 0 || checked}>Prüfen</button></div>
        </div>
      );
    }

    function TrialListening({ state, dispatch, setFoxMsg, showToast }) {
      const zone = ZONES[state.trialZone - 1];
      const allDictation = zone.dictation;
      const [roundSentences, setRoundSentences] = useState(() => shuffleArray(allDictation).slice(0, 5));
      const [idx, setIdx] = useState(0);
      const [input, setInput] = useState("");
      const [result, setResult] = useState(null);
      const [done, setDone] = useState(false);
      const [totalScore, setTotalScore] = useState(0);
      const playSentence = () => speak(roundSentences[idx], 0.75);
      const submit = () => {
        const target = roundSentences[idx].toLowerCase().replace(/[.,!?]/g, "");
        const answer = input.toLowerCase().replace(/[.,!?]/g, "");
        const tWords = target.split(/\s+/);
        const aWords = answer.split(/\s+/);
        const diffs = tWords.map((w, i) => ({ word: w, correct: aWords[i] === w }));
        const score = Math.round((diffs.filter(d => d.correct).length / tWords.length) * 100);
        setResult({ diffs, score }); setTotalScore(s => s + score);
        const xp = Math.round(score / 100 * 15); dispatch({ type: "EARN_XP", amount: xp });
        if (score >= 80) { playTone(800, 100); setFoxMsg("Sehr gut! Du hörst gut zu."); showToast(`+${xp} XP · ${score}%`, "correct"); }
        else { playTone(200, 200); setFoxMsg(`${score}% richtig. Höre nochmal zu.`); showToast(`${score}% · +${xp} XP`, "wrong"); }
        setTimeout(() => { if (idx < roundSentences.length - 1) { setIdx(i => i + 1); setInput(""); setResult(null); } else { dispatch({ type: "COMPLETE_TRIAL", zone: state.trialZone, trial: "listening" }); setDone(true); } }, 2500);
      };
      if (done) return (<div className="trial-container animate-in text-center"><div style={{ fontSize: "3rem" }}>👂</div><h2 style={{ fontFamily: "Cinzel, serif", color: "var(--gold)" }}>Gewölbe erkundet!</h2><p style={{ color: "var(--slate)" }}>Durchschnitt: {Math.round(totalScore / roundSentences.length)}%</p><button className="btn-gold mt-16" onClick={() => dispatch({ type: "GOTO", screen: "zone" })}>← Zone</button></div>);
      return (
        <div className="trial-container animate-in">
          <div className="trial-header"><button className="back-btn" onClick={() => dispatch({ type: "GOTO", screen: "zone" })}>← Zone</button><h2>👂 Hör-Gewölbe</h2></div>
          <div className="progress-bar"><div className="progress-fill" style={{ width: `${(idx / roundSentences.length) * 100}%` }}/></div>
          <div className="text-center mb-16"><button className="btn-gold" onClick={playSentence}>🔊 Anhören</button><p style={{ color: "var(--slate)", fontSize: "0.8rem", marginTop: "8px" }}>Klicke mehrmals zum Anhören</p></div>
          <p className="section-label">Was hörst du?</p>
          <textarea className="listen-textarea" value={input} onChange={e => setInput(e.target.value)} placeholder="Schreibe den deutschen Satz..." disabled={result !== null}/>
          {result && (<><div className="diff-result">{result.diffs.map((d, i) => (<span key={i} className={`diff-word ${d.correct ? "diff-correct" : "diff-wrong"}`}>{d.word}</span>))}</div><p style={{ textAlign: "center", marginTop: "8px", color: result.score >= 80 ? "var(--correct)" : "#e87a8a" }}>{result.score}% korrekt</p></>)}
          {!result && (<div className="flex-center mt-16"><button className="btn-gold" onClick={submit} disabled={!input.trim()}>Einreichen</button></div>)}
        </div>
      );
    }

    function TrialSpeaking({ state, dispatch, setFoxMsg, showToast }) {
      const zone = ZONES[state.trialZone - 1];
      const prompts = zone.speaking.slice(0, 3);
      const [idx, setIdx] = useState(0);
      const [recording, setRecording] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [rated, setRated] = useState(false);
      const [done, setDone] = useState(false);
      const mediaRef = useRef(null);
      const chunksRef = useRef([]);
      const startRec = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRef.current = new MediaRecorder(stream);
          chunksRef.current = [];
          mediaRef.current.ondataavailable = e => chunksRef.current.push(e.data);
          mediaRef.current.onstop = () => { const blob = new Blob(chunksRef.current, { type: "audio/webm" }); setAudioUrl(URL.createObjectURL(blob)); stream.getTracks().forEach(t => t.stop()); };
          mediaRef.current.onerror = () => { setFoxMsg("Aufnahme fehlgeschlagen. Überprüfe die Mikrofon‑Erlaubnis. 📴"); setRecording(false); };
          mediaRef.current.start();
          setRecording(true);
        } catch (err) { setFoxMsg("Mikrofon nicht erlaubt oder nicht verfügbar. Du kannst trotzdem üben und dich selbst bewerten. 💬"); setRecording(false); }
      };
      const stopRec = () => { if (mediaRef.current?.state === "recording") mediaRef.current.stop(); setRecording(false); };
      const rate = (good) => {
        const xp = good ? 20 : 10; dispatch({ type: "EARN_XP", amount: xp }); dispatch({ type: "EARN_GOLD", amount: good ? 8 : 3 }); showToast(`+${xp} XP`, "correct");
        setFoxMsg(good ? "Ausgezeichnet. Du klingst authentisch." : "Übung macht den Meister."); setRated(true);
        setTimeout(() => { if (idx < prompts.length - 1) { setIdx(i => i + 1); setAudioUrl(null); setRated(false); } else { dispatch({ type: "COMPLETE_TRIAL", zone: state.trialZone, trial: "speaking" }); setDone(true); } }, 1500);
      };
      if (done) return (<div className="trial-container animate-in text-center"><div style={{ fontSize: "3rem" }}>🗣️</div><h2 style={{ fontFamily: "Cinzel, serif", color: "var(--gold)" }}>Sprech‑Halle verlassen!</h2><p style={{ color: "var(--slate)" }}>Deine Stimme hallt durch das Gewölbe.</p><button className="btn-gold mt-16" onClick={() => dispatch({ type: "GOTO", screen: "zone" })}>← Zone</button></div>);
      return (
        <div className="trial-container animate-in">
          <div className="trial-header"><button className="back-btn" onClick={() => dispatch({ type: "GOTO", screen: "zone" })}>← Zone</button><h2>🗣️ Sprech‑Halle</h2></div>
          <div className="progress-bar"><div className="progress-fill" style={{ width: `${(idx / prompts.length) * 100}%` }}/></div>
          <div className="prompt-box">{prompts[idx]}</div>
          <div className="flex-center"><button className={`record-btn ${recording ? "recording" : ""}`} onClick={recording ? stopRec : startRec}>{recording ? "⏹" : "🎙"}</button></div>
          <p style={{ color: "var(--slate)", textAlign: "center", fontSize: "0.8rem", marginBottom: "16px" }}>{recording ? "Aufnahme läuft..." : "Drücke zum Aufnehmen"}</p>
          {audioUrl && (<div style={{ marginBottom: "16px" }}><audio key={audioUrl} src={audioUrl} controls style={{ width: "100%", marginBottom: "8px" }}/><button className="btn-ghost" style={{ display: "block", margin: "0 auto" }} onClick={() => speak(zone.sentences[0]?.parts.join(" ") || zone.dictation[0], 0.75)}>🔊 Modelllösung anhören</button></div>)}
          {!rated && (<div className="self-rate"><button className="rate-btn rate-needs" onClick={() => rate(false)}>Brauche Übung (+10 XP)</button><button className="rate-btn rate-good" onClick={() => rate(true)}>Gut genug! (+20 XP)</button></div>)}
        </div>
      );
    }

    function BossBattle({ state, dispatch, setFoxMsg, showToast }) {
      const zone = ZONES[state.trialZone - 1];
      const questions = zone.boss.slice(0, 10);
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [timer, setTimer] = useState(45);
      const [score, setScore] = useState(0);
      const [done, setDone] = useState(false);
      const timerRef = useRef(null);
      const handleSelectRef = useRef(null);
      const advance = () => { if (idx < questions.length - 1) { setIdx(i => i + 1); setSelected(null); setTimer(45); } else setDone(true); };
      const handleSelect = (optIdx) => {
        if (selected !== null) return;
        clearInterval(timerRef.current);
        const correct = optIdx === questions[idx].correct;
        setSelected(optIdx);
        if (correct) { setScore(s => s + 1); playTone(880, 100); showToast("Richtig! +1", "correct"); }
        else { playTone(120, 250, "sawtooth"); showToast(`Falsch. Richtig: ${questions[idx].opts[questions[idx].correct]}`, "wrong"); }
        setTimeout(advance, 1600);
      };
      useEffect(() => { handleSelectRef.current = handleSelect; }, [idx, selected]);
      useEffect(() => {
        timerRef.current = setInterval(() => { setTimer(t => { if (t <= 1) { if (handleSelectRef.current) handleSelectRef.current(-1); return 45; } return t - 1; }); }, 1000);
        return () => clearInterval(timerRef.current);
      }, [idx]);
      useEffect(() => {
        if (done) {
          const passed = score / questions.length >= 0.8;
          if (passed) { dispatch({ type: "EARN_XP", amount: 200 }); dispatch({ type: "EARN_GOLD", amount: 150 }); dispatch({ type: "DEFEAT_BOSS", zone: state.trialZone }); dispatch({ type: "UPDATE_STREAK" }); setFoxMsg("Der Wächter ist gefallen. Der Weg ist frei."); }
          else { dispatch({ type: "EARN_GOLD", amount: -40 }); setFoxMsg("Der Nebel bleibt... Versuche es erneut."); }
        }
      }, [done]);
      if (done) {
        const pct = Math.round(score / questions.length * 100); const passed = pct >= 80;
        return (<div className="boss-screen animate-in text-center"><div style={{ fontSize: "3rem", marginBottom: "16px" }}>{passed ? "🏆" : "💀"}</div><h1 className="boss-title">{passed ? "Sieg!" : "Der Nebel bleibt..."}</h1><div className="score-display"><div className="score-num">{pct}%</div><div className="score-label">{score} / {questions.length} richtig</div><p style={{ color: "var(--slate)", marginTop: "12px" }}>{passed ? `+200 XP · +150 Gold · Zone ${state.trialZone + 1} freigeschaltet!` : "−40 Gold · Versuche es erneut."}</p></div><button className="btn-gold" onClick={() => dispatch({ type: "GOTO", screen: passed ? "map" : "zone" })}>{passed ? "→ Karte" : "↺ Nochmal"}</button></div>);
      }
      const q = questions[idx];
      return (
        <div className="boss-screen animate-in">
          <h1 className="boss-title">💀 Der Wächter</h1>
          <p className="boss-subtitle">{zone.name} · Frage {idx + 1}/{questions.length}</p>
          <div className="timer-bar"><div className="timer-fill" style={{ width: `${(timer / 45) * 100}%` }}/></div>
          <div className="boss-question">{q.q}<button className="speak-btn" onClick={() => speak(q.q, 0.7, 0.5)}>🔊</button></div>
          <div className="boss-options">{q.opts.map((opt, i) => (<button key={i} className={`option-btn ${selected !== null ? (i === q.correct ? "correct" : i === selected ? "wrong" : "") : ""}`} disabled={selected !== null} onClick={() => handleSelect(i)}>{opt}</button>))}</div>
        </div>
      );
    }

        try {
          const saved = localStorage.getItem(SAVE_KEY);
          if (saved) dispatch({ type: "LOAD", payload: JSON.parse(saved) });
        } catch {}
      }, []);
      useEffect(() => {
        clearTimeout(saveRef.current);
        saveRef.current = setTimeout(() => {
          try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch {}
        }, 500);
      }, [state]);
      useEffect(() => {
        const msgs = ["The fog waits…","Jedes Wort ist ein Schritt.","The silence fears you.","Spreche mutig, Wanderer.","Der Nebel weicht langsam."];
        const t = setInterval(() => setFoxMsg(msgs[Math.floor(Math.random() * msgs.length)]), 60000);

      }, []);

      const renderScreen = () => {

          case "map": return <WorldMap state={state} dispatch={dispatch}/>;
          case "zone": return <ZoneView state={state} dispatch={dispatch}/>;
          case "trial-lexicon": return <TrialLexicon state={state} dispatch={dispatch} setFoxMsg={setFoxMsg} showToast={showToast}/>;
          case "trial-sentence": return <TrialSentence state={state} dispatch={dispatch} setFoxMsg={setFoxMsg} showToast={showToast}/>;
          case "trial-listening": return <TrialListening state={state} dispatch={dispatch} setFoxMsg={setFoxMsg} showToast={showToast}/>;
          case "trial-speaking": return <TrialSpeaking state={state} dispatch={dispatch} setFoxMsg={setFoxMsg} showToast={showToast}/>;
          case "boss": return <BossBattle state={state} dispatch={dispatch} setFoxMsg={setFoxMsg} showToast={showToast}/>;
          case "vault": return <Vault state={state} dispatch={dispatch}/>;
          case "shop": return <Shop state={state} dispatch={dispatch}/>;
          default: return <WorldMap state={state} dispatch={dispatch}/>;
        }
      };

      if (!started) {
        return (
          <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"20px" }}>
            <div style={{ fontSize:"4rem", marginBottom:"16px" }}>🏰</div>
            <h1 style={{ fontFamily:"Cinzel, serif", color:"var(--gold)", fontSize:"2rem", marginBottom:"12px" }}>Schattenreich</h1>
            <p style={{ color:"var(--slate)", marginBottom:"36px", textAlign:"center" }}>The Shadow Language awaits.</p>
            <button
              onClick={() => {
                setStarted(true);
                const utt = new SpeechSynthesisUtterance(" ");
                utt.volume = 0;
                window.speechSynthesis.speak(utt);
                speak("Willkommen, Wanderer.");
                dispatch({ type: "GOTO", screen: "map" });
              }}
              className="btn-gold"
              style={{ fontSize:"1.2rem", padding:"14px 32px" }}
            >
              Enter the Shadow Realm
            </button>
            <p style={{ color:"var(--slate)", fontSize:"0.75rem", marginTop:"20px" }}>Tap to begin – audio will work after this.</p>
          </div>
        );
      }

      return (
        <div id="schattenreich">
          <HUD state={state} dispatch={dispatch}/>
          {renderScreen()}
          <FoxCompanion message={foxMsg} onTap={() => { if (foxMsg) speak(foxMsg, 0.8); }}/>
          <Toast msg={toast.msg} type={toast.type}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("schattenreich")).render(<App />);
  </script>
</body>
</html>
