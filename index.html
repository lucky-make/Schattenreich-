<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Unlocked — Das Spiel v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --dark: #111111;
  --card: #181818;
  --border: #2a2a2a;
  --gold: #d4a017;
  --gold-light: #f0c040;
  --red: #c0392b;
  --green: #27ae60;
  --blue: #2980b9;
  --text: #e8e8e0;
  --muted: #888;
  --accent: #e8c84a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  line-height: 1.6;
  min-height: 100vh;
}
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* TITLE */
#title-screen {
  background: var(--black);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
#title-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(212,160,23,0.04) 40px,rgba(212,160,23,0.04) 41px);
  pointer-events: none;
}
.title-flag { font-size: 4rem; margin-bottom: 1rem; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.title-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem,12vw,7rem);
  letter-spacing: 0.06em;
  color: var(--accent);
  text-shadow: 0 0 40px rgba(232,200,74,0.3);
  line-height: 1;
}
.title-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 0.5rem 0 2rem;
}
.stats-bar { display: flex; gap: 2rem; justify-content: center; margin: 1.5rem 0 2.5rem; flex-wrap: wrap; }
.stat-pill {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 0.4rem 1rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--accent);
}
.btn-primary {
  background: var(--accent);
  color: var(--black);
  border: none;
  padding: 1rem 3rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-block;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
.btn-secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.6rem 1.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* MAP */
#map-screen { background: var(--dark); }
.map-header {
  background: var(--black);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.map-header-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--accent); }
.xp-bar-wrap { flex: 1; min-width: 160px; max-width: 280px; }
.xp-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 4px; }
.xp-bar { height: 6px; background: var(--border); position: relative; }
.xp-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; }
.gold-badge { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--accent); border: 1px solid var(--accent); padding: 0.3rem 0.8rem; }
.map-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
  gap: 1px;
  background: var(--border);
  padding: 1px;
  flex: 1;
}
.lesson-card {
  background: var(--card);
  padding: 1.4rem;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  position: relative;
}
.lesson-card:hover { background: #1e1e1e; border-left-color: var(--accent); }
.lesson-card.locked { opacity: 0.4; cursor: not-allowed; }
.lesson-card.completed { border-left-color: var(--green); }
.lesson-card.active-lesson { border-left-color: var(--accent); }
.card-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--border); line-height: 1; margin-bottom: 0.3rem; }
.lesson-card.completed .card-num { color: var(--green); }
.lesson-card.active-lesson .card-num { color: var(--accent); }
.card-title { font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text); margin-bottom: 0.4rem; line-height: 1.3; }
.card-meta { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; }
.card-stars { color: var(--accent); font-size: 0.8rem; margin-top: 0.4rem; }
.lock-icon { position: absolute; top: 1rem; right: 1rem; font-size: 1.1rem; }

/* LESSON */
#lesson-screen { background: var(--dark); }
.lesson-header {
  background: var(--black);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.2rem;
  flex-wrap: wrap;
}
.back-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  cursor: pointer; letter-spacing: 0.1em; padding: 0.4rem 0.8rem;
  transition: all 0.2s;
}
.back-btn:hover { color: var(--accent); border-color: var(--accent); }
.lesson-title-bar { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.06em; color: var(--accent); flex: 1; }
.progress-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.dot.done { background: var(--green); }
.dot.current { background: var(--accent); }
.lesson-body { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 760px; margin: 0 auto; width: 100%; }
.tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab {
  padding: 0.6rem 1.2rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  background: none;
  border-top: none; border-left: none; border-right: none;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* EXPLANATION PANEL */
.explanation-panel {
  background: linear-gradient(135deg, #0f0f0f, #1a1400);
  border: 1px solid rgba(232,200,74,0.3);
  border-left: 4px solid var(--accent);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  position: relative;
}
.explanation-panel h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 0.75rem;
}
.explanation-panel p {
  color: rgba(232,232,224,0.85);
  line-height: 1.8;
  font-size: 1rem;
  margin-bottom: 0.5rem;
}
.explanation-panel .key-points {
  margin-top: 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.key-point {
  background: rgba(232,200,74,0.1);
  border: 1px solid rgba(232,200,74,0.25);
  padding: 0.3rem 0.7rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: var(--accent);
  letter-spacing: 0.05em;
}
.narrate-btn {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: rgba(232,200,74,0.15);
  border: 1px solid rgba(232,200,74,0.3);
  color: var(--accent);
  padding: 0.4rem 0.8rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}
.narrate-btn:hover { background: rgba(232,200,74,0.25); }
.narrate-btn.playing { color: var(--green); border-color: var(--green); }

/* EXAMPLES TABLE */
.examples-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
.examples-table th {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-align: left;
  padding: 0.5rem 0.8rem;
  background: var(--black);
  border-bottom: 1px solid var(--border);
}
.examples-table td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; }
.examples-table tr:hover td { background: rgba(232,200,74,0.04); }
.de-text { color: var(--accent); font-style: italic; }
.grammar-note { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.speak-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 1rem;
  padding: 0.2rem 0.4rem;
  transition: color 0.2s;
  line-height: 1;
}
.speak-btn:hover { color: var(--accent); }

/* EXERCISES */
.exercise-card {
  background: var(--black);
  border: 1px solid var(--border);
  padding: 1.4rem;
  margin-bottom: 1rem;
}
.exercise-block-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}
.question-row { margin-bottom: 0.9rem; display: flex; gap: 0.8rem; align-items: flex-start; flex-wrap: wrap; }
.q-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); min-width: 36px; padding-top: 4px; }
.q-content { flex: 1; min-width: 200px; }
.q-text { margin-bottom: 0.4rem; font-size: 0.95rem; }
.q-input {
  width: 100%;
  background: #0f0f0f;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.7rem;
  font-family: 'Crimson Pro', serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
.q-input:focus { border-color: var(--accent); }
.q-input.correct { border-color: var(--green); background: rgba(39,174,96,0.08); }
.q-input.wrong { border-color: var(--red); background: rgba(192,57,43,0.08); }
.q-options { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.3rem; }
.opt-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.35rem 0.9rem;
  font-family: 'Crimson Pro', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.opt-btn:hover { border-color: var(--accent); color: var(--accent); }
.opt-btn.selected { border-color: var(--accent); background: rgba(232,200,74,0.1); color: var(--accent); }
.opt-btn.correct-ans { border-color: var(--green); background: rgba(39,174,96,0.15); color: var(--green); }
.opt-btn.wrong-ans { border-color: var(--red); background: rgba(192,57,43,0.1); color: var(--red); }
.feedback-row { font-family: 'Space Mono', monospace; font-size: 0.68rem; margin-top: 0.3rem; padding: 0.3rem 0.5rem; display: none; }
.feedback-row.show { display: block; }
.feedback-row.correct { color: var(--green); }
.feedback-row.wrong { color: var(--red); }
.check-row { display: flex; gap: 1rem; align-items: center; margin-top: 1.2rem; flex-wrap: wrap; }
.btn-check {
  background: var(--accent);
  color: var(--black);
  border: none;
  padding: 0.55rem 1.6rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-check:hover { background: var(--gold-light); }
.score-mini { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); }

/* DICTATION BLOCK */
.dictation-block {
  background: #0d0d1a;
  border: 1px solid rgba(41,128,185,0.4);
  padding: 1.4rem;
  margin-bottom: 1rem;
}
.dictation-block .exercise-block-label { color: var(--blue); border-color: rgba(41,128,185,0.3); }
.play-audio-btn {
  background: rgba(41,128,185,0.2);
  border: 1px solid rgba(41,128,185,0.5);
  color: #5dade2;
  padding: 0.6rem 1.2rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.2s;
  margin-bottom: 0.75rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}
.play-audio-btn:hover { background: rgba(41,128,185,0.35); }

/* SPEAKING BLOCK */
.speaking-block {
  background: #0d1a0d;
  border: 1px solid rgba(39,174,96,0.4);
  padding: 1.4rem;
  margin-bottom: 1rem;
}
.speaking-block .exercise-block-label { color: var(--green); border-color: rgba(39,174,96,0.3); }
.mic-btn {
  width: 4rem;
  height: 4rem;
  border-radius: 50%;
  border: 2px solid rgba(39,174,96,0.5);
  background: rgba(39,174,96,0.15);
  color: var(--green);
  font-size: 1.5rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0.75rem auto;
}
.mic-btn:hover { background: rgba(39,174,96,0.3); }
.mic-btn.recording { border-color: var(--red); background: rgba(192,57,43,0.2); color: var(--red); animation: pulse-rec 1s ease-in-out infinite; }
@keyframes pulse-rec { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.speaking-prompt {
  text-align: center;
  padding: 1rem;
  background: rgba(39,174,96,0.08);
  border: 1px solid rgba(39,174,96,0.2);
  margin-bottom: 1rem;
}
.speaking-prompt .de-sentence {
  font-size: 1.2rem;
  font-style: italic;
  color: var(--accent);
  font-family: 'Crimson Pro', serif;
}
.speaking-prompt .en-sentence { font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }
.score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
.score-bar-fill { height: 100%; transition: width 0.8s ease; border-radius: 3px; }

/* RECAP MODAL */
#recap-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
#recap-modal.active { display: flex; }
.recap-box {
  background: var(--dark);
  border: 1px solid var(--accent);
  max-width: 560px;
  width: 100%;
  padding: 2rem;
  max-height: 90vh;
  overflow-y: auto;
}
.recap-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; }
.recap-subtitle { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-bottom: 1.5rem; letter-spacing: 0.1em; }
.recap-q { margin-bottom: 1.25rem; }
.recap-q-text { margin-bottom: 0.5rem; font-size: 0.95rem; }
.recap-opts { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.recap-result { text-align: center; padding: 1.5rem 0; }
.recap-result .big-score { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; color: var(--accent); line-height: 1; }
.recap-result p { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; letter-spacing: 0.1em; }

/* COMPLETE CARD */
.complete-card {
  background: var(--black);
  border: 1px solid var(--accent);
  padding: 2.5rem;
  text-align: center;
  margin-top: 1rem;
}
.complete-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--accent); letter-spacing: 0.08em; }
.complete-stats { display: flex; gap: 2rem; justify-content: center; margin: 1.2rem 0 2rem; flex-wrap: wrap; }
.c-stat { text-align: center; }
.c-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--accent); line-height: 1; }
.c-lbl { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: var(--black);
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  padding: 0.7rem 1.5rem;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

@media(max-width:500px) {
  .title-main { font-size: 3rem; }
  .map-grid { grid-template-columns: 1fr 1fr; }
  .lesson-body { padding: 1rem; }
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-flag">🇩🇪</div>
  <div class="title-main">DEUTSCH<br>UNLOCKED</div>
  <div class="title-sub">Das komplette Spiel · A1 bis B2 · v2.0</div>
  <div class="stats-bar">
    <div class="stat-pill" id="title-xp">0 XP</div>
    <div class="stat-pill" id="title-gold">0 GOLD</div>
    <div class="stat-pill" id="title-progress">0 / 19 LESSONS</div>
  </div>
  <button class="btn-primary" onclick="goToMap()">SPIELEN — PLAY</button>
  <br><br>
  <button class="btn-secondary" onclick="resetProgress()">↺ RESET PROGRESS</button>
  <p style="margin-top:3rem;font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;">
    19 LESSONS · DICTATION · SPEAKING · RECAP QUIZZES · MALE NARRATOR
  </p>
</div>

<!-- MAP SCREEN -->
<div id="map-screen" class="screen">
  <div class="map-header">
    <div class="map-header-title">🗺 LERNKARTE</div>
    <div class="xp-bar-wrap">
      <div class="xp-label">TOTAL XP — <span id="map-xp-num">0</span></div>
      <div class="xp-bar"><div class="xp-fill" id="map-xp-fill" style="width:0%"></div></div>
    </div>
    <div class="gold-badge">⚡ <span id="map-gold">0</span> GOLD</div>
    <button class="btn-secondary" onclick="showScreen('title-screen')">← ZURÜCK</button>
  </div>
  <div class="map-grid" id="map-grid"></div>
</div>

<!-- LESSON SCREEN -->
<div id="lesson-screen" class="screen">
  <div class="lesson-header">
    <button class="back-btn" onclick="showScreen('map-screen');renderMap()">← MAP</button>
    <div class="lesson-title-bar" id="lesson-title-bar">Lesson</div>
    <div class="progress-dots" id="progress-dots"></div>
    <div style="font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--muted)">
      XP: <span id="lesson-xp-count">0</span>
    </div>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
</div>

<!-- RECAP MODAL -->
<div id="recap-modal">
  <div class="recap-box" id="recap-box"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// VOICE ENGINE
// ═══════════════════════════════════
let maleVoice = null;
let maleVoiceDE = null;

function initVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;

  // Find best masculine English voice
  const malePrefs = ['Daniel','Google UK English Male','Microsoft David','Alex','Fred','Thomas','Jorge'];
  for (const pref of malePrefs) {
    const v = voices.find(v => v.name.includes(pref));
    if (v) { maleVoice = v; break; }
  }
  // Fallback: any English voice, prefer UK
  if (!maleVoice) {
    maleVoice = voices.find(v => v.lang === 'en-GB') ||
                voices.find(v => v.lang.startsWith('en')) ||
                voices[0];
  }

  // Find best German voice
  maleVoiceDE = voices.find(v => v.lang === 'de-DE' && v.name.toLowerCase().includes('male')) ||
                voices.find(v => v.lang === 'de-DE') ||
                voices.find(v => v.lang.startsWith('de'));
}

window.speechSynthesis.onvoiceschanged = initVoices;
setTimeout(initVoices, 500);

function speak(text, lang = 'de-DE', onEnd = null) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.pitch = 0.8;
  u.rate = lang.startsWith('de') ? 0.82 : 0.9;
  u.volume = 1;
  if (lang.startsWith('de') && maleVoiceDE) u.voice = maleVoiceDE;
  else if (lang.startsWith('en') && maleVoice) u.voice = maleVoice;
  if (onEnd) u.onend = onEnd;
  window.speechSynthesis.speak(u);
}

function narrateText(text, btnEl) {
  if (btnEl) { btnEl.classList.add('playing'); btnEl.textContent = '⏹ STOP'; }
  speak(text, 'en-GB', () => {
    if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '▶ NARRATE'; }
  });
}

function stopNarration(btnEl) {
  window.speechSynthesis.cancel();
  if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '▶ NARRATE'; }
}

let state = { xp:0, gold:0, completed:[], lessonXP:{}, stars:{} };

function loadState() {
  const s = localStorage.getItem('deutschUnlockedV2');
  if (s) state = JSON.parse(s);
}
function saveState() {
  localStorage.setItem('deutschUnlockedV2', JSON.stringify(state));
}
function resetProgress() {
  if (!confirm('Reset ALL progress? Cannot be undone.')) return;
  localStorage.removeItem('deutschUnlockedV2');
  state = { xp:0, gold:0, completed:[], lessonXP:{}, stars:{} };
  updateTitleStats();
  showToast('Progress reset. Viel Erfolg! 🇩🇪');
}

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

function updateTitleStats() {
  document.getElementById('title-xp').textContent = state.xp + ' XP';
  document.getElementById('title-gold').textContent = state.gold + ' GOLD';
  document.getElementById('title-progress').textContent = state.completed.length + ' / 19 LESSONS';
}
function renderMap() {
  document.getElementById('map-xp-num').textContent = state.xp;
  document.getElementById('map-xp-fill').style.width = Math.min(100,(state.xp/6000)*100) + '%';
  document.getElementById('map-gold').textContent = state.gold;
  const grid = document.getElementById('map-grid');
  grid.innerHTML = '';
  LESSONS.forEach((lesson,idx) => {
    const isCompleted = state.completed.includes(lesson.id);
    const isUnlocked = idx === 0 || state.completed.includes(LESSONS[idx-1].id);
    const stars = state.stars[lesson.id] || 0;
    const isNext = !isCompleted && isUnlocked;
    const card = document.createElement('div');
    card.className = 'lesson-card' + (isCompleted?' completed':'') + (!isUnlocked?' locked':'') + (isNext?' active-lesson':'');
    let starsHTML = '';
    for (let i=0;i<3;i++) starsHTML += i<stars?'★':'☆';
    card.innerHTML = `
      <div class="card-num">${String(lesson.id).padStart(2,'0')}</div>
      <div class="card-title">${lesson.title}</div>
      <div class="card-meta">${lesson.level} · ${lesson.examples.length} EXAMPLES · ${lesson.exercises.length} EXERCISES</div>
      ${isCompleted?`<div class="card-stars">${starsHTML}</div>`:''}
      ${!isUnlocked?'<div class="lock-icon">🔒</div>':''}
    `;
    if (isUnlocked) card.addEventListener('click', () => tryOpenLesson(lesson.id, idx));
    grid.appendChild(card);
  });
}

// RECAP QUIZ SYSTEM
// ═══════════════════════════════════
let recapTarget = null;

function tryOpenLesson(id, idx) {
  if (idx === 0 || state.completed.includes(LESSONS[idx-1].id) === false) {
    openLesson(id); return;
  }
  // Check if lesson already completed — no recap needed
  if (state.completed.includes(id)) { openLesson(id); return; }
  // First time opening a new lesson → show recap
  const prevStart = Math.max(0, idx-3);
  const prevLessons = LESSONS.slice(prevStart, idx);
  const completedPrev = prevLessons.filter(l => state.completed.includes(l.id));
  if (completedPrev.length === 0) { openLesson(id); return; }
  recapTarget = id;
  showRecap(completedPrev);
}

function showRecap(prevLessons) {
  // Pull 8 questions from examples of previous lessons
  let pool = [];
  prevLessons.forEach(lesson => {
    lesson.examples.forEach(ex => {
      pool.push({ de: ex[0], en: ex[1], lesson: lesson.title });
    });
  });
  // Shuffle
  pool = pool.sort(() => Math.random()-0.5).slice(0, 8);
  const wrongBank = pool.map(p => p.en);

  let html = `
    <div class="recap-title">RECAP QUIZ</div>
    <div class="recap-subtitle">SCORE 6/8 TO UNLOCK THE NEXT LESSON · REVIEWING PREVIOUS MATERIAL</div>
  `;

  pool.forEach((item, i) => {
    const wrongs = wrongBank.filter(w => w !== item.en).sort(() => Math.random()-0.5).slice(0,3);
    const opts = [item.en, ...wrongs].sort(() => Math.random()-0.5);
    html += `
      <div class="recap-q" id="rq-${i}">
        <div class="recap-q-text">${i+1}. What does this mean? <em style="color:var(--accent)">"${item.de}"</em>
          <button class="speak-btn" onclick="speak('${item.de.replace(/'/g,"\\'")}','de-DE')" title="Play audio">🔊</button>
        </div>
        <div class="recap-opts">
          ${opts.map(o => `<button class="opt-btn" onclick="recapAnswer(${i},'${o.replace(/'/g,"\\'")}','${item.en.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
        </div>
        <div id="rfb-${i}" class="feedback-row"></div>
      </div>
    `;
  });

  html += `
    <div style="margin-top:1.5rem;display:flex;gap:1rem;flex-wrap:wrap">
      <button class="btn-primary" id="recap-submit-btn" onclick="submitRecap(${pool.length})">CHECK ANSWERS</button>
      <button class="btn-secondary" onclick="closeRecap()">CANCEL</button>
    </div>
    <div id="recap-result-area"></div>
  `;

  document.getElementById('recap-box').innerHTML = html;
  document.getElementById('recap-modal').classList.add('active');
  window.recapAnswers = {};
  window.recapTotal = pool.length;
}

function recapAnswer(idx, chosen, correct, btn) {
  if (window.recapAnswers[idx] !== undefined) return;
  window.recapAnswers[idx] = chosen;
  const parent = btn.parentElement;
  parent.querySelectorAll('.opt-btn').forEach(b => {
    if (b.textContent === correct) b.classList.add('correct-ans');
    else if (b === btn && chosen !== correct) b.classList.add('wrong-ans');
  });
  const fb = document.getElementById('rfb-'+idx);
  if (chosen === correct) { fb.textContent = '✓ Correct!'; fb.className = 'feedback-row correct show'; }
  else { fb.textContent = `✗ Correct: ${correct}`; fb.className = 'feedback-row wrong show'; }
}

function submitRecap(total) {
  let correct = 0;
  for (let i=0;i<total;i++) {
    // count from feedback
    const fb = document.getElementById('rfb-'+i);
    if (fb && fb.classList.contains('correct')) correct++;
  }
  const passed = correct >= 6;
  const area = document.getElementById('recap-result-area');
  area.innerHTML = `
    <div class="recap-result">
      <div class="big-score">${correct}/${total}</div>
      <p>${passed ? '✓ PASSED — LESSON UNLOCKED' : '✗ NEED 6/8 — TRY AGAIN'}</p>
      ${passed
        ? `<button class="btn-primary" style="margin-top:1rem" onclick="closeRecap();openLesson(${recapTarget})">CONTINUE →</button>`
        : `<button class="btn-primary" style="margin-top:1rem" onclick="showRecap([])">RETRY</button>`
      }
    </div>
  `;
  document.getElementById('recap-submit-btn').style.display = 'none';
  if (passed) { state.xp += correct*5; state.gold += correct*2; saveState(); }
}

function closeRecap() {
  document.getElementById('recap-modal').classList.remove('active');
}

let currentLesson = null;
let currentTab = 'explain';
let exerciseAnswers = {};
let checkedBlocks = {};
let dictationAnswers = {};

function openLesson(id) {
  currentLesson = LESSONS.find(l => l.id === id);
  currentTab = 'explain';
  exerciseAnswers = {};
  checkedBlocks = {};
  dictationAnswers = {};
  speakingScores = {};
  currentSpeakingIdx = 0;
  document.getElementById('lesson-title-bar').textContent = `L${id}: ${currentLesson.title}`;
  const dots = document.getElementById('progress-dots');
  const total = currentLesson.exercises.length;
  dots.innerHTML = Array.from({length:Math.min(total,30)},(_,i) => `<div class="dot" id="dot-${i}"></div>`).join('');
  document.getElementById('lesson-xp-count').textContent = state.lessonXP[id] || 0;
  showScreen('lesson-screen');
  renderLessonContent();
}

function renderLessonContent() {
  const body = document.getElementById('lesson-body');
  const tabs = `
    <div class="tab-bar">
      <button class="tab ${currentTab==='explain'?'active':''}" onclick="switchTab('explain')">📖 LESSON</button>
      <button class="tab ${currentTab==='examples'?'active':''}" onclick="switchTab('examples')">📚 EXAMPLES (${currentLesson.examples.length})</button>
      <button class="tab ${currentTab==='exercises'?'active':''}" onclick="switchTab('exercises')">🎮 EXERCISES (${currentLesson.exercises.length})</button>
      <button class="tab ${currentTab==='dictation'?'active':''}" onclick="switchTab('dictation')">🎧 DICTATION</button>
      <button class="tab ${currentTab==='speaking'?'active':''}" onclick="switchTab('speaking')">🎤 SPEAKING</button>
    </div>
  `;
  if (currentTab === 'explain') body.innerHTML = tabs + renderExplainTab();
  else if (currentTab === 'examples') body.innerHTML = tabs + renderExamplesTab();
  else if (currentTab === 'exercises') body.innerHTML = tabs + renderExercisesTab();
  else if (currentTab === 'dictation') body.innerHTML = tabs + renderDictationTab();
  else if (currentTab === 'speaking') body.innerHTML = tabs + renderSpeakingTab();
}

function switchTab(tab) { currentTab = tab; renderLessonContent(); }

// ── EXPLAIN TAB ──
function renderExplainTab() {
  const exp = EXPLANATIONS[currentLesson.id];
  if (!exp) return `<p style="color:var(--muted)">No explanation available.</p>`;
  const btnId = 'narrate-btn-' + currentLesson.id;
  const keysHTML = exp.keys.map(k => `<div class="key-point">${k}</div>`).join('');
  return `
    <div class="explanation-panel">
      <button class="narrate-btn" id="${btnId}" onclick="toggleNarration('${btnId}','${exp.text.replace(/'/g,"\\'").replace(/\n/g,' ')}')">▶ NARRATE</button>
      <h3>${exp.title}</h3>
      <p>${exp.text}</p>
      <div class="key-points">${keysHTML}</div>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <button class="btn-primary" onclick="switchTab('examples')">VIEW EXAMPLES →</button>
    </div>
  `;
}

function toggleNarration(btnId, text) {
  const btn = document.getElementById(btnId);
  if (btn && btn.classList.contains('playing')) {
    stopNarration(btn);
  } else {
    narrateText(text, btn);
  }
}

// ── EXAMPLES TAB ──
function renderExamplesTab() {
  let html = `<table class="examples-table"><thead><tr>
    <th></th><th>#</th><th>DEUTSCH</th><th>ENGLISH</th><th>GRAMMAR FOCUS</th>
  </tr></thead><tbody>`;
  currentLesson.examples.forEach((ex,i) => {
    const safeDe = ex[0].replace(/'/g,"\\'");
    html += `<tr>
      <td><button class="speak-btn" onclick="speak('${safeDe}','de-DE')" title="Play audio">🔊</button></td>
      <td class="grammar-note">${i+1}</td>
      <td class="de-text">${ex[0]}</td>
      <td>${ex[1]}</td>
      <td class="grammar-note">${ex[2]}</td>
    </tr>`;
  });
  html += `</tbody></table>
    <div style="text-align:center;margin-top:1rem">
      <button class="btn-primary" onclick="switchTab('exercises')">START EXERCISES →</button>
    </div>`;
  return html;
}

// ── EXERCISES TAB ──
function renderExercisesTab() {
  const exercises = currentLesson.exercises;
  const BLOCK_SIZE = 8;
  const blockNames = ['A','B','C','D','E','F'];
  let html = '';
  let blockIdx = 0;
  let i = 0;
  while (i < exercises.length) {
    const end = Math.min(i+BLOCK_SIZE, exercises.length);
    const blockExs = exercises.slice(i,end);
    html += `<div class="exercise-card">
      <div class="exercise-block-label">BLOCK ${blockNames[blockIdx]} — Questions ${i+1}–${end}</div>`;
    blockExs.forEach((ex,relIdx) => { html += renderQuestion(ex, i+relIdx); });
    const blockId = `block-${blockIdx}`;
    html += `<div class="check-row">
      <button class="btn-check" onclick="checkBlock(${i},${end-1},'${blockId}')">CHECK ANSWERS</button>
      <span class="score-mini" id="${blockId}-score"></span>
    </div></div>`;
    i = end; blockIdx++;
  }
  html += `<div id="complete-section"></div>`;
  return html;
}

function renderQuestion(ex, idx) {
  const savedAnswer = exerciseAnswers[idx] || '';
  const isChecked = checkedBlocks[Math.floor(idx/8)] !== undefined;
  if (ex.type === 'match') {
    const opts = ex.options.map(opt => {
      let cls = 'opt-btn';
      if (isChecked) {
        if (opt === ex.answer) cls += ' correct-ans';
        else if (opt === savedAnswer && opt !== ex.answer) cls += ' wrong-ans';
        else if (opt === savedAnswer) cls += ' selected';
      } else { if (opt === savedAnswer) cls += ' selected'; }
      return `<button class="${cls}" onclick="selectOption(${idx},'${escQ(opt)}')">${opt}</button>`;
    }).join('');
    const fbClass = isChecked ? (savedAnswer===ex.answer?'correct':'wrong') : '';
    const fbText = isChecked ? (savedAnswer===ex.answer?'✓ Correct!':`✗ Answer: ${ex.answer}`) : '';
    return `<div class="question-row">
      <div class="q-label">Q${idx+1}</div>
      <div class="q-content">
        <div class="q-text">${ex.prompt}</div>
        <div class="q-options">${opts}</div>
        <div class="feedback-row ${fbClass} ${isChecked?'show':''}">${fbText}</div>
      </div></div>`;
  } else {
    const isOpen = ex.answer === '';
    let inputClass = 'q-input';
    let fbClass = '', fbText = '';
    if (isChecked && !isOpen) {
      const correct = checkTextAnswer(savedAnswer, ex.answer);
      if (correct) { inputClass += ' correct'; fbClass = 'correct'; fbText = '✓ Correct!'; }
      else { inputClass += ' wrong'; fbClass = 'wrong'; fbText = `✗ Expected: ${ex.answer}`; }
    }
    const typeLabel = ex.type==='translate'?'[TRANSLATE] ':ex.type==='reorder'?'[REORDER] ':'';
    return `<div class="question-row">
      <div class="q-label">Q${idx+1}</div>
      <div class="q-content">
        <div class="q-text">${typeLabel}${ex.prompt}</div>
        <input class="${inputClass}" id="inp-${idx}" type="text"
          placeholder="${isOpen?'Write your answer...':'Type your answer...'}"
          value="${escQ(savedAnswer)}"
          oninput="saveAnswer(${idx},this.value)"
          ${isChecked&&!isOpen?'readonly':''}>
        <div class="feedback-row ${fbClass} ${isChecked&&!isOpen?'show':''}">${fbText}</div>
      </div></div>`;
  }
}

function escQ(str) { return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function selectOption(idx, value) {
  exerciseAnswers[idx] = value;
  if (!checkedBlocks[Math.floor(idx/8)]) renderLessonContent();
}
function saveAnswer(idx, value) { exerciseAnswers[idx] = value; }
function checkTextAnswer(userAns, correctAns) {
  if (!correctAns) return true;
  const u = userAns.trim().toLowerCase().replace(/[.,!?]/g,'');
  const c = correctAns.trim().toLowerCase().replace(/[.,!?]/g,'');
  return u === c || userAns.trim() === correctAns.trim();
}

function checkBlock(startIdx, endIdx, blockId) {
  for (let i=startIdx;i<=endIdx;i++) {
    const inp = document.getElementById(`inp-${i}`);
    if (inp) exerciseAnswers[i] = inp.value;
  }
  const exercises = currentLesson.exercises;
  let correct = 0, total = 0;
  for (let i=startIdx;i<=endIdx;i++) {
    const ex = exercises[i];
    if (ex.answer === '') continue;
    total++;
    if (ex.type==='match') { if (exerciseAnswers[i]===ex.answer) correct++; }
    else { if (checkTextAnswer(exerciseAnswers[i]||'',ex.answer)) correct++; }
  }
  checkedBlocks[Math.floor(startIdx/8)] = {correct,total};
  const scoreEl = document.getElementById(blockId+'-score');
  if (scoreEl) scoreEl.textContent = total>0?`${correct}/${total} correct`:'Open answers recorded';
  const xpGained = correct*10;
  state.xp += xpGained;
  state.gold += Math.floor(xpGained/5);
  state.lessonXP[currentLesson.id] = (state.lessonXP[currentLesson.id]||0) + xpGained;
  document.getElementById('lesson-xp-count').textContent = state.lessonXP[currentLesson.id];
  for (let i=startIdx;i<=Math.min(endIdx,29);i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (dot) dot.classList.add('done');
  }
  saveState(); renderLessonContent();
  if (xpGained>0) showToast(`+${xpGained} XP · ${correct}/${total} correct`);
  checkAllComplete();
}

function checkAllComplete() {
  const totalBlocks = Math.ceil(currentLesson.exercises.length/8);
  const allDone = Object.keys(checkedBlocks).length >= totalBlocks;
  if (allDone && !state.completed.includes(currentLesson.id)) {
    const totalEx = currentLesson.exercises.filter(e=>e.answer!=='').length;
    let totalCorrect = 0;
    for (const b of Object.values(checkedBlocks)) totalCorrect += b.correct;
    const pct = totalEx>0?totalCorrect/totalEx:1;
    const stars = pct>=0.9?3:pct>=0.7?2:1;
    state.completed.push(currentLesson.id);
    state.stars[currentLesson.id] = stars;
    const bonusGold = stars*50;
    state.gold += bonusGold;
    saveState();
    const cs = document.getElementById('complete-section');
    if (cs) {
      cs.innerHTML = `
        <div class="complete-card">
          <div class="complete-title">LEKTION COMPLETE!</div>
          <div style="font-size:2rem;margin:0.5rem 0">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
          <div class="complete-stats">
            <div class="c-stat"><div class="c-num">${totalCorrect}</div><div class="c-lbl">CORRECT</div></div>
            <div class="c-stat"><div class="c-num">${state.lessonXP[currentLesson.id]}</div><div class="c-lbl">XP EARNED</div></div>
            <div class="c-stat"><div class="c-num">+${bonusGold}</div><div class="c-lbl">BONUS GOLD</div></div>
          </div>
          <button class="btn-primary" onclick="goToMap()">BACK TO MAP →</button>
        </div>`;
      cs.scrollIntoView({behavior:'smooth'});
    }
    showToast(`🏆 Lesson ${currentLesson.id} complete! +${bonusGold} bonus gold!`);
    updateTitleStats();
  }
}

// ── DICTATION TAB ──
function renderDictationTab() {
  const sentences = currentLesson.dictation || [];
  if (!sentences.length) return `<p style="color:var(--muted);padding:1rem">No dictation for this lesson.</p>`;

  let html = `<div class="dictation-block">
    <div class="exercise-block-label">🎧 DICTATION — LISTEN AND TYPE WHAT YOU HEAR</div>
    <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem;font-family:'Space Mono',monospace;letter-spacing:0.05em">
      Click PLAY to hear each sentence. Type exactly what you hear. Aim for 80%+ accuracy.
    </p>`;

  sentences.forEach((sentence, i) => {
    const saved = dictationAnswers[i] || '';
    const isChecked = dictationAnswers[`checked-${i}`];
    let inputClass = 'q-input';
    let fbText = '', fbClass = '';
    if (isChecked) {
      const sim = stringSimilarity(saved.toLowerCase(), sentence.toLowerCase());
      if (sim >= 0.8) { inputClass += ' correct'; fbClass = 'correct'; fbText = `✓ ${Math.round(sim*100)}% match — Well done!`; }
      else { inputClass += ' wrong'; fbClass = 'wrong'; fbText = `✗ ${Math.round(sim*100)}% — Answer: ${sentence}`; }
    }
    const safeSentence = sentence.replace(/'/g,"\\'");
    html += `
      <div class="question-row">
        <div class="q-label">D${i+1}</div>
        <div class="q-content">
          <button class="play-audio-btn" onclick="speak('${safeSentence}','de-DE')">🔊 PLAY SENTENCE ${i+1}</button>
          <input class="${inputClass}" id="dict-inp-${i}" type="text"
            placeholder="Type what you hear..."
            value="${escQ(saved)}"
            oninput="saveDictation(${i},this.value)"
            ${isChecked?'readonly':''}>
          <div class="feedback-row ${fbClass} ${isChecked?'show':''}">${fbText}</div>
        </div>
      </div>`;
  });

  html += `
    <div class="check-row">
      <button class="btn-check" onclick="checkDictation(${sentences.length})">CHECK DICTATION</button>
      <span class="score-mini" id="dict-score"></span>
    </div></div>`;
  return html;
}

function saveDictation(idx, value) { dictationAnswers[idx] = value; }

function checkDictation(total) {
  for (let i=0;i<total;i++) {
    const inp = document.getElementById(`dict-inp-${i}`);
    if (inp) dictationAnswers[i] = inp.value;
  }
  const sentences = currentLesson.dictation || [];
  let correct = 0;
  sentences.forEach((sentence, i) => {
    dictationAnswers[`checked-${i}`] = true;
    const sim = stringSimilarity((dictationAnswers[i]||'').toLowerCase(), sentence.toLowerCase());
    if (sim >= 0.8) correct++;
  });
  const xpGained = correct * 15;
  state.xp += xpGained;
  state.gold += Math.floor(xpGained/4);
  saveState();
  const scoreEl = document.getElementById('dict-score');
  if (scoreEl) scoreEl.textContent = `${correct}/${total} correct`;
  if (xpGained>0) showToast(`+${xpGained} XP from dictation!`);
  renderLessonContent();
}

function stringSimilarity(a, b) {
  const wa = a.split(/\s+/).filter(Boolean);
  const wb = b.split(/\s+/).filter(Boolean);
  const matches = wa.filter(w => wb.includes(w)).length;
  return matches / Math.max(wa.length, wb.length, 1);
}

// ── SPEAKING TAB ──
function renderSpeakingTab() {
  const prompts = currentLesson.speaking || [];
  if (!prompts.length) return `<p style="color:var(--muted);padding:1rem">No speaking exercises for this lesson.</p>`;

  const srSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  let html = `<div class="speaking-block">
    <div class="exercise-block-label">🎤 SPEAKING — READ THE SENTENCE ALOUD IN GERMAN</div>`;

  if (!srSupported) {
    html += `<div style="background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);padding:1rem;margin-bottom:1rem;font-family:'Space Mono',monospace;font-size:0.7rem;color:#e74c3c;">
      Speech recognition not supported in this browser. Use Chrome for full functionality.
    </div>`;
  }

  prompts.forEach((prompt, i) => {
    const score = speakingScores[i];
    const safeDe = prompt[0].replace(/'/g,"\\'");
    html += `
      <div class="speaking-prompt" id="sp-prompt-${i}">
        <div class="de-sentence">${prompt[0]}</div>
        <div class="en-sentence">${prompt[1]}</div>
        <div style="margin-top:0.75rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap">
          <button class="play-audio-btn" onclick="speak('${safeDe}','de-DE')" style="margin-bottom:0">🔊 HEAR IT</button>
          ${srSupported
            ? `<button class="mic-btn" id="mic-${i}" onclick="toggleRecording(${i},'${safeDe}')">🎤</button>`
            : '<span style="color:var(--muted);font-size:0.75rem;font-family:\'Space Mono\',monospace">Rate yourself below</span>'
          }
        </div>
        ${score !== undefined
          ? `<div style="margin-top:0.75rem">
              <div style="font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--muted);margin-bottom:4px">ACCURACY: ${Math.round(score*100)}%</div>
              <div class="score-bar"><div class="score-bar-fill" style="width:${score*100}%;background:${score>0.7?'var(--green)':score>0.4?'var(--gold)':'var(--red)'}"></div></div>
            </div>`
          : ''
        }
      </div>`;
  });

  const totalScore = Object.values(speakingScores).reduce((a,b)=>a+b,0);
  const avgScore = Object.keys(speakingScores).length > 0 ? totalScore/Object.keys(speakingScores).length : 0;
  if (Object.keys(speakingScores).length === prompts.length) {
    const xp = Math.round(avgScore*40);
    html += `
      <div style="text-align:center;margin-top:1rem;padding:1rem;background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3)">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--green)">SPEAKING COMPLETE</div>
        <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)">Average accuracy: ${Math.round(avgScore*100)}% · +${xp} XP earned</div>
      </div>`;
  }

  html += `</div>`;
  return html;
}

function toggleRecording(idx, sentence) {
  const btn = document.getElementById(`mic-${idx}`);
  if (isRecording) {
    if (recognition) recognition.stop();
    isRecording = false;
    if (btn) { btn.classList.remove('recording'); btn.textContent = '🎤'; }
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (e) => {
    const said = e.results[0][0].transcript;
    const score = stringSimilarity(said.toLowerCase().replace(/[.,!?]/g,''), sentence.toLowerCase().replace(/[.,!?]/g,''));
    speakingScores[idx] = score;
    const xpGained = Math.round(score*20);
    state.xp += xpGained;
    state.gold += Math.round(xpGained/4);
    saveState();
    if (xpGained>0) showToast(`+${xpGained} XP · ${Math.round(score*100)}% accuracy`);
    isRecording = false;
    if (btn) { btn.classList.remove('recording'); btn.textContent = '🎤'; }
    renderLessonContent();
  };
  recognition.onerror = () => {
    isRecording = false;
    if (btn) { btn.classList.remove('recording'); btn.textContent = '🎤'; }
  };
  recognition.onend = () => {
    isRecording = false;
    if (btn) { btn.classList.remove('recording'); btn.textContent = '🎤'; }
  };
  recognition.start();
  isRecording = true;
  if (btn) { btn.classList.add('recording'); btn.textContent = '⏹'; }
  // Auto-stop after 8 seconds
  setTimeout(() => { if (isRecording && recognition) recognition.stop(); }, 8000);
}

// ═══════════════════════════════════
// TOAST
// ═══════════════════════════════════
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
loadState();
updateTitleStats();
</script>
