<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Schattenreich: The Shadow Language (120 Zones A1–B2)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <style>
        :root {
            --bg-deep: #0a0020;
            --bg-mid: #1a0a3e;
            --text-cream: #F5E6D3;
            --gold: #FFD700;
            --gold-dim: #b8960f;
            --slate: #7B8CA8;
            --correct: #4CAF50;
            --wrong: #8B0000;
            --tech: #00BFFF;
            --card-bg: #12062e;
            --border: #2a1a4e;
            --font-serif: 'Georgia', 'Times New Roman', serif;
            --font-ui: system-ui, -apple-system, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-deep);
            color: var(--text-cream);
            font-family: var(--font-ui);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .german-text {
            font-family: var(--font-serif);
            font-style: italic;
        }
        .btn {
            background: var(--border);
            color: var(--text-cream);
            border: 1px solid var(--gold-dim);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: var(--font-ui);
        }
        .btn:hover {
            background: var(--gold-dim);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-gold {
            background: var(--gold);
            color: #000;
            border: none;
            font-weight: bold;
        }
        .btn-gold:hover {
            background: #fff4b0;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }
        .btn-correct {
            background: var(--correct);
            color: #fff;
            border: none;
        }
        .btn-wrong {
            background: var(--wrong);
            color: #fff;
            border: none;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-mid);
            border-bottom: 2px solid var(--gold-dim);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        .xp-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            width: 80px;
            overflow: hidden;
        }
        .xp-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
            transition: width 0.5s;
        }
        .streak-fire {
            animation: flicker 0.3s infinite alternate;
            font-size: 1.2rem;
        }
        @keyframes flicker {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.2);
                opacity: 0.7;
            }
        }
        @keyframes goldPulse {
            0%,
            100% {
                box-shadow: 0 0 5px rgba(255, 215, 0, 0.4);
            }
            50% {
                box-shadow: 0 0 25px rgba(255, 215, 0, 0.9);
            }
        }
        @keyframes tailWag {
            0%,
            100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(8deg);
            }
            75% {
                transform: rotate(-8deg);
            }
        }
        .gold-pulse {
            animation: goldPulse 0.6s ease-out;
        }
        .fox-container {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 200;
            cursor: pointer;
        }
        .fox-svg {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
        }
        .fox-tail {
            transform-origin: bottom right;
        }
        .fox-tail.wag {
            animation: tailWag 0.5s ease-in-out 3;
        }
        .speech-bubble {
            position: absolute;
            bottom: 60px;
            right: 0;
            background: var(--bg-mid);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 10px 14px;
            max-width: 220px;
            font-size: 0.8rem;
            color: var(--text-cream);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .world-map {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 16px;
            justify-content: center;
            max-width: 100%;
        }
        .zone-node {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border: 2px solid #333;
            color: #999;
            background: #1a1a3a;
        }
        .zone-node.unlocked {
            border-color: var(--gold-dim);
            color: var(--gold);
            background: #1a0a3e;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }
        .zone-node.completed {
            border-color: var(--correct);
            color: #fff;
            background: #1a3a1a;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
        }
        .zone-node.current {
            border-color: var(--gold);
            color: #000;
            background: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            animation: goldPulse 2s infinite;
            font-weight: bold;
            font-size: 0.7rem;
        }
        .trial-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .trial-card:hover {
            border-color: var(--gold-dim);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
        }
        .trial-card.completed {
            border-color: var(--correct);
            background: rgba(76, 175, 80, 0.1);
        }
        .trial-icon {
            font-size: 1.5rem;
            width: 40px;
            text-align: center;
        }
        .word-tile {
            display: inline-block;
            padding: 6px 12px;
            margin: 3px;
            background: var(--bg-mid);
            border: 1px solid var(--slate);
            border-radius: 6px;
            cursor: grab;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }
        .word-tile:active {
            cursor: grabbing;
            background: var(--gold-dim);
        }
        .word-tile.placed {
            background: var(--border);
            border-color: var(--gold-dim);
        }
        .drop-zone {
            min-height: 44px;
            border: 2px dashed var(--slate);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        .drop-zone.correct {
            border-color: var(--correct);
            background: rgba(76, 175, 80, 0.1);
        }
        .drop-zone.wrong {
            border-color: var(--wrong);
            background: rgba(139, 0, 0, 0.1);
        }
        .timer-bar {
            height: 4px;
            background: var(--gold);
            border-radius: 2px;
            transition: width 0.1s linear;
        }
        .boss-health {
            height: 10px;
            background: var(--wrong);
            border-radius: 5px;
            transition: width 0.5s;
        }
        .boss-health.player {
            background: var(--correct);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: var(--bg-mid);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 24px;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
        }
        .hack-card {
            background: linear-gradient(135deg, #1a0a3e, #2a1a5e);
            border: 1px solid var(--gold);
            border-radius: 10px;
            padding: 14px;
            margin: 8px 0;
            position: relative;
        }
        .hack-card.locked {
            opacity: 0.4;
            filter: grayscale(0.8);
        }
        .replace-slot {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px dashed var(--gold);
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-serif);
            transition: all 0.2s;
        }
        .replace-slot:hover {
            background: rgba(255, 215, 0, 0.4);
        }
        .replace-options {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }
        .replace-opt {
            padding: 4px 10px;
            background: var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-serif);
            transition: all 0.2s;
        }
        .replace-opt:hover {
            background: var(--gold-dim);
            color: #000;
        }
        .replace-opt.selected {
            background: var(--gold);
            color: #000;
        }
        @media(max-width:600px) {
            .hud {
                font-size: 0.7rem;
                padding: 6px 8px;
            }
            .zone-node {
                width: 24px;
                height: 24px;
                font-size: 0.5rem;
            }
            .word-tile {
                padding: 4px 8px;
                font-size: 0.75rem;
                margin: 2px;
            }
            .modal {
                padding: 14px;
                max-width: 95vw;
            }
        }
    </style>
</head>

        function gameReducer(state, action) {
            switch (action.type) {
                case 'SET_SCREEN':
                    return { ...state, screen: action.payload };
                case 'SET_ZONE':
                    return { ...state, currentZone: action.payload, screen: 'zoneView' };
                case 'COMPLETE_TRIAL': {
                    const zoneId = action.payload.zoneId;
                    const trialIdx = action.payload.trialIdx;
                    const existing = state.completedTrials[zoneId] || [];
                    if (existing.includes(trialIdx)) return state;
                    const newTrials = { ...state.completedTrials, [zoneId]: [...existing, trialIdx] };
                    return {
                        ...state,
                        completedTrials: newTrials,
                        xp: state.xp + XP_PER_TRIAL,
                        gold: state.gold + GOLD_PER_TRIAL,
                        level: Math.floor((state.xp + XP_PER_TRIAL) / 200) + 1,
                    };
                }
                case 'DEFEAT_BOSS': {
                    const zoneId = action.payload;
                    return {
                        ...state,
                        bossDefeated: { ...state.bossDefeated, [zoneId]: true },
                        xp: state.xp + BOSS_XP,
                        gold: state.gold + BOSS_GOLD,
                        level: Math.floor((state.xp + BOSS_XP) / 200) + 1,
                        zoneHistory: [...state.zoneHistory, zoneId],
                    };
                }
                case 'FAIL_BOSS':
                    return { ...state, gold: Math.max(0, state.gold - BOSS_FAIL_COST) };
                case 'COMPLETE_RECAP':
                    return { ...state, recapCompleted: { ...state.recapCompleted, [action.payload]: true } };
                case 'ADD_XP':
                    return { ...state, xp: state.xp + action.payload, level: Math.floor((state.xp + action
                            .payload) / 200) + 1 };
                case 'ADD_GOLD':
                    return { ...state, gold: state.gold + action.payload };
                case 'UNLOCK_HACK': {
                    const hackId = action.payload;
                    if (state.unlockedHacks.includes(hackId)) return state;
                    return { ...state, unlockedHacks: [...state.unlockedHacks, hackId] };
                }
                case 'UPDATE_STREAK': {
                    const today = new Date().toDateString();
                    const lastDate = state.lastPlayedDate;
                    let newStreak = state.streak;
                    if (lastDate !== today) {
                        const yesterday = new Date(Date.now() - 86400000).toDateString();
                        newStreak = (lastDate === yesterday) ? state.streak + 1 : 1;
                    }
                    return { ...state, streak: newStreak, lastPlayedDate: today };
                }
                case 'SET_FOX_MESSAGE':
                    return { ...state, foxMessage: action.payload };
                case 'CLEAR_FOX_MESSAGE':
                    return { ...state, foxMessage: null };
                case 'SET_AUDIO':
                    return { ...state, settings: { ...state.settings, audioEnabled: action.payload } };
                case 'LOAD_SAVE':
                    return { ...state, ...action.payload, screen: 'worldMap' };
                default:
                    return state;
            }
        }

        // AUDIO SYSTEM (unchanged)

        function useAudio() {
            const [voice, setVoice] = useState(null);
            const [enabled, setEnabled] = useState(false);
            useEffect(() => {
                if ('speechSynthesis' in window) {
                    const loadVoices = () => {
                        const voices = window.speechSynthesis.getVoices();
                        const germanVoice = voices.find(v => v.lang.startsWith('de')) || voices[0];
                        setVoice(germanVoice);
                    };
                    loadVoices();
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);
            const speak = useCallback((text, rate = 0.85) => {
                if (!enabled || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                utterance.rate = rate;
                utterance.pitch = 1.05;
                if (voice) utterance.voice = voice;
                window.speechSynthesis.speak(utterance);
            }, [enabled, voice]);
            return { speak, enabled, setEnabled, voice };
        }
