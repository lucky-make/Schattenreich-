function vocabFromTheme(theme, count=35) {
  const words = masterDict[theme] || masterDict['greetings'];
  const entries = Object.entries(words);
  const result = [];
  for(let i=0; i<count; i++) {
    const [de, en] = entries[i % entries.length];
    const article = de.startsWith('der ') ? 'der' : de.startsWith('die ') ? 'die' : de.startsWith('das ') ? 'das' : null;
    const cleanDe = article ? de.slice(4) : de;
    result.push({ de:cleanDe, en, article, example: `${de} ist ein typisches Wort.` });
  }
  return shuffleArray(result);
}

// ─── ZONE GENERATOR ──────────────────────────────────────────
function generateZone(meta, previousVocab) {
  const lvlKey = meta.level.startsWith('A1')?'A1':meta.level.startsWith('A2')?'A2':meta.level.startsWith('B1')?'B1':'B2';
  const newVocab = vocabFromTheme(meta.vocabTheme, 30);
  const reviewVocab = previousVocab.length ? shuffleArray(previousVocab).slice(0, 35) : [];
  const allVocab = shuffleArray([...newVocab, ...reviewVocab]).slice(0, 35);
  const grammar = (grammarPools[lvlKey] || grammarPools['A1']).slice(0,3);
  const sentences = (sentencePools[lvlKey] || sentencePools['A1']).slice(0,20);
  const dictation = (dictationPools[lvlKey] || dictationPools['A1']).slice(0,10);
  const speaking = (speakingPools[lvlKey] || speakingPools['A1']).slice(0,5);
  const boss = generateBoss(meta, lvlKey, previousVocab);
  return { ...meta, vocab:allVocab, grammar, sentences, dictation, speaking, boss };
}

function generateBoss(zone, lvlKey, previousVocab) {
  const questions = [];
  for(let i=0;i<3;i++) {
    const w = zone.vocab[i % zone.vocab.length];
    const wrong = zone.vocab[(i+1)%zone.vocab.length];
    questions.push({ q:`Was bedeutet "${w.article?w.article+' ':''}${w.de}"?`, opts:[w.en, wrong.en, "to wait", "to speak"], correct:0, type:'vocab' });
  }
  for(let i=0;i<3;i++) {
    const g = (grammarPools[lvlKey]||grammarPools['A1'])[i%3];
    questions.push({ q:'Welche Regel beschreibt dies?', opts:[g.title,"Word Order","Conjugation","Plural Forms"], correct:0, type:'grammar', de:g.de });
  }
  for(let i=0;i<2;i++) {
    const s = (sentencePools[lvlKey]||sentencePools['A1'])[i%4];
    questions.push({ q:`Ordne: ${s.parts.join(', ')}`, opts:[s.translation, "Build it", "Translate", "Find verb"], correct:0, type:'sentence', de:s.parts.join(' ') });
  }
  if(previousVocab.length) {
    const pw = previousVocab[Math.floor(Math.random()*previousVocab.length)];
    questions.push({ q:`Was bedeutet "${pw.article?pw.article+' ':''}${pw.de}"? (Wiederholung)`, opts:[pw.en, "to go", "to eat", "to read"], correct:0, type:'vocab_review' });
    const pg = (grammarPools[zone.level.startsWith('A1')?'A1':zone.level.startsWith('A2')?'A2':zone.level.startsWith('B1')?'B1':'B2'])[0];
    questions.push({ q:'Erkenne die Regel:', opts:[pg.title, "Verb Second", "Adjective ending", "Dative"], correct:0, type:'grammar_review', de:pg.de });
  } else {
    questions.push({ q:'Welche Wortart ist "laufen"?', opts:["Verb","Nomen","Adjektiv","Präposition"], correct:0, type:'mixed' });
    questions.push({ q:'Übersetze: "the house"', opts:["das Haus","der Haus","die Haus","den Haus"], correct:0, type:'mixed' });
  }
  return shuffleArray(questions);
}

function generateAllZones() {
  const zones = [];
  let previousVocab = [];
  for(const m of zoneMeta) {
    const zone = generateZone(m, previousVocab);
    zones.push(zone);
    previousVocab.push(...zone.vocab);
    if(previousVocab.length > 100) previousVocab = previousVocab.slice(-100);
  }
  return zones;
}
const zones = generateAllZones();

function shuffleArray(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function calculateSimilarity(a,b){ const wa=a.split(/\s+/); const wb=b.split(/\s+/); const matches=wa.filter(w=>wb.includes(w)); return matches.length/Math.max(wa.length,wb.length); }
function speak(text){ const u=new SpeechSynthesisUtterance(text); u.lang='de-DE'; u.rate=0.85; u.pitch=1.0; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }

const SAVE_KEY='schattenreich_save_v4';
const initialState={ screen:'start', currentZone:1, completedTrials:{}, bossDefeated:{}, xp:0, gold:0, level:1, streak:0, recapCompleted:{}, artifacts:[], settings:{sound:true,voice:true,difficulty:'normal'}, currentTrial:null };

function gameReducer(state, action) {
  switch(action.type) {
    case 'LOAD_SAVE': return { ...initialState, ...action.payload, screen: 'map' };
    case 'RESET': return initialState;
    case 'START_GAME': return { ...state, screen: 'map' };
    case 'GO_TO_MAP': return { ...state, screen: 'map', currentTrial: null };
    case 'SELECT_ZONE': {
      const zid = action.zoneId;
      if (zid > 1 && !state.bossDefeated[zid - 1]) return state;
      return { ...state, currentZone: zid, screen: 'zone' };
    }
    case 'START_TRIAL': return { ...state, screen: 'trial', currentTrial: action.trialType };
    case 'COMPLETE_TRIAL': {
      const zt = state.completedTrials[state.currentZone] || [];
      if (zt.includes(action.trialType)) return { ...state, screen: 'zone' };
      const newTrials = { ...state.completedTrials, [state.currentZone]: [...zt, action.trialType] };
      const newXp = state.xp + action.score;
      const newGold = state.gold + action.goldEarned;
      return {
        ...state,
        completedTrials: newTrials,
        xp: newXp,
        gold: newGold,
        level: Math.floor(newXp / 500) + 1,
        screen: 'zone',
        currentTrial: null
      };
    }
    case 'FAIL_TRIAL': return { ...state, screen: 'zone', currentTrial: null };
    case 'START_RECAP': return { ...state, screen: 'recap' };
    case 'COMPLETE_RECAP':
      return {
        ...state,
        recapCompleted: { ...state.recapCompleted, [state.currentZone]: true },
        screen: 'zone'
      };
    case 'START_BOSS': return { ...state, screen: 'boss' };
    case 'DEFEAT_BOSS': {
      if (action.score >= 9) {
        const newXp = state.xp + action.score * 20;
        const newGold = state.gold + 150;
        const arts = [...state.artifacts];
        if (!arts.includes(`zone-${state.currentZone}`)) arts.push(`zone-${state.currentZone}`);
        return {
          ...state,
          bossDefeated: { ...state.bossDefeated, [state.currentZone]: true },
          xp: newXp,
          gold: newGold,
          level: Math.floor(newXp / 500) + 1,
          artifacts: arts,
          vaultUnlocked: arts.length >= 3,
          screen: 'zone'
        };
      } else {
        return { ...state, gold: Math.max(0, state.gold - 40), screen: 'zone' };
      }
    }
    case 'FAIL_BOSS': return { ...state, gold: Math.max(0, state.gold - 40), screen: 'zone' };
    case 'STREAK_UPDATE': return { ...state, streak: action.correct ? state.streak + 1 : 0 };
    case 'GO_TO_VAULT': return { ...state, screen: 'vault' };
    case 'GO_TO_SHOP': return { ...state, screen: 'shop' };
    case 'GO_TO_SETTINGS': return { ...state, screen: 'settings' };
    case 'UPDATE_SETTINGS': return { ...state, settings: { ...state.settings, ...action.settings } };
    case 'BUY_ITEM': {
      if (state.gold < action.cost) return state;
      return { ...state, gold: state.gold - action.cost, artifacts: [...state.artifacts, action.itemId] };
    }
    case 'BACK_TO_ZONE': return { ...state, screen: 'zone' };
    default: return state;
  }
}

function useGameState() {
  const [state, dispatch] = React.useReducer(gameReducer, initialState);
  React.useEffect(() => {
    try { const s = localStorage.getItem(SAVE_KEY); if (s) dispatch({ type: 'LOAD_SAVE', payload: JSON.parse(s) }); } catch {}
  }, []);
  React.useEffect(() => { try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch {} }, [state]);
  const isZoneUnlocked = React.useCallback(id => id === 1 ? true : !!state.bossDefeated[id - 1], [state.bossDefeated]);
  const canStartBoss = React.useCallback(id => (state.completedTrials[id] || []).length >= 4, [state.completedTrials]);
  const needsRecap = React.useCallback(id => id === 1 ? false : !isZoneUnlocked(id) ? false : !state.recapCompleted[id], [state.recapCompleted, isZoneUnlocked]);
  return { state, dispatch, isZoneUnlocked, canStartBoss, needsRecap };
}

// ─── FLOATING PARTICLES ───────────────────────────────────────
function FloatingParticles() {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId;
    const colors = ['#FFD700', '#7B8CA8', '#F5E6D3', '#4a1942', '#d4a574'];
    const particles = Array.from({ length: 50 }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 2 + 0.5,
      speedX: (Math.random() - 0.5) * 0.4,
      speedY: (Math.random() - 0.5) * 0.4 - 0.2,
      opacity: Math.random() * 0.5 + 0.1,
      color: colors[Math.floor(Math.random() * colors.length)]
    }));
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.speedX; p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity; ctx.fill();
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity * 0.12; ctx.fill();
      });
      ctx.globalAlpha = 1;
      animId = requestAnimationFrame(animate);
    }
    animate();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return h('canvas', { ref: canvasRef, style: { position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0, mixBlendMode: 'screen' } });
}

function BertramFox({ message }) {
  const [isOpen, setIsOpen] = React.useState(true);
  const [currentMessage, setCurrentMessage] = React.useState(message);
  React.useEffect(() => { if (message !== currentMessage) { setIsOpen(true); setCurrentMessage(message); } }, [message]);
  return h('div', { style: { position: 'fixed', bottom: '1.5rem', right: '1.5rem', zIndex: 50, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '0.75rem' } },
    isOpen && h('div', { style: { maxWidth: '18rem', background: 'linear-gradient(135deg,#1a0a3e,#2d1b4e)', border: '1px solid rgba(255,215,0,0.3)', borderRadius: '0.75rem', padding: '1rem', boxShadow: '0 20px 40px rgba(255,215,0,0.1)', position: 'relative' } },
      h('button', { onClick: () => setIsOpen(false), style: { position: 'absolute', top: '0.5rem', right: '0.5rem', color: 'rgba(123,140,168,0.5)', background: 'none', border: 'none', cursor: 'pointer' } }, h(X, { size: 14 })),
      h('p', { style: { fontSize: '0.875rem', color: 'rgba(245,230,211,0.9)', lineHeight: '1.6', paddingRight: '1rem', fontStyle: 'italic', fontFamily: "'EB Garamond',serif" } }, currentMessage),

// ─── WORLD MAP ────────────────────────────────────────────────
function WorldMap({ zones: zoneIds, currentZone, completedZones, unlockedZones, onSelectZone }) {
  const [hoveredZone, setHoveredZone] = React.useState(null);
  const chapterNames = ["Das stille Erwachen (A1.1)", "Der Morgen des Wissens (A1.2)", "Die Reise beginnt (A2.1)", "Der Pfad der Tiefe (A2.2)", "Die Brücke zum B1 (B1.1)", "Das Reich der Komplexität (B1.2)", "Der Aufstieg (B2.1)", "Die Krönung (B2.2)"];
  const chapters = [];
  for (let i = 0; i < 120; i += 16) chapters.push(zoneIds.slice(i, i + 16));
  return h('div', { style: { maxWidth: '72rem', margin: '0 auto' } },
    h('div', { style: { textAlign: 'center', marginBottom: '2rem' } },
      h('h1', { style: { fontSize: '2rem', fontWeight: 'bold', color: '#FFD700', textShadow: '0 0 10px rgba(255,215,0,0.5)', marginBottom: '0.5rem', fontFamily: "'Cinzel',serif" } }, 'Die Weltkarte'),
      h('p', { style: { color: '#7B8CA8', fontSize: '0.875rem' } }, '120 Zonen warten auf dich. Jeder Schritt bringt dich der Meisterschaft näher.'),
      h('div', { style: { display: 'flex', justifyContent: 'center', gap: '1.5rem', marginBottom: '2rem', fontSize: '0.875rem' } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } },
          h('div', { style: { width: '0.75rem', height: '0.75rem', borderRadius: '50%', background: '#10b981' } }),
          h('span', { style: { color: 'rgba(245,230,211,0.7)' } }, `${completedZones.length} gemeistert`)
        ),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } },
          h('div', { style: { width: '0.75rem', height: '0.75rem', borderRadius: '50%', background: '#f59e0b' } }),
          h('span', { style: { color: 'rgba(245,230,211,0.7)' } }, `${unlockedZones.filter(z=>!completedZones.includes(z)).length} offen`)
        ),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } },
          h('div', { style: { width: '0.75rem', height: '0.75rem', borderRadius: '50%', background: 'rgba(123,140,168,0.4)' } }),
          h('span', { style: { color: 'rgba(245,230,211,0.7)' } }, `${120-unlockedZones.length} verschlossen`)
        )
      )
    ),
    h('div', { style: { paddingBottom: '5rem' } },
      chapters.map((chZones, ci) =>
        h('div', { key: ci, style: { marginBottom: '2rem' } },
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem', padding: '0 0.5rem' } },
            h('div', { style: { height: '1px', flex: 1, background: 'linear-gradient(to right,transparent,rgba(255,215,0,0.3),transparent)' } }),
            h('h2', { style: { fontSize: '0.875rem', fontWeight: '600', color: 'rgba(255,215,0,0.8)', whiteSpace: 'nowrap', fontFamily: "'Cinzel',serif" } }, `Kapitel ${ci+1}: ${chapterNames[ci]}`),
            h('div', { style: { height: '1px', flex: 1, background: 'linear-gradient(to right,transparent,rgba(255,215,0,0.3),transparent)' } })
          ),
          h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(8, minmax(0,1fr))', gap: '0.5rem' } },
            chZones.map(zoneId => {
              const zone = getZoneById(zoneId);
              if (!zone) return null;
              const isCompleted = completedZones.includes(zoneId);
              const isUnlocked = unlockedZones.includes(zoneId);
              const isCurrent = currentZone === zoneId;
              return h('button', {
                key: zoneId,
                onClick: () => isUnlocked && onSelectZone(zoneId),
                onMouseEnter: () => setHoveredZone(zoneId),
                onMouseLeave: () => setHoveredZone(null),
                title: zone ? `${zone.name} - ${zone.subtitle}` : `Zone ${zoneId}`,
                style: {
                  position: 'relative', aspectRatio: '1/1', borderRadius: '0.75rem', border: '1px solid',
                  borderColor: isCompleted ? 'rgba(16,185,129,0.5)' : isUnlocked ? 'rgba(255,215,0,0.4)' : 'rgba(123,140,168,0.2)',
                  background: isCompleted ? 'rgba(6,78,59,0.3)' : isUnlocked ? 'rgba(26,10,62,0.8)' : 'rgba(10,0,32,0.6)',
                  opacity: isUnlocked ? 1 : 0.5, cursor: isUnlocked ? 'pointer' : 'not-allowed',
                  boxShadow: isCurrent ? '0 0 0 2px #0a0020, 0 0 0 4px #FFD700' : 'none',
                  transition: 'all 0.3s', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0.25rem'
                }
              },
                isCompleted ? h(CheckCircle2, { size: 16, style: { color: '#34d399' } }) :
                !isUnlocked ? h(Lock, { size: 14, style: { color: 'rgba(123,140,168,0.5)' } }) :
                h('span', { style: { fontSize: '1rem' } }, zone.emoji),
                h('span', { style: { fontSize: '0.75rem', fontWeight: 'bold', color: isCompleted ? '#34d399' : isUnlocked ? '#FFD700' : 'rgba(123,140,168,0.5)', marginTop: '0.125rem' } }, zoneId)
              );
            })
          ),
          ci < chapters.length - 1 && h('div', { style: { display: 'flex', justifyContent: 'center', padding: '1rem 0' } },
            h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '0.25rem' } },
              h('div', { style: { width: '1px', height: '1rem', background: 'linear-gradient(to bottom,rgba(255,215,0,0.4),rgba(255,215,0,0.2))' } }),
              h(ChevronRight, { size: 14, style: { color: 'rgba(255,215,0,0.4)', transform: 'rotate(90deg)' } })
            )
          )
        )
      )
    ),
    h('div', { style: { position: 'fixed', bottom: '1.5rem', left: '1.5rem', zIndex: 40, background: 'rgba(10,0,32,0.9)', backdropFilter: 'blur(4px)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.5rem', padding: '0.5rem 1rem', fontSize: '0.75rem' } },
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.25rem' } }, h(Star, { size: 12, style: { color: '#FFD700' } }), h('span', { style: { color: 'rgba(245,230,211,0.7)' } }, 'Aktuelle Zone')),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.25rem' } }, h(CheckCircle2, { size: 12, style: { color: '#34d399' } }), h('span', { style: { color: 'rgba(245,230,211,0.7)' } }, 'Gemeistert')),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } }, h(Lock, { size: 12, style: { color: '#7B8CA8' } }), h('span', { style: { color: 'rgba(245,230,211,0.7)' } }, 'Verschlossen'))
    )
  );
}

function SpeakingTrial({ prompts, onComplete, onStreakUpdate }) {
  const [currentIdx, setCurrentIdx] = React.useState(0);

  const [transcript, setTranscript] = React.useState('');
  const [feedback, setFeedback] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [unsupported, setUnsupported] = React.useState(false);
  const scoreRef = React.useRef(score);
  React.useEffect(() => { scoreRef.current = score; }, [score]);
  const mediaRecorderRef = React.useRef(null);
  const chunksRef = React.useRef([]);
  const promptObj = prompts[currentIdx];

  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mediaRecorder = new MediaRecorder(stream);
      mediaRecorderRef.current = mediaRecorder;
      chunksRef.current = [];
      mediaRecorder.ondataavailable = e => chunksRef.current.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        setAudioUrl(url);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      setIsRecording(true);
    } catch (e) {
      setUnsupported(true);
    }
  };
  const stopRecording = () => {
    mediaRecorderRef.current && mediaRecorderRef.current.stop();
    setIsRecording(false);
  };
  const playAudio = () => {
    if (audioUrl) {
      const audio = new Audio(audioUrl);
      audio.play();
    }
  };
  const handleSelfRate = (rating) => {
    const pts = rating === 3 ? 30 : rating === 2 ? 20 : 10;
    setScore(s => s + pts);
    setFeedback({ rating, pts });
    onStreakUpdate && onStreakUpdate(rating >= 2);
  };
  const next = () => {
    if (currentIdx < prompts.length - 1) {
      setCurrentIdx(c => c + 1);
      setAudioUrl(null);
      setTranscript('');
      setFeedback(null);

      confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3'] });

      h('span', { style: { color: '#FFD700' } }, `Score: ${score}`)
    ),

      h('p', { style: { color: '#7B8CA8', fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.5rem' } }, 'Aufgabe'),
      h('p', { style: { color: '#F5E6D3', fontSize: '1rem', marginBottom: '1rem' } }, promptObj.prompt),
      h('p', { style: { color: '#7B8CA8', fontSize: '0.75rem', fontStyle: 'italic' } }, `Modell: ${promptObj.model}`)
    ),
    !audioUrl && !feedback && h('div', { style: { display: 'flex', justifyContent: 'center', marginBottom: '1.5rem' } },
      h('button', { onClick: isRecording ? stopRecording : startRecording, style: { width: '5rem', height: '5rem', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', border: '2px solid', borderColor: isRecording ? '#f87171' : 'rgba(255,215,0,0.5)', background: isRecording ? 'rgba(239,68,68,0.3)' : 'rgba(255,215,0,0.2)' } },
        isRecording ? h(Square, { size: 28, style: { color: '#f87171' } }) : h(Mic, { size: 28, style: { color: '#FFD700' } })
      )
    ),
    isRecording && h('p', { style: { textAlign: 'center', fontSize: '0.875rem', color: '#7B8CA8', marginBottom: '1rem' } }, 'Nimm auf...'),
    audioUrl && !feedback && h('div', { style: { marginBottom: '1.25rem', textAlign: 'center' } },
      h('button', { onClick: playAudio, style: { padding: '0.75rem 1.5rem', background: 'rgba(255,215,0,0.2)', border: '1px solid rgba(255,215,0,0.5)', borderRadius: '0.5rem', color: '#FFD700', cursor: 'pointer', marginBottom: '1rem' } }, 'Aufnahme abspielen'),

// ─── GRAMMAR TRIAL ────────────────────────────────────────────
function GrammarTrial({ grammar, vocab, onComplete, onStreakUpdate }) {
  const [phase, setPhase] = React.useState('teach');
  const [teachIdx, setTeachIdx] = React.useState(0);
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [showResult, setShowResult] = React.useState(false);
  const scoreRef = React.useRef(score);
  React.useEffect(() => { scoreRef.current = score; }, [score]);
  const teachCards = grammar.slice(0, 3);
  const questions = React.useMemo(() => {
    const qs = [];
    const skipWords = new Set(['ich','du','er','sie','es','wir','ihr','und','oder','ein','eine','ist','sind']);
    grammar.slice(0,3).forEach((rule, i) => {
      const words = rule.de.split(' ');
      const cards = words.map((_, idx) => idx).filter(idx => !skipWords.has(words[idx].toLowerCase()) && words[idx].length > 2);
      const blankIdx = cards.length > 0 ? cards[Math.floor(cards.length/2)] : Math.floor(words.length/2);
      const correct = words[blankIdx];
      const disp = [...words]; disp[blankIdx] = '___';
      const distractors = [];
      grammar.forEach((r, j) => { if(j!==i) r.de.split(' ').forEach(w => { if(w.length>2 && w.toLowerCase()!==correct.toLowerCase() && !skipWords.has(w.toLowerCase())) distractors.push(w); }); });
      const ud = [...new Set(distractors)].slice(0,3);
      while(ud.length<3) ud.push(['gemacht','kommen','hatten'][ud.length]);
      qs.push({ type:'fill', prompt:'Vervollständige den Satz:', sentence:disp.join(' '), translation:rule.en, options:shuffleArray([correct,...ud.slice(0,3)]), correct, explanation:rule.rule, ruleTitle:rule.title });
    });
    vocab.filter(w=>w.article).slice(0,2).forEach(word => {
      const arts=['der','die','das']; const corr=word.article;
      qs.push({ type:'article', prompt:'Welcher Artikel passt?', sentence:word.de.replace(/^(der|die|das)\s/i,''), translation:word.en, options:shuffleArray(arts), correct:corr, explanation:`${corr==='der'?'maskulin':corr==='die'?'feminin':'neutral'}.`, ruleTitle:'Artikel' });
    });
    return qs;
  }, [grammar, vocab]);
  const currentQ = questions[currentIdx];
  const handleAnswer = opt => {
    if(selected!==null) return;
    setSelected(opt);
    const correct = opt === currentQ.correct;
    onStreakUpdate && onStreakUpdate(correct);
    if(correct) setScore(s => s + 20);
    setTimeout(() => {

          h('span',{style:{color:'#FFD700',fontSize:'0.75rem',fontWeight:'600',letterSpacing:'0.05em'}},card.title)
        ),
        h('p',{style:{color:'rgba(245,230,211,0.9)',fontSize:'0.875rem',lineHeight:'1.6',marginBottom:'1.25rem'}},card.rule),
        h('div',{style:{background:'rgba(21,0,48,0.6)',border:'1px solid rgba(255,215,0,0.1)',borderRadius:'0.75rem',padding:'1rem'}},
          h('p',{style:{fontSize:'0.75rem',color:'#7B8CA8',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.5rem'}},'Beispiel'),
          h('div',{style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
            h('p',{style:{color:'#FFD700',fontStyle:'italic',fontFamily:"'EB Garamond',serif",fontSize:'1.125rem',fontWeight:'600',flex:1}},card.de),
            h('button',{onClick:()=>speak(card.de),style:{padding:'0.375rem',background:'none',border:'none',cursor:'pointer',color:'rgba(255,215,0,0.6)',flexShrink:0}},h(Volume2,{size:16}))
          ),
          h('p',{style:{color:'#7B8CA8',fontSize:'0.875rem',marginTop:'0.25rem',fontStyle:'italic'}},card.en)
        )
      ),
      h('div',{style:{display:'flex',gap:'0.75rem'}},
        teachIdx<teachCards.length-1 ? h('button',{onClick:()=>setTeachIdx(i=>i+1),style:{flex:1,padding:'0.75rem',background:'rgba(255,215,0,0.2)',border:'1px solid rgba(255,215,0,0.5)',borderRadius:'0.5rem',color:'#FFD700',fontWeight:'600',cursor:'pointer'}},'Nächste Regel →') :
        h('button',{onClick:()=>setPhase('quiz'),style:{flex:1,padding:'0.75rem',background:'rgba(255,215,0,0.3)',border:'1px solid #FFD700',borderRadius:'0.5rem',color:'#FFD700',fontWeight:'bold',cursor:'pointer'}},'Quiz starten ✨')
      ),
      h('div',{style:{display:'flex',justifyContent:'center',gap:'0.5rem',marginTop:'1rem'}},
        teachCards.map((_,i)=>h('div',{key:i,style:{width:'0.5rem',height:'0.5rem',borderRadius:'50%',background:i===teachIdx?'#FFD700':'rgba(255,215,0,0.2)',transition:'all 0.3s'}}))
      )

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'1.5rem',fontSize:'0.875rem'}},
      h('span',{style:{color:'#7B8CA8'}},`Frage ${currentIdx+1}/${questions.length}`),
      h('span',{style:{color:'#FFD700'}},`Score: ${score}`)
    ),
    h('div',{style:{display:'inline-block',padding:'0.25rem 0.75rem',borderRadius:'9999px',background:'rgba(255,215,0,0.1)',border:'1px solid rgba(255,215,0,0.2)',marginBottom:'0.75rem'}},
      h('span',{style:{color:'rgba(255,215,0,0.7)',fontSize:'0.75rem'}},currentQ.ruleTitle)
    ),
    h('div',{style:{background:'rgba(10,0,32,0.5)',border:'1px solid rgba(255,215,0,0.2)',borderRadius:'0.75rem',padding:'1rem',marginBottom:'1.5rem'}},

          opt,
          selected!==null && isCorrect && h(Check,{size:16,style:{display:'inline',marginLeft:'0.25rem'}}),
          isSel && !isCorrect && h(X,{size:16,style:{display:'inline',marginLeft:'0.25rem'}})
        );
      })
    ),
    selected!==null && h('div',{style:{padding:'1rem',borderRadius:'0.75rem',border:'1px solid',borderColor:selected===currentQ.correct?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)',background:selected===currentQ.correct?'rgba(6,78,59,0.2)':'rgba(127,29,29,0.2)'}},
      h('p',{style:{fontSize:'0.75rem',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.05em',color:'#7B8CA8',marginBottom:'0.25rem'}},'Warum?'),
      h('p',{style:{fontSize:'0.875rem',color:'rgba(245,230,211,0.8)',lineHeight:'1.6'}},currentQ.explanation)
    )
  );
}

// ─── WRITING TRIAL (self‑rating) ─────────────────────────────
function WritingTrial({ prompts, onComplete, onStreakUpdate }) {
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [input, setInput] = React.useState('');
  const [feedback, setFeedback] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const scoreRef = React.useRef(score);
  React.useEffect(() => { scoreRef.current = score; }, [score]);
  const promptObj = prompts[currentIdx];

  const handleSelfRate = (rating) => {
    const pts = rating === 3 ? 25 : rating === 2 ? 15 : 5;
    setScore(s => s + pts);
    setFeedback({ rating, pts });
    onStreakUpdate && onStreakUpdate(rating >= 2);
  };
  const next = () => {
    if (currentIdx < prompts.length - 1) {
      setCurrentIdx(c => c + 1);
      setInput('');
      setFeedback(null);
    } else {
      confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3'] });
      onComplete(scoreRef.current, Math.floor(scoreRef.current / 10));
    }
  };

  return h('div', null,
    h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', fontSize: '0.875rem' } },
      h('span', { style: { color: '#7B8CA8' } }, `Aufgabe ${currentIdx+1}/${prompts.length}`),
      h('span', { style: { color: '#FFD700' } }, `Score: ${score}`)
    ),
    h('div', { style: { background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' } },
      h('p', { style: { fontSize: '0.75rem', color: '#7B8CA8', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.5rem' } }, 'Schreibe auf Deutsch.'),
      h('p', { style: { color: '#F5E6D3' } }, promptObj.prompt),
      h('p', { style: { color: '#7B8CA8', fontSize: '0.75rem', marginTop: '0.5rem', fontStyle: 'italic' } }, `Modell: ${promptObj.model}`)
    ),
    !feedback ? h(React.Fragment, null,
      h('textarea', { value: input, onChange: e => setInput(e.target.value), placeholder: 'Deine Antwort auf Deutsch...', style: { width: '100%', height: '8rem', background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', color: '#F5E6D3', resize: 'none', outline: 'none', marginBottom: '1rem', fontFamily: "'EB Garamond',serif", fontSize: '1rem' } }),
      h('div', { style: { marginBottom: '1rem', textAlign: 'center' } },
        h('p', { style: { color: '#7B8CA8', fontSize: '0.875rem', marginBottom: '0.75rem' } }, 'Vergleiche mit dem Modell und bewerte dich selbst:'),
        h('div', { style: { display: 'flex', gap: '0.75rem', justifyContent: 'center' } },
          [1,2,3].map(r => h('button', { key: r, onClick: () => handleSelfRate(r), style: { padding: '0.5rem 1rem', borderRadius: '0.5rem', border: '1px solid rgba(255,215,0,0.3)', background: 'rgba(255,215,0,0.1)', color: '#FFD700', cursor: 'pointer' } }, r === 1 ? 'Stimmt kaum' : r === 2 ? 'Gut' : 'Nahezu perfekt'))
        )
      )
    ) : h('div', null,
      h('p', { style: { color: '#34d399', textAlign: 'center', marginBottom: '1rem' } }, `+${feedback.pts} Punkte`),
      h('button', { onClick: next, style: { width: '100%', padding: '0.75rem', background: 'rgba(255,215,0,0.2)', border: '1px solid rgba(255,215,0,0.5)', borderRadius: '0.5rem', color: '#FFD700', fontWeight: '600', cursor: 'pointer' } },
        currentIdx < prompts.length - 1 ? 'Nächste Aufgabe →' : 'Abschließen')
    )
  );
}

// ─── RECAP QUIZ (strict, 8 questions, 100% required) ──────────
function RecapQuiz({ zoneId, onComplete, onBack, onStreakUpdate }) {
  const [questions, setQuestions] = React.useState(() => generateRecapQuestions(zoneId));
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [correctCount, setCorrectCount] = React.useState(0);
  const [finished, setFinished] = React.useState(false);
  const [passed, setPassed] = React.useState(false);

  function generateRecapQuestions(zId) {
    const zone = getZoneById(zId);
    if (!zone) return [];
    const vocabQs = shuffleArray(zone.vocab).slice(0, 6).map(w => {
      const wrong = zone.vocab.filter(v => v.en !== w.en).slice(0, 3);
      const opts = shuffleArray([w.en, ...wrong.map(x => x.en)]);
      return { type: 'vocab', q: `Was bedeutet "${w.article?w.article+' ':''}${w.de}"?`, opts, correct: opts.indexOf(w.en), word: w };
    });
    const grammarQs = shuffleArray(zone.grammar).slice(0, 2).map(g => {
      const wrongTitles = ['Word Order', 'Conjugation', 'Plural Forms', 'Verb Second'].filter(t => t !== g.title).slice(0, 3);
      const opts = shuffleArray([g.title, ...wrongTitles]);
      return { type: 'grammar', q: 'Welche Regel beschreibt dies?', opts, correct: opts.indexOf(g.title), de: g.de };
    });
    return shuffleArray([...vocabQs, ...grammarQs]);
  }

  const handleAnswer = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    const correct = idx === questions[currentIdx].correct;
    if (correct) setCorrectCount(c => c + 1);
    onStreakUpdate && onStreakUpdate(correct);
    setTimeout(() => {
      if (currentIdx < questions.length - 1) {
        setCurrentIdx(c => c + 1);
        setSelected(null);
      } else {
        if (correctCount + (correct ? 1 : 0) === questions.length) {
          setPassed(true);
          onComplete(0, 0); // no XP/Gold
        } else {
          setFinished(true);
        }
      }
    }, 800);
  };

  const retry = () => {
    setQuestions(generateRecapQuestions(zoneId));
    setCurrentIdx(0);
    setSelected(null);
    setCorrectCount(0);
    setFinished(false);
    setPassed(false);
  };

  if (passed) return h('div', { style: { maxWidth: '36rem', margin: '0 auto', padding: '5rem 0', textAlign: 'center' } },
    h(Trophy, { size: 64, style: { color: '#FFD700', margin: '0 auto 1rem' } }),
    h('h2', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#FFD700', marginBottom: '0.5rem', fontFamily: "'Cinzel',serif" } }, 'Rückblick bestanden!'),
    h('p', { style: { color: '#7B8CA8' } }, 'Du kannst nun die nächste Zone betreten.')
  );

  if (finished) return h('div', { style: { maxWidth: '36rem', margin: '0 auto', padding: '5rem 0', textAlign: 'center' } },
    h(AlertTriangle, { size: 64, style: { color: '#fbbf24', margin: '0 auto 1rem' } }),
    h('h2', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#fbbf24', marginBottom: '0.5rem', fontFamily: "'Cinzel',serif" } }, 'Nicht bestanden'),
    h('p', { style: { color: '#7B8CA8', marginBottom: '1rem' } }, `Du hast ${correctCount}/${questions.length} richtig. 100% sind erforderlich.`),
    h('button', { onClick: retry, style: { padding: '0.75rem 1.5rem', background: 'rgba(245,158,11,0.2)', border: '1px solid rgba(245,158,11,0.5)', borderRadius: '0.5rem', color: '#fde68a', fontWeight: '600', cursor: 'pointer' } }, 'Neuer Versuch')
  );

  const q = questions[currentIdx];
  return h('div', { style: { maxWidth: '36rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('h2', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, 'Täglicher Rückblick')
    ),
    h('div', { style: { background: 'linear-gradient(135deg,#1a0a3e,#0d0221)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '1rem', padding: '1.5rem' } },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', fontSize: '0.875rem' } },
        h('span', { style: { color: '#7B8CA8' } }, `Frage ${currentIdx+1}/${questions.length} (${correctCount} richtig)`),
      ),
      h('div', { style: { textAlign: 'center', marginBottom: '2rem' } },
        h('p', { style: { color: '#F5E6D3', fontSize: '1.125rem', marginBottom: '0.5rem' } }, q.q),
        q.de && h('button', { onClick: () => speak(q.de), style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#FFD700' } }, h(Volume2, { size: 20 }))
      ),
      h('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.75rem' } },
        q.opts.map((opt, i) => {
          const isCorrect = i === q.correct;
          const isSel = selected === i;
          return h('button', { key: i, onClick: () => handleAnswer(i), disabled: selected !== null,
            style: {
              padding: '1rem', borderRadius: '0.75rem', border: '1px solid',
              textAlign: 'left', cursor: selected !== null ? 'default' : 'pointer',
              borderColor: selected === null ? 'rgba(255,215,0,0.2)' : isCorrect ? 'rgba(16,185,129,0.5)' : isSel ? 'rgba(239,68,68,0.5)' : 'rgba(123,140,168,0.2)',
              background: selected === null ? 'rgba(10,0,32,0.5)' : isCorrect ? 'rgba(6,78,59,0.3)' : isSel ? 'rgba(127,29,29,0.3)' : 'rgba(10,0,32,0.3)',
              transition: 'all 0.3s'
            }
          },
            h('span', { style: { color: '#F5E6D3' } }, opt),
            selected !== null && isCorrect && h(Check, { size: 16, style: { display: 'inline', marginLeft: '0.5rem', color: '#34d399' } }),
            isSel && !isCorrect && h(X, { size: 16, style: { display: 'inline', marginLeft: '0.5rem', color: '#f87171' } })
          );
        })
      )
    )
  );
}

// ─── BOSS BATTLE (adaptive, timer, 85% pass) ─────────────────
function BossBattle({ zoneId, onDefeat, onFail, onBack, onStreakUpdate }) {
  const zone = getZoneById(zoneId);
  const [questions] = React.useState(() => zone ? zone.boss : []);
  const [currentQ, setCurrentQ] = React.useState(0);
  const [hp, setHp] = React.useState(3);
  const [correctCount, setCorrectCount] = React.useState(0);
  const [secondsLeft, setSecondsLeft] = React.useState(45);
  const [selected, setSelected] = React.useState(null);
  const [phase, setPhase] = React.useState('battle');
  const timerRef = React.useRef(null);

  React.useEffect(() => {
    if (phase === 'battle' && secondsLeft > 0) {
      timerRef.current = setTimeout(() => setSecondsLeft(s => s - 1), 1000);
      return () => clearTimeout(timerRef.current);
    } else if (phase === 'battle' && secondsLeft === 0) {
      // time's up – wrong answer
      handleTimeout();
    }
  }, [secondsLeft, phase]);

  if (!zone) return null;
  const q = questions[currentQ];

  const handleTimeout = () => {
    if (selected !== null) return;
    setSelected(-1);
    onStreakUpdate && onStreakUpdate(false);
    setHp(h => h - 1);
    setTimeout(() => {
      if (hp - 1 <= 0) {
        setPhase('defeat');
        onFail();
      } else {
        advanceQuestion();
      }
    }, 1000);
  };

  const handleAnswer = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    const isCorrect = idx === q.correct;
    onStreakUpdate && onStreakUpdate(isCorrect);
    if (isCorrect) {
      setCorrectCount(c => c + 1);
    } else {
      setHp(h => h - 1);
    }
    setTimeout(() => {
      if (!isCorrect && hp - 1 <= 0) {
        setPhase('defeat');
        onFail();
      } else if (currentQ === questions.length - 1) {
        // last question
        const totalCorrect = correctCount + (isCorrect ? 1 : 0);
        const passThreshold = Math.ceil(questions.length * 0.85);
        if (totalCorrect >= passThreshold) {
          setPhase('victory');
          onDefeat(totalCorrect);
        } else {
          setPhase('defeat');
          onFail();
        }
      } else {
        advanceQuestion();
      }
    }, 1000);
  };

  const advanceQuestion = () => {
    // adaptive: next question type based on correctness
    setCurrentQ(c => (c + 1) % questions.length);
    setSelected(null);
    setSecondsLeft(45);
  };

  if (phase === 'victory') return h('div', { style: { maxWidth: '42rem', margin: '0 auto', textAlign: 'center', padding: '5rem 0' } },
    h(Trophy, { size: 96, style: { color: '#FFD700', margin: '0 auto 1.5rem' } }),
    h('h2', { style: { fontSize: '2.25rem', fontWeight: 'bold', color: '#FFD700', marginBottom: '1rem', fontFamily: "'Cinzel',serif" } }, 'Sieg!'),
    h('p', { style: { color: '#F5E6D3' } }, `Zone ${zoneId} gemeistert!`)
  );
  if (phase === 'defeat') return h('div', { style: { maxWidth: '42rem', margin: '0 auto', textAlign: 'center', padding: '5rem 0' } },
    h(Shield, { size: 80, style: { color: '#f87171', margin: '0 auto 1.5rem' } }),
    h('h2', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#f87171', marginBottom: '1rem', fontFamily: "'Cinzel',serif" } }, 'Niederlage'),
    h('p', { style: { color: '#7B8CA8', marginBottom: '1rem' } }, '-40 Gold Strafe. Versuche es erneut.'),
    h('button', { onClick: onBack, style: { padding: '0.75rem 1.5rem', background: 'rgba(255,215,0,0.2)', border: '1px solid rgba(255,215,0,0.5)', borderRadius: '0.5rem', color: '#FFD700', cursor: 'pointer' } }, 'Zurück zur Zone')
  );

  return h('div', { style: { maxWidth: '42rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('div', { style: { flex: 1 } },
        h('h2', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#f87171', fontFamily: "'Cinzel',serif" } }, 'Boss Kampf'),
        h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8' } }, `Zone ${zoneId}: ${zone.name}`)
      ),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } },
        h('span', { style: { color: '#FFD700', fontSize: '1rem', fontFamily: "'Cinzel',serif" } }, `${secondsLeft}s`),
        h('div', { style: { width: '6rem', height: '0.5rem', background: '#0a0020', borderRadius: '9999px', overflow: 'hidden' } },
          h('div', { style: { height: '100%', width: `${(secondsLeft/45)*100}%`, background: '#FFD700', transition: 'width 1s linear' } })
        )
      )
    ),
    h('div', { style: { background: 'linear-gradient(135deg,#1a0a3e,#0d0221)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: '1rem', padding: '1.5rem' } },
      h('div', { style: { display: 'flex', gap: '0.25rem', marginBottom: '1.5rem' } },
        [0,1,2].map(i => h(Heart, { key: i, size: 20, fill: i < hp ? '#ef4444' : 'none', style: { color: i < hp ? '#ef4444' : 'rgba(123,140,168,0.3)' } }))
      ),
      h('div', { style: { textAlign: 'center', marginBottom: '1.5rem' } },
        h('p', { style: { color: '#F5E6D3', fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '0.75rem' } }, q.q),
        q.de && h('button', { onClick: () => speak(q.de), style: { color: '#FFD700', background: 'none', border: 'none', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '0.5rem' } },
          h(Volume2, { size: 16 }), h('span', { style: { fontSize: '0.75rem', fontStyle: 'italic', fontFamily: "'EB Garamond',serif" } }, q.de)
        )
      ),
      h('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.75rem' } },
        q.opts.map((opt, i) => {
          const isCorrect = i === q.correct;
          const isSel = selected === i;
          return h('button', { key: i, onClick: () => handleAnswer(i), disabled: selected !== null,
            style: {
              width: '100%', padding: '1rem', borderRadius: '0.75rem', border: '1px solid',
              textAlign: 'left', cursor: selected !== null ? 'default' : 'pointer',
              borderColor: selected === null ? 'rgba(255,215,0,0.2)' : isCorrect ? 'rgba(16,185,129,0.5)' : isSel ? 'rgba(239,68,68,0.5)' : 'rgba(123,140,168,0.2)',
              background: selected === null ? 'rgba(10,0,32,0.5)' : isCorrect ? 'rgba(6,78,59,0.3)' : isSel ? 'rgba(127,29,29,0.3)' : 'rgba(10,0,32,0.3)',
              transition: 'all 0.3s'
            }
          },
            h('span', { style: { color: '#F5E6D3' } }, opt),
            selected !== null && isCorrect && h(Check, { size: 20, style: { display: 'inline', marginLeft: '0.5rem', color: '#34d399' } }),
            isSel && !isCorrect && h(X, { size: 20, style: { display: 'inline', marginLeft: '0.5rem', color: '#f87171' } })
          );
        })
      ),
      h('div', { style: { marginTop: '1.5rem', textAlign: 'center' } },
        h('span', { style: { color: '#7B8CA8', fontSize: '0.875rem' } }, `${correctCount}/${questions.length} richtig (85% benötigt)`)
      )
    )
  );
}

// ─── VAULT ────────────────────────────────────────────────────
function Vault({ artifacts, onBack }) {
  const completedZones = artifacts.filter(a => a.startsWith('zone-')).map(a => parseInt(a.replace('zone-', ''))).sort((a, b) => a - b);
  return h('div', { style: { maxWidth: '56rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '2rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('h1', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, 'Die Schatzkammer'),
      h(Gem, { size: 24, style: { color: '#c084fc' } })
    ),
    h('div', { style: { marginBottom: '1.5rem' } },
      h('p', { style: { color: 'rgba(245,230,211,0.8)' } }, 'Du hast ', h('span', { style: { color: '#FFD700', fontWeight: 'bold' } }, completedZones.length), ' Artefakte gesammelt.')
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(5,minmax(0,1fr))', gap: '0.75rem' } },
      Array.from({ length: 120 }, (_, i) => i + 1).map(zoneId => {
        const has = completedZones.includes(zoneId);
        const zone = getZoneById(zoneId);
        return h('div', { key: zoneId, style: { aspectRatio: '1/1', borderRadius: '0.75rem', border: '1px solid', padding: '0.75rem', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', borderColor: has ? 'rgba(255,215,0,0.4)' : 'rgba(123,140,168,0.2)', background: has ? 'linear-gradient(135deg,rgba(120,53,15,0.3),rgba(88,28,135,0.3))' : 'rgba(10,0,32,0.4)', opacity: has ? 1 : 0.4 } },
          has ? h(React.Fragment, null, h('span', { style: { fontSize: '1.5rem', marginBottom: '0.25rem' } }, zone?.emoji || '📖'), h('span', { style: { fontSize: '0.75rem', fontWeight: 'bold', color: '#FFD700' } }, zoneId)) :
          h(React.Fragment, null, h(Lock, { size: 20, style: { color: 'rgba(123,140,168,0.5)', marginBottom: '0.25rem' } }), h('span', { style: { fontSize: '0.75rem', color: 'rgba(123,140,168,0.5)' } }, zoneId))
        );
      })
    )
  );
}

// ─── SHOP ─────────────────────────────────────────────────────
const shopItems = [
  { id: 'theme-forest', name: 'Wald-Thema', description: 'Verändere das Aussehen der Karte', cost: 200, icon: '🌳' },
  { id: 'theme-ocean', name: 'Ozean-Thema', description: 'Tiefblaue Ästhetik', cost: 250, icon: '🌊' },
  { id: 'theme-magma', name: 'Magma-Thema', description: 'Feuriges Design', cost: 300, icon: '🔥' },
  { id: 'fox-hat', name: 'Bertrams Hut', description: 'Ein süßer Hut für Bertram', cost: 150, icon: '🎩' },
  { id: 'fox-glasses', name: 'Bertrams Brille', description: 'Schick und gebildet', cost: 180, icon: '👓' },
  { id: 'pet-companion', name: 'Eulen-Begleiter', description: 'Eine weise Eule', cost: 500, icon: '🦉' },
];

function Shop({ gold, artifacts, onBuy, onBack }) {
  return h('div', { style: { maxWidth: '48rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '2rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('h1', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, 'Der Gildenladen'),
      h(ShoppingBag, { size: 24, style: { color: '#34d399' } })
    ),
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '1.5rem' } },
      h(Coins, { size: 20, style: { color: '#FFD700' } }),
      h('span', { style: { fontSize: '1.125rem', fontWeight: 'bold', color: '#FFD700' } }, `${gold} Gold`)
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(1,minmax(0,1fr))', gap: '1rem' } },
      shopItems.map((item) => {
        const owned = artifacts.includes(item.id);
        const afford = gold >= item.cost;
        return h('div', { key: item.id, style: { padding: '1rem', borderRadius: '0.75rem', border: '1px solid', borderColor: owned ? 'rgba(16,185,129,0.4)' : 'rgba(255,215,0,0.2)', background: owned ? 'rgba(6,78,59,0.15)' : 'rgba(26,10,62,0.6)' } },
          h('div', { style: { display: 'flex', alignItems: 'flex-start', gap: '1rem' } },
            h('span', { style: { fontSize: '1.875rem' } }, item.icon),
            h('div', { style: { flex: 1 } },
              h('h3', { style: { fontWeight: '600', color: '#F5E6D3' } }, item.name),
              h('p', { style: { fontSize: '0.75rem', color: '#7B8CA8' } }, item.description)
            ),
            h('div', { style: { textAlign: 'right' } },
              h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.25rem', color: '#FFD700', justifyContent: 'flex-end' } },
                h(Coins, { size: 16 }), h('span', { style: { fontSize: '0.875rem', fontWeight: 'bold' } }, item.cost)
              ),
              owned ? h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.25rem', color: '#34d399', fontSize: '0.75rem', marginTop: '0.25rem', justifyContent: 'flex-end' } }, h(Check, { size: 12 }), 'Im Besitz') :
              h('button', { onClick: () => afford && onBuy(item.id, item.cost), disabled: !afford, style: { marginTop: '0.25rem', padding: '0.25rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.75rem', fontWeight: '600', cursor: afford ? 'pointer' : 'not-allowed', background: afford ? 'rgba(255,215,0,0.2)' : 'rgba(10,0,32,0.4)', color: afford ? '#FFD700' : 'rgba(123,140,168,0.5)', border: '1px solid', borderColor: afford ? 'rgba(255,215,0,0.4)' : 'rgba(123,140,168,0.2)' } }, afford ? 'Kaufen' : 'Zu teuer')
            )
          )
        );
      })
    )
  );
}

// ─── SETTINGS ─────────────────────────────────────────────────
function SettingsScreen({ settings, onUpdate, onReset, onBack }) {
  return h('div', { style: { maxWidth: '36rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '2rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('h1', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, 'Einstellungen')
    ),
    h('div', { style: { display: 'flex', flexDirection: 'column', gap: '1rem' } },
      h('div', { style: { background: 'rgba(26,10,62,0.6)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
        h('span', { style: { color: '#F5E6D3' } }, 'Sound'),
        h('button', { onClick: () => onUpdate({ sound: !settings.sound }), style: { padding: '0.5rem 1rem', borderRadius: '0.5rem', background: settings.sound ? 'rgba(16,185,129,0.3)' : 'rgba(123,140,168,0.2)', border: '1px solid', borderColor: settings.sound ? 'rgba(16,185,129,0.5)' : 'rgba(123,140,168,0.3)', color: settings.sound ? '#6ee7b7' : '#7B8CA8', cursor: 'pointer' } }, settings.sound ? 'An' : 'Aus')
      ),
      h('div', { style: { background: 'rgba(26,10,62,0.6)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
        h('span', { style: { color: '#F5E6D3' } }, 'Stimme'),
        h('button', { onClick: () => onUpdate({ voice: !settings.voice }), style: { padding: '0.5rem 1rem', borderRadius: '0.5rem', background: settings.voice ? 'rgba(16,185,129,0.3)' : 'rgba(123,140,168,0.2)', border: '1px solid', borderColor: settings.voice ? 'rgba(16,185,129,0.5)' : 'rgba(123,140,168,0.3)', color: settings.voice ? '#6ee7b7' : '#7B8CA8', cursor: 'pointer' } }, settings.voice ? 'An' : 'Aus')
      ),
      h('div', { style: { background: 'rgba(26,10,62,0.6)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
        h('span', { style: { color: '#F5E6D3' } }, 'Schwierigkeit'),
        h('select', { value: settings.difficulty, onChange: e => onUpdate({ difficulty: e.target.value }), style: { padding: '0.5rem', borderRadius: '0.5rem', background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(255,215,0,0.3)', color: '#FFD700', cursor: 'pointer' } },
          h('option', { value: 'easy' }, 'Leicht'),
          h('option', { value: 'normal' }, 'Normal'),
          h('option', { value: 'hard' }, 'Schwer')
        )
      ),
      h('div', { style: { marginTop: '2rem', textAlign: 'center' } },
        h('button', { onClick: onReset, style: { padding: '0.75rem 1.5rem', background: 'rgba(127,29,29,0.3)', border: '1px solid rgba(239,68,68,0.5)', borderRadius: '0.5rem', color: '#fca5a5', cursor: 'pointer', fontWeight: '600' } }, 'Spiel zurücksetzen')
      )
    )
  );
}

// ─── TRIAL SCREEN ─────────────────────────────────────────────
function TrialScreen({ trialType, zoneId, onComplete, onBack, onStreakUpdate }) {
  const zone = getZoneById(zoneId);
  if (!zone) return null;
  const trialNames = { lexicon: 'Lexicon-Keller', sentence: 'Satz-Schmiede', listening: 'Hör-Gewölbe', speaking: 'Sprech-Halle', grammar: 'Grammatik-Keller', writing: 'Schreib-Gewölbe' };
  return h('div', { style: { maxWidth: '48rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', borderRadius: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('div', null,
        h('h2', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, trialNames[trialType]),
        h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8' } }, `Zone ${zoneId}: ${zone.name}`)
      )
    ),
    h('div', { style: { background: 'linear-gradient(135deg,#1a0a3e,#0d0221)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '1rem', padding: '1.5rem' } },
      trialType === 'lexicon' && h(LexiconTrial, { vocab: zone.vocab, onComplete, onStreakUpdate }),
      trialType === 'sentence' && h(SentenceTrial, { sentences: zone.sentences, onComplete, onStreakUpdate }),
      trialType === 'listening' && h(ListeningTrial, { dictation: zone.dictation, onComplete, onStreakUpdate }),
      trialType === 'speaking' && h(SpeakingTrial, { prompts: zone.speaking, onComplete, onStreakUpdate }),
      trialType === 'grammar' && h(GrammarTrial, { grammar: zone.grammar, vocab: zone.vocab, onComplete, onStreakUpdate }),
      trialType === 'writing' && h(WritingTrial, { prompts: zone.speaking.slice(0, 2), onComplete, onStreakUpdate })
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App() {
  const { state, dispatch, isZoneUnlocked, canStartBoss, needsRecap } = useGameState();
  const allZoneIds = Array.from({ length: 120 }, (_, i) => i + 1);
  const completedZones = Object.keys(state.bossDefeated).map(Number).filter(id => state.bossDefeated[id]);
  const unlockedZones = allZoneIds.filter(id => isZoneUnlocked(id));
  const bertramMessages = {
    start: "Willkommen, Reisender! Ich bin Bertram, der Fuchs der Weisheit. Gemeinsam erobern wir die deutsche Sprache!",
    map: "Wähle eine Zone auf der Karte. Jede Zone bietet neue Herausforderungen!",
    zone: "Hier kannst du Prüfungen ablegen. Schließe mindestens 4 ab, um den Boss herauszufordern!",
    trial: "Konzentriere dich! Jede richtige Antwort bringt dich dem Ziel näher.",
    boss: "Der Boss ist mächtig! Aber du hast alles gelernt, was du brauchst.",
    victory: "Fantastisch! Du hast den Boss besiegt und die Zone gemeistert!",
    defeat: "Keine Sorge, das passiert den Besten. Übe weiter und versuche es erneut.",
    default: "Übung macht den Meister. Bleib dran!"
  };
  const getBertramMessage = () => {
    if (state.screen === 'start') return bertramMessages.start;
    if (state.screen === 'map') return bertramMessages.map;
    if (state.screen === 'zone') return bertramMessages.zone;
    if (state.screen === 'trial') return bertramMessages.trial;
    if (state.screen === 'boss') return bertramMessages.boss;
    return bertramMessages.default;
  };
  const handleStreakUpdate = (correct) => {
    dispatch({ type: 'STREAK_UPDATE', correct });
  };
  const handleTrialComplete = (score, goldEarned) => {
    dispatch({ type: 'COMPLETE_TRIAL', score, goldEarned, trialType: state.currentTrial });
  };
  const handleBossDefeat = (score) => {
    dispatch({ type: 'DEFEAT_BOSS', score });
  };
  const handleBossFail = () => {
    dispatch({ type: 'FAIL_BOSS' });
  };
  const handleRecapComplete = () => {
    dispatch({ type: 'COMPLETE_RECAP' });
  };
  const handleBuyItem = (itemId, cost) => {
    dispatch({ type: 'BUY_ITEM', itemId, cost });
  };

  return h('div', { style: { minHeight: '100vh', position: 'relative' } },
    h(FloatingParticles, null),
    state.screen !== 'start' && h(HUD, { xp: state.xp, gold: state.gold, level: state.level, streak: state.streak, currentZone: state.currentZone, onMap: () => dispatch({ type: 'GO_TO_MAP' }), onVault: () => dispatch({ type: 'GO_TO_VAULT' }), onShop: () => dispatch({ type: 'GO_TO_SHOP' }), onSettings: () => dispatch({ type: 'GO_TO_SETTINGS' }) }),
    h('main', { style: { paddingTop: state.screen !== 'start' ? '5rem' : '0', paddingBottom: '2rem', paddingLeft: '1rem', paddingRight: '1rem', position: 'relative', zIndex: 10 } },
      state.screen === 'start' && h(StartScreen, { onStart: () => dispatch({ type: 'START_GAME' }) }),
      state.screen === 'map' && h(WorldMap, { zones: allZoneIds, currentZone: state.currentZone, completedZones, unlockedZones, onSelectZone: (id) => dispatch({ type: 'SELECT_ZONE', zoneId: id }) }),
      state.screen === 'zone' && h(ZoneView, { zoneId: state.currentZone, completedTrials: state.completedTrials[state.currentZone] || [], bossDefeated: !!state.bossDefeated[state.currentZone], needsRecap: needsRecap(state.currentZone), canStartBoss: canStartBoss(state.currentZone), onStartTrial: (type) => dispatch({ type: 'START_TRIAL', trialType: type }), onStartRecap: () => dispatch({ type: 'START_RECAP' }), onStartBoss: () => dispatch({ type: 'START_BOSS' }), onBack: () => dispatch({ type: 'GO_TO_MAP' }) }),
      state.screen === 'trial' && h(TrialScreen, { trialType: state.currentTrial, zoneId: state.currentZone, onComplete: handleTrialComplete, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }), onStreakUpdate: handleStreakUpdate }),
      state.screen === 'boss' && h(BossBattle, { zoneId: state.currentZone, onDefeat: handleBossDefeat, onFail: handleBossFail, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }), onStreakUpdate: handleStreakUpdate }),
      state.screen === 'recap' && h(RecapQuiz, { zoneId: state.currentZone, onComplete: handleRecapComplete, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }), onStreakUpdate: handleStreakUpdate }),
      state.screen === 'vault' && h(Vault, { artifacts: state.artifacts, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'shop' && h(Shop, { gold: state.gold, artifacts: state.artifacts, onBuy: handleBuyItem, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'settings' && h(SettingsScreen, { settings: state.settings, onUpdate: (s) => dispatch({ type: 'UPDATE_SETTINGS', settings: s }), onReset: () => { if (confirm('Wirklich zurücksetzen? Alle Daten gehen verloren.')) dispatch({ type: 'RESET' }); }, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) })
    ),
    state.screen !== 'start' && h(BertramFox, { message: getBertramMessage() })
  );
}

// ─── RENDER ───────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App, null));
})();
</script>
</body>
