// ─── BOSS QUESTION GENERATOR ──────────────────────────────────
function generateBossQuestions(level, vocabTheme) {
  const lvlKey = level.startsWith('A1') ? 'A1' : level.startsWith('A2') ? 'A2' : level.startsWith('B1') ? 'B1' : 'B2';
  const pool = vocabPools[vocabTheme] || vocabPools['greetings'];
  const gPool = grammarPools[lvlKey] || grammarPools['A1'];
  const sPool = sentencePools[lvlKey] || sentencePools['A1'];
  const questions = [];
  for (let i = 0; i < 3; i++) {
    const word = pool[i % pool.length];
    const wrong = pool[(i + 1) % pool.length];
    questions.push({ q: `Was bedeutet "${word.de}"?`, opts: [word.en, wrong.en, "to wait", "to speak"], correct: 0, type: "vocab", de: word.example });
  }
  for (let i = 0; i < 3; i++) {
    const rule = gPool[i % gPool.length];
    questions.push({ q: 'Welche Regel beschreibt dies?', opts: [rule.title, "Word Order", "Conjugation", "Plural Forms"], correct: 0, type: "grammar", de: rule.de });
  }
  for (let i = 0; i < 2; i++) {
    const sent = sPool[i % sPool.length];
    questions.push({ q: `Setze die Wörter in die richtige Reihenfolge: ${sent.parts.join(", ")}`, opts: [sent.translation, "Build the sentence", "Translate to German", "Identify the verb"], correct: 0, type: "sentence", de: sent.parts.join(" ") });
  }
  questions.push({ q: "Welcher Satz ist grammatikalisch korrekt?", opts: ["Ich habe das Buch gelesen.", "Ich habe gelesen das Buch.", "Ich das Buch habe gelesen.", "Gelesen ich habe das Buch."], correct: 0, type: "mixed" });
  questions.push({ q: "Wähle die richtige Präposition: Ich warte ___ den Bus.", opts: ["auf", "für", "mit", "zu"], correct: 0, type: "mixed" });
  return questions;
}

// ─── ZONE GENERATOR ───────────────────────────────────────────
function generateZone(meta) {
  const lvlKey = meta.level.startsWith('A1') ? 'A1' : meta.level.startsWith('A2') ? 'A2' : meta.level.startsWith('B1') ? 'B1' : 'B2';
  const pool = vocabPools[meta.vocabTheme] || vocabPools['greetings'];
  const vocab = [];
  for (let i = 0; i < 35; i++) vocab.push(pool[i % pool.length]);
  const grammar = (grammarPools[lvlKey] || grammarPools['A1']).slice(0, 3);
  const sentences = (sentencePools[lvlKey] || sentencePools['A1']).slice(0, 8);
  const dictation = (dictationPools[lvlKey] || dictationPools['A1']).slice(0, 5);
  const speaking = (speakingPools[lvlKey] || speakingPools['A1']).slice(0, 3);
  const boss = generateBossQuestions(meta.level, meta.vocabTheme);
  return { ...meta, vocab, grammar, sentences, dictation, speaking, boss };
}
const zones = zoneMeta.map(generateZone);
function getZoneById(id) { return zones.find(z => z.id === id); }
function getReviewWords(zoneId, count = 15) {
  const words = [];
  for (let i = zoneId - 1; i >= Math.max(1, zoneId - 5) && words.length < count; i--) {
    const z = getZoneById(i);
    if (z) words.push(...z.vocab.slice(0, count - words.length));
  }
  return words;
}

// ─── UTILITY FUNCTIONS ────────────────────────────────────────
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function calculateSimilarity(a, b) {
  const wa = a.split(/\s+/);
  const wb = b.split(/\s+/);
  const matches = wa.filter(w => wb.includes(w)).length;
  return matches / Math.max(wa.length, wb.length);
}
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = 0.85;
  u.pitch = 1.0;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

// ─── FLOATING PARTICLES ───────────────────────────────────────
function FloatingParticles() {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    let animId;
    const colors = ['#FFD700', '#7B8CA8', '#F5E6D3', '#4a1942', '#d4a574'];
    const particles = Array.from({ length: 50 }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 2 + 0.5,
      speedX: (Math.random() - 0.5) * 0.4,
      speedY: (Math.random() - 0.5) * 0.4 - 0.2,
      opacity: Math.random() * 0.5 + 0.1,
      color: colors[Math.floor(Math.random() * colors.length)]
    }));
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.opacity;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.opacity * 0.12;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      animId = requestAnimationFrame(animate);
    }
    animate();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return h('canvas', { ref: canvasRef, style: { position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0, mixBlendMode: 'screen' } });
}

// ─── LEXICON TRIAL ───────────────────────────────────────────
function LexiconTrial({ vocab, onComplete }) {
  const [phase, setPhase] = React.useState('study');
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [showResult, setShowResult] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [quizWords] = React.useState(() => shuffleArray(vocab.slice(0, 10)));
  const word = quizWords[currentIdx];
  const options = React.useMemo(() => {
    const wrong = vocab.filter(w => w.en !== word.en).slice(0, 3);
    return shuffleArray([word, ...wrong]);
  }, [currentIdx, quizWords]);
  const handleAnswer = (optIdx) => {
    if (selected !== null) return;
    setSelected(optIdx);
    const isCorrect = options[optIdx].en === word.en;
    const newScore = score + (isCorrect ? 10 : 0);
    if (isCorrect) setScore(s => s + 10);
    setTimeout(() => {
      if (currentIdx < quizWords.length - 1) {
        setCurrentIdx(c => c + 1);
        setSelected(null);
      } else {
        setShowResult(true);

        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ["#FFD700", "#F5E6D3", "#7B8CA8"] });

  React.useEffect(() => { setParts([]); setChecked(false); }, [currentIdx]);
  const addPart = p => { if (checked) return; setParts(prev => [...prev, p]); };
  const removePart = i => { if (checked) return; setParts(prev => prev.filter((_, j) => j !== i)); };
  const checkAnswer = () => { setChecked(true); if (JSON.stringify(parts) === JSON.stringify(sentence.parts)) setScore(s => s + 20); };
  const isCorrect = JSON.stringify(parts) === JSON.stringify(sentence.parts);
  const next = () => {
    if (currentIdx < quizSentences.length - 1) { setCurrentIdx(c => c + 1); } else {
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3', '#7B8CA8'] });

        h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem', color: '#f87171', marginBottom: '0.5rem' } }, h(X, { size: 20 }), h('span', { style: { fontWeight: '600' } }, 'Falsch')),

// ─── SPEAKING TRIAL (with timeout and German prompts) ─────────
function SpeakingTrial({ prompts, onComplete }) {
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [isRecording, setIsRecording] = React.useState(false);
  const [transcript, setTranscript] = React.useState('');
  const [feedback, setFeedback] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [unsupported, setUnsupported] = React.useState(false);
  const recognitionRef = React.useRef(null);
  const timeoutRef = React.useRef(null);
  const prompt = prompts[currentIdx];
  const startRecording = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setUnsupported(true); return; }
    const rec = new SR();
    rec.lang = 'de-DE';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    recognitionRef.current = rec;
    rec.onresult = e => {
      clearTimeout(timeoutRef.current);
      const said = e.results[0][0].transcript;
      setTranscript(said);
      evaluateSpeech(said, prompt);
      setIsRecording(false);
    };
    rec.onerror = () => { setIsRecording(false); };
    rec.onend = () => setIsRecording(false);
    rec.start();
    setIsRecording(true);
    setTranscript('');
    setFeedback(null);
    timeoutRef.current = setTimeout(() => {
      if (recognitionRef.current) recognitionRef.current.stop();
      setIsRecording(false);
      setFeedback({ similarity: 0, matched: [], missed: prompt.split(/\s+/), message: "Zeit abgelaufen – bitte erneut versuchen." });
    }, 10000);
  };
  const stopRecording = () => {
    clearTimeout(timeoutRef.current);
    recognitionRef.current?.stop();
    setIsRecording(false);
  };
  const evaluateSpeech = (said, pr) => {
    const norm = s => s.toLowerCase().replace(/[.,!?;:]/g, '').trim();
    const sw = norm(said).split(/\s+/);
    const pw = norm(pr).split(/\s+/);
    const matched = pw.filter(w => sw.includes(w));
    const missed = pw.filter(w => !sw.includes(w));
    const sim = matched.length / pw.length;
    setFeedback({ similarity: sim, matched, missed });
    setScore(s => s + Math.round(sim * 30));
  };
  const next = () => {
    if (currentIdx < prompts.length - 1) {
      setCurrentIdx(c => c + 1);
      setTranscript('');
      setFeedback(null);
    } else {
      confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3'] });
      onComplete(score, Math.floor(score / 10));
    }
  };
  return h('div', null,
    h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', fontSize: '0.875rem' } },
      h('span', { style: { color: '#7B8CA8' } }, `Prompt ${currentIdx+1}/${prompts.length}`),
      h('span', { style: { color: '#FFD700' } }, `Score: ${score}`)
    ),

// ─── GRAMMAR TRIAL ────────────────────────────────────────────
function GrammarTrial({ grammar, vocab, onComplete }) {
  const [phase, setPhase] = React.useState('teach');
  const [teachIdx, setTeachIdx] = React.useState(0);
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [showResult, setShowResult] = React.useState(false);
  const teachCards = grammar.slice(0, 3);
  const questions = React.useMemo(() => {
    const qs = [];
    const skipWords = new Set(['ich', 'du', 'er', 'sie', 'es', 'wir', 'ihr', 'und', 'oder', 'ein', 'eine', 'ist', 'sind']);
    grammar.slice(0, 3).forEach((rule, i) => {
      const words = rule.de.split(' ');
      const cards = words.map((_, idx) => idx).filter(idx => !skipWords.has(words[idx].toLowerCase()) && words[idx].length > 2);
      const blankIdx = cards.length > 0 ? cards[Math.floor(cards.length / 2)] : Math.floor(words.length / 2);
      const correct = words[blankIdx];
      const disp = [...words];
      disp[blankIdx] = '___';
      const distractors = [];
      grammar.forEach((r, j) => {
        if (j !== i) r.de.split(' ').forEach(w => {
          if (w.length > 2 && w.toLowerCase() !== correct.toLowerCase() && !skipWords.has(w.toLowerCase())) distractors.push(w);
        });
      });
      const ud = [...new Set(distractors)].slice(0, 3);
      while (ud.length < 3) ud.push(['gemacht', 'kommen', 'hatten'][ud.length]);
      qs.push({ type: 'fill', prompt: 'Vervollständige den Satz:', sentence: disp.join(' '), translation: rule.en, options: shuffleArray([correct, ...ud.slice(0, 3)]), correct, explanation: rule.rule, ruleTitle: rule.title });
    });
    vocab.filter(w => w.article).slice(0, 2).forEach(word => {
      const arts = ['der', 'die', 'das'];
      const corr = word.article;
      qs.push({ type: 'article', prompt: 'Welcher Artikel passt?', sentence: word.de.replace(/^(der|die|das)\s/i, ''), translation: word.en, options: shuffleArray(arts), correct: corr, explanation: `${corr === 'der'?'maskulin':corr==='die'?'feminin':'neutral'}.`, ruleTitle: 'Artikel' });
    });
    return qs;
  }, [grammar, vocab]);
  const currentQ = questions[currentIdx];
  const handleAnswer = opt => {
    if (selected !== null) return;
    setSelected(opt);
    const correct = opt === currentQ.correct;
    const newScore = score + (correct ? 20 : 0);
    if (correct) setScore(s => s + 20);
    setTimeout(() => {
      if (currentIdx < questions.length - 1) { setCurrentIdx(c => c + 1); setSelected(null); } else {
        setShowResult(true);
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3', '#7B8CA8'] });
        setTimeout(() => onComplete(newScore, Math.floor(newScore / 10)), 2000);
      }
    }, 1600);
  };
  if (showResult) return h('div', { style: { textAlign: 'center', padding: '3rem 0' } },
    h(Trophy, { size: 64, style: { color: '#FFD700', margin: '0 auto 1rem' } }),
    h('h3', { style: { fontSize: '1.5rem', fontWeight: 'bold', color: '#FFD700', marginBottom: '0.5rem', fontFamily: "'Cinzel',serif" } }, 'Prüfung bestanden!'),
    h('p', { style: { color: 'rgba(245,230,211,0.8)' } }, `Score: ${score}/${questions.length*20}`),
    h('p', { style: { color: '#FFD700', marginTop: '0.5rem' } }, `+${Math.floor(score/10)} Gold`)
  );
  if (phase === 'teach') {
    const card = teachCards[teachIdx];
    return h('div', null,
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', fontSize: '0.875rem' } },
        h('span', { style: { color: '#7B8CA8' } }, `Regel ${teachIdx+1} von ${teachCards.length}`),
        h('span', { style: { fontSize: '0.75rem', color: 'rgba(255,215,0,0.6)', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Lernphase')
      ),
      h('div', { style: { background: 'rgba(10,0,32,0.6)', border: '1px solid rgba(255,215,0,0.3)', borderRadius: '1rem', padding: '1.25rem', marginBottom: '1.25rem' } },
        h('div', { style: { display: 'inline-block', padding: '0.25rem 0.75rem', borderRadius: '9999px', background: 'rgba(255,215,0,0.1)', border: '1px solid rgba(255,215,0,0.3)', marginBottom: '0.75rem' } },
          h('span', { style: { color: '#FFD700', fontSize: '0.75rem', fontWeight: '600', letterSpacing: '0.05em' } }, card.title)
        ),
        h('p', { style: { color: 'rgba(245,230,211,0.9)', fontSize: '0.875rem', lineHeight: '1.6', marginBottom: '1.25rem' } }, card.rule),
        h('div', { style: { background: 'rgba(21,0,48,0.6)', border: '1px solid rgba(255,215,0,0.1)', borderRadius: '0.75rem', padding: '1rem' } },
          h('p', { style: { fontSize: '0.75rem', color: '#7B8CA8', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.5rem' } }, 'Beispiel'),
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } },
            h('p', { style: { color: '#FFD700', fontStyle: 'italic', fontFamily: "'EB Garamond',serif", fontSize: '1.125rem', fontWeight: '600', flex: 1 } }, card.de),
            h('button', { onClick: () => speak(card.de), style: { padding: '0.375rem', background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,215,0,0.6)', flexShrink: 0 } }, h(Volume2, { size: 16 }))
          ),
          h('p', { style: { color: '#7B8CA8', fontSize: '0.875rem', marginTop: '0.25rem', fontStyle: 'italic' } }, card.en)
        )
      ),
      h('div', { style: { display: 'flex', gap: '0.75rem' } },
        teachIdx < teachCards.length - 1 ? h('button', { onClick: () => setTeachIdx(i => i + 1), style: { flex: 1, padding: '0.75rem', background: 'rgba(255,215,0,0.2)', border: '1px solid rgba(255,215,0,0.5)', borderRadius: '0.5rem', color: '#FFD700', fontWeight: '600', cursor: 'pointer' } }, 'Nächste Regel →') :
        h('button', { onClick: () => setPhase('quiz'), style: { flex: 1, padding: '0.75rem', background: 'rgba(255,215,0,0.3)', border: '1px solid #FFD700', borderRadius: '0.5rem', color: '#FFD700', fontWeight: 'bold', cursor: 'pointer' } }, 'Quiz starten ✨')
      ),
      h('div', { style: { display: 'flex', justifyContent: 'center', gap: '0.5rem', marginTop: '1rem' } },
        teachCards.map((_, i) => h('div', { key: i, style: { width: '0.5rem', height: '0.5rem', borderRadius: '50%', background: i === teachIdx ? '#FFD700' : 'rgba(255,215,0,0.2)', transition: 'all 0.3s' } }))
      )
    );
  }
  return h('div', null,
    h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', fontSize: '0.875rem' } },
      h('span', { style: { color: '#7B8CA8' } }, `Frage ${currentIdx+1}/${questions.length}`),
      h('span', { style: { color: '#FFD700' } }, `Score: ${score}`)
    ),
    h('div', { style: { display: 'inline-block', padding: '0.25rem 0.75rem', borderRadius: '9999px', background: 'rgba(255,215,0,0.1)', border: '1px solid rgba(255,215,0,0.2)', marginBottom: '0.75rem' } },
      h('span', { style: { color: 'rgba(255,215,0,0.7)', fontSize: '0.75rem' } }, currentQ.ruleTitle)
    ),
    h('div', { style: { background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1.5rem' } },
      h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8', marginBottom: '0.5rem' } }, currentQ.prompt),
      h('p', { style: { color: '#FFD700', fontStyle: 'italic', fontFamily: "'EB Garamond',serif", fontSize: '1.25rem', fontWeight: '600' } }, currentQ.sentence),
      h('p', { style: { color: '#7B8CA8', fontSize: '0.875rem', marginTop: '0.5rem', fontStyle: 'italic' } }, currentQ.translation)
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(2,minmax(0,1fr))', gap: '0.75rem', marginBottom: '1rem' } },
      currentQ.options.map((opt, i) => {
        const isCorrect = opt === currentQ.correct;
        const isSel = selected === opt;
        return h('button', { key: i, onClick: () => handleAnswer(opt), disabled: selected !== null, style: { padding: '1rem', borderRadius: '0.75rem', border: '1px solid', textAlign: 'center', fontWeight: '600', fontStyle: 'italic', cursor: selected !== null ? 'default' : 'pointer', borderColor: selected === null ? 'rgba(255,215,0,0.2)' : isCorrect ? 'rgba(52,211,153,0.6)' : isSel ? 'rgba(248,113,113,0.6)' : 'rgba(123,140,168,0.2)', background: selected === null ? 'rgba(10,0,32,0.5)' : isCorrect ? 'rgba(6,78,59,0.4)' : isSel ? 'rgba(127,29,29,0.4)' : 'rgba(10,0,32,0.3)', color: selected === null ? '#F5E6D3' : isCorrect ? '#6ee7b7' : isSel ? '#fca5a5' : 'rgba(123,140,168,0.4)', transition: 'all 0.3s' } },
          opt,
          selected !== null && isCorrect && h(Check, { size: 16, style: { display: 'inline', marginLeft: '0.25rem' } }),
          isSel && !isCorrect && h(X, { size: 16, style: { display: 'inline', marginLeft: '0.25rem' } })
        );
      })
    ),
    selected !== null && h('div', { style: { padding: '1rem', borderRadius: '0.75rem', border: '1px solid', borderColor: selected === currentQ.correct ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)', background: selected === currentQ.correct ? 'rgba(6,78,59,0.2)' : 'rgba(127,29,29,0.2)' } },
      h('p', { style: { fontSize: '0.75rem', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.05em', color: '#7B8CA8', marginBottom: '0.25rem' } }, 'Warum?'),
      h('p', { style: { fontSize: '0.875rem', color: 'rgba(245,230,211,0.8)', lineHeight: '1.6' } }, currentQ.explanation)
    )
  );
}

// ─── WRITING TRIAL ────────────────────────────────────────────
function WritingTrial({ prompts, onComplete }) {
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [input, setInput] = React.useState('');
  const [score, setScore] = React.useState(0);
  const [checking, setChecking] = React.useState(false);
  const [feedback, setFeedback] = React.useState(null);
  const checkWriting = async () => {
    if (!input.trim()) return;
    setChecking(true);
    try {
      const params = new URLSearchParams({ text: input, language: 'de-DE', enabledOnly: 'false' });
      const res = await fetch('https://api.languagetool.org/v2/check', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() });
      const data = await res.json();
      const errors = data.matches || [];
      const wc = input.trim().split(/\s+/).length;
      const base = Math.min(wc * 4, 25);
      const ded = Math.min(errors.length * 4, 20);
      const pts = Math.max(base - ded, 5);
      let msg = errors.length === 0 ? 'Perfekt! Keine Fehler gefunden.' : errors.length <= 2 ? 'Gut gemacht! Ein paar kleine Fehler.' : 'Weiter üben! Schau dir die Hinweise unten an.';
      setFeedback({ errors, score: pts, message: msg });
      setScore(s => s + pts);
    } catch {
      const wc = input.trim().split(/\s+/).length;
      const pts = Math.min(wc * 4, 25);
      setFeedback({ errors: [], score: pts, message: 'Grammatikprüfung nicht verfügbar. Punkte für Wortanzahl.' });
      setScore(s => s + pts);
    } finally { setChecking(false); }
  };
  const next = () => {
    if (currentIdx < prompts.length - 1) { setCurrentIdx(c => c + 1); setInput(''); setFeedback(null); } else {
      confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3'] });
      onComplete(score, Math.floor(score / 10));
    }
  };
  return h('div', null,
    h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', fontSize: '0.875rem' } },
      h('span', { style: { color: '#7B8CA8' } }, `Aufgabe ${currentIdx+1}/${prompts.length}`),
      h('span', { style: { color: '#FFD700' } }, `Score: ${score}`)
    ),
    h('div', { style: { background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' } },
      h('p', { style: { fontSize: '0.75rem', color: '#7B8CA8', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.5rem' } }, 'Schreibe auf Deutsch.'),
      h('p', { style: { color: '#F5E6D3' } }, prompts[currentIdx])
    ),
    !feedback ? h(React.Fragment, null,
      h('textarea', { value: input, onChange: e => setInput(e.target.value), placeholder: 'Deine Antwort auf Deutsch...', style: { width: '100%', height: '8rem', background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '0.75rem', padding: '1rem', color: '#F5E6D3', resize: 'none', outline: 'none', marginBottom: '1rem', fontFamily: "'EB Garamond',serif", fontSize: '1rem' } }),
      h('button', { onClick: checkWriting, disabled: !input.trim() || checking, style: { width: '100%', padding: '0.75rem', background: 'rgba(255,215,0,0.2)', border: '1px solid rgba(255,215,0,0.5)', borderRadius: '0.5rem', color: '#FFD700', fontWeight: '600', cursor: !input.trim() || checking ? 'not-allowed' : 'pointer', opacity: !input.trim() || checking ? 0.3 : 1 } }, checking ? 'Wird geprüft...' : 'Einreichen & Prüfen')
    ) : h('div', null,
      h('div', { style: { padding: '1rem', borderRadius: '0.75rem', border: '1px solid', marginBottom: '1rem', borderColor: feedback.errors.length === 0 ? 'rgba(16,185,129,0.3)' : 'rgba(234,179,8,0.3)', background: feedback.errors.length === 0 ? 'rgba(6,78,59,0.2)' : 'rgba(113,63,18,0.2)' } },
        h('p', { style: { fontWeight: '600', marginBottom: '0.25rem', color: feedback.errors.length === 0 ? '#6ee7b7' : '#fde047' } }, feedback.message),
        h('p', { style: { fontSize: '0.75rem', color: '#7B8CA8' } }, `+${feedback.score} Punkte`)
      ),
      feedback.errors.length > 0 && h('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.5rem', marginBottom: '1rem' } },
        feedback.errors.slice(0, 4).map((err, i) => h('div', { key: i, style: { background: 'rgba(10,0,32,0.5)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: '0.5rem', padding: '0.75rem' } },
          h('div', { style: { display: 'flex', alignItems: 'flex-start', gap: '0.5rem' } },
            h(X, { size: 16, style: { color: '#f87171', flexShrink: 0, marginTop: '0.125rem' } }),
            h('div', null,
              h('p', { style: { fontSize: '0.875rem', color: '#fca5a5', fontWeight: '500' } },
                `"${input.substring(err.offset, err.offset+err.length)}"`,
                err.replacements?.length > 0 && h('span', { style: { color: '#6ee7b7', marginLeft: '0.5rem' } }, `→ ${err.replacements[0].value}`)
              ),
              h('p', { style: { fontSize: '0.75rem', color: '#7B8CA8', marginTop: '0.25rem' } }, err.message)
            )
          )
        ))
      ),
      h('button', { onClick: next, style: { width: '100%', padding: '0.75rem', background: 'rgba(255,215,0,0.2)', border: '1px solid rgba(255,215,0,0.5)', borderRadius: '0.5rem', color: '#FFD700', fontWeight: '600', cursor: 'pointer' } },
        currentIdx < prompts.length - 1 ? 'Nächste Aufgabe →' : 'Abschließen')
    )
  );
}

// ─── TRIAL SCREEN ─────────────────────────────────────────────
function TrialScreen({ trialType, zoneId, onComplete, onBack }) {
  const zone = getZoneById(zoneId);
  if (!zone) return null;
  const trialNames = { lexicon: 'Lexicon-Keller', sentence: 'Satz-Schmiede', listening: 'Hör-Gewölbe', speaking: 'Sprech-Halle', grammar: 'Grammatik-Keller', writing: 'Schreib-Gewölbe' };
  return h('div', { style: { maxWidth: '48rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', borderRadius: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('div', null,
        h('h2', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, trialNames[trialType]),
        h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8' } }, `Zone ${zoneId}: ${zone.name}`)

// ─── BOSS BATTLE ──────────────────────────────────────────────
function BossBattle({ zoneId, onDefeat, onFail, onBack }) {
  const zone = getZoneById(zoneId);
  const [currentQ, setCurrentQ] = React.useState(0);
  const [hp, setHp] = React.useState(3);
  const [bossHp, setBossHp] = React.useState(10);
  const [score, setScore] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [phase, setPhase] = React.useState('battle');
  const scoreRef = React.useRef(score);
  scoreRef.current = score;   // keep ref synced with state
  if (!zone) return null;
  const questions = zone.boss;
  const q = questions[currentQ];
  const handleAnswer = idx => {
    if (selected !== null) return;
    setSelected(idx);
    const isCorrect = idx === q.correct;
    setTimeout(() => {
      if (isCorrect) {
        const newBossHp = bossHp - 1;
        setBossHp(newBossHp);
        setScore(s => {
          const updated = s + 20;
          scoreRef.current = updated;
          return updated;
        });
        if (newBossHp <= 0) {
          setPhase('victory');
          confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#FFD700', '#FF4500', '#F5E6D3'] });
          setTimeout(() => onDefeat(scoreRef.current + 20), 3000);
          return;
        }
      } else {
        const newHp = hp - 1;
        setHp(newHp);
        if (newHp <= 0) {
          setPhase('defeat');
          setTimeout(() => onFail(), 3000);
          return;
        }
      }
      setCurrentQ(c => (c + 1) % questions.length);
      setSelected(null);
    }, 1000);
  };
  if (phase === 'victory') return h('div', { style: { maxWidth: '42rem', margin: '0 auto', textAlign: 'center', padding: '5rem 0' } },
    h(Trophy, { size: 96, style: { color: '#FFD700', margin: '0 auto 1.5rem' } }),
    h('h2', { style: { fontSize: '2.25rem', fontWeight: 'bold', color: '#FFD700', marginBottom: '1rem', fontFamily: "'Cinzel',serif" } }, 'Sieg!'),
    h('p', { style: { fontSize: '1.25rem', color: '#F5E6D3', marginBottom: '0.5rem' } }, `Zone ${zoneId} gemeistert`),
    h('p', { style: { color: '#FFD700', fontSize: '1.125rem' } }, `+${scoreRef.current} XP +150 Gold • Artefakt erhalten!`)
  );
  if (phase === 'defeat') return h('div', { style: { maxWidth: '42rem', margin: '0 auto', textAlign: 'center', padding: '5rem 0' } },
    h(Shield, { size: 80, style: { color: '#f87171', margin: '0 auto 1.5rem' } }),
    h('h2', { style: { fontSize: '1.875rem', fontWeight: 'bold', color: '#f87171', marginBottom: '1rem', fontFamily: "'Cinzel',serif" } }, 'Niederlage'),
    h('p', { style: { color: 'rgba(245,230,211,0.8)', marginBottom: '1rem' } }, 'Der Boss war zu stark. Versuche es später erneut.'),
    h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8' } }, '-40 Gold Strafe')
  );
  return h('div', { style: { maxWidth: '42rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('div', { style: { flex: 1 } },
        h('h2', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#f87171', fontFamily: "'Cinzel',serif" } }, 'Boss Kampf'),
        h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8' } }, `Zone ${zoneId}: ${zone.name}`)
      ),
      h(Swords, { size: 24, style: { color: '#f87171' } })
    ),
    h('div', { style: { background: 'linear-gradient(135deg,#1a0a3e,#0d0221)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: '1rem', padding: '1.5rem' } },
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '2rem' } },
        h('div', { style: { display: 'flex', gap: '0.25rem' } },
          [0,1,2].map(i => h(Heart, { key: i, size: 20, fill: i < hp ? '#ef4444' : 'none', style: { color: i < hp ? '#ef4444' : 'rgba(123,140,168,0.3)' } }))
        ),
        h('span', { style: { fontSize: '0.875rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, 'VS'),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem' } },
          h('span', { style: { fontSize: '0.75rem', color: '#f87171' } }, 'Boss'),

            h('div', { style: { height: '100%', width: `${bossHp/10*100}%`, background: 'linear-gradient(to right,#dc2626,#f97316)', transition: 'width 0.5s', borderRadius: '9999px' } })
          )
        )
      ),
      h('div', { style: { textAlign: 'center', marginBottom: '1.5rem' } },
        h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8', marginBottom: '0.75rem' } }, `Frage ${currentQ+1}`),
        h('p', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#F5E6D3', marginBottom: '0.75rem' } }, q.q),
        q.de && h('button', { onClick: () => speak(q.de), style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#FFD700', display: 'inline-flex', alignItems: 'center', gap: '0.5rem' } },

          h('span', { style: { color: '#F5E6D3' } }, opt),
          selected !== null && i === q.correct && h(Check, { size: 20, style: { display: 'inline', marginLeft: '0.5rem', color: '#34d399' } }),

  );
}

// ─── RECAP QUIZ ───────────────────────────────────────────────
function RecapQuiz({ zoneId, onComplete, onBack }) {
  const [currentQ, setCurrentQ] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [showResult, setShowResult] = React.useState(false);
  const reviewWords = getReviewWords(zoneId, 15);
  const questions = React.useMemo(() => reviewWords.slice(0, 10).map(word => {
    const wrong = reviewWords.filter(w => w.en !== word.en).slice(0, 3);
    const options = [word, ...wrong].sort(() => Math.random() - 0.5);
    return { word, options, correctIdx: options.findIndex(o => o.en === word.en) };
  }), [zoneId]);
  const handleAnswer = idx => {
    if (selected !== null) return;
    setSelected(idx);
    if (idx === questions[currentQ].correctIdx) setScore(s => s + 10);
    setTimeout(() => {
      if (currentQ < questions.length - 1) { setCurrentQ(c => c + 1); setSelected(null); } else { setShowResult(true);
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#F5E6D3'] });
        setTimeout(() => onComplete(score, Math.floor(score / 10)), 2000); }
    }, 1000);
  };
  if (showResult) return h('div', { style: { maxWidth: '36rem', margin: '0 auto', textAlign: 'center', padding: '5rem 0' } },
    h(Trophy, { size: 64, style: { color: '#FFD700', margin: '0 auto 1rem' } }),

    h('p', { style: { color: 'rgba(245,230,211,0.8)', marginBottom: '0.5rem' } }, `Score: ${score}/100`),
    h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8' } }, 'Die vorherigen Zonen sind nun freigeschaltet.')
  );
  const q = questions[currentQ];
  return h('div', { style: { maxWidth: '36rem', margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' } },
      h('button', { onClick: onBack, style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#7B8CA8' } }, h(ArrowLeft, { size: 20 })),
      h('h2', { style: { fontSize: '1.25rem', fontWeight: 'bold', color: '#FFD700', fontFamily: "'Cinzel',serif" } }, 'Täglicher Rückblick')
    ),
    h('div', { style: { background: 'linear-gradient(135deg,#1a0a3e,#0d0221)', border: '1px solid rgba(255,215,0,0.2)', borderRadius: '1rem', padding: '1.5rem' } },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', fontSize: '0.875rem' } },
        h('span', { style: { color: '#7B8CA8' } }, `Frage ${currentQ+1}/${questions.length}`),
        h('span', { style: { color: '#FFD700' } }, `Score: ${score}`)
      ),
      h('div', { style: { textAlign: 'center', marginBottom: '2rem' } },
        h('p', { style: { fontSize: '0.875rem', color: '#7B8CA8', marginBottom: '0.5rem' } }, 'Was bedeutet:'),
        h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.75rem' } },
          h('p', { style: { fontSize: '1.5rem', fontWeight: 'bold', color: '#FFD700', fontStyle: 'italic', fontFamily: "'EB Garamond',serif" } }, `${q.word.article?q.word.article+' ':''}${q.word.de}`),
          h('button', { onClick: () => speak(q.word.de), style: { padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: '#FFD700' } }, h(Volume2, { size: 20 }))
        )

      h('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.75rem' } },
        q.options.map((opt, i) => h('button', { key: i, onClick: () => handleAnswer(i), disabled: selected !== null, style: { padding: '1rem', borderRadius: '0.75rem', border: '1px solid', textAlign: 'left', cursor: selected !== null ? 'default' : 'pointer', borderColor: selected === null ? 'rgba(255,215,0,0.2)' : i === q.correctIdx ? 'rgba(16,185,129,0.5)' : selected === i ? 'rgba(239,68,68,0.5)' : 'rgba(123,140,168,0.2)', background: selected === null ? 'rgba(10,0,32,0.5)' : i === q.correctIdx ? 'rgba(6,78,59,0.3)' : selected === i ? 'rgba(127,29,29,0.3)' : 'rgba(10,0,32,0.3)', opacity: selected !== null && i !== q.correctIdx && selected !== i ? 0.5 : 1, transition: 'all 0.3s' } },
          h('span', { style: { color: '#F5E6D3' } }, opt.en),
          selected !== null && i === q.correctIdx && h(Check, { size: 16, style: { display: 'inline', marginLeft: '0.5rem', color: '#34d399' } }),

  const { state, dispatch, isZoneUnlocked, canStartBoss, needsRecap } = useGameState();
  const allZoneIds = Array.from({ length: 120 }, (_, i) => i + 1);
  const completedZones = Object.keys(state.bossDefeated).map(Number).filter(id => state.bossDefeated[id]);
  const unlockedZones = allZoneIds.filter(id => isZoneUnlocked(id));
  const bertramMessages = {
    start: "Willkommen, Reisender! Ich bin Bertram, der Fuchs der Weisheit. Gemeinsam erobern wir die deutsche Sprache!",
    map: "Wähle eine Zone auf der Karte. Jede Zone bietet neue Herausforderungen!",
    zone: "Hier kannst du Prüfungen ablegen. Schließe mindestens 4 ab, um den Boss herauszufordern!",
    trial: "Konzentriere dich! Jede richtige Antwort bringt dich dem Ziel näher.",
    boss: "Der Boss ist mächtig! Aber du hast alles gelernt, was du brauchst.",
    victory: "Fantastisch! Du hast den Boss besiegt und die Zone gemeistert!",
    defeat: "Keine Sorge, das passiert den Besten. Übe weiter und versuche es erneut.",
    default: "Übung macht den Meister. Bleib dran!"
  };
  const getBertramMessage = () => {
    if (state.screen === 'start') return bertramMessages.start;
    if (state.screen === 'map') return bertramMessages.map;
    if (state.screen === 'zone') return bertramMessages.zone;
    if (state.screen === 'trial') return bertramMessages.trial;
    if (state.screen === 'boss') return bertramMessages.boss;
    return bertramMessages.default;
  };
  const handleTrialComplete = (score, goldEarned) => {
    dispatch({ type: 'COMPLETE_TRIAL', score, goldEarned, trialType: state.currentTrial });
  };
  const handleTrialFail = () => {
    dispatch({ type: 'FAIL_TRIAL' });
  };
  const handleBossDefeat = (score) => {
    dispatch({ type: 'DEFEAT_BOSS', score });
  };
  const handleBossFail = () => {
    dispatch({ type: 'FAIL_BOSS' });
  };
  const handleRecapComplete = (score, goldEarned) => {
    dispatch({ type: 'COMPLETE_RECAP', score, goldEarned });
  };
  const handleBuyItem = (itemId, cost) => {
    dispatch({ type: 'BUY_ITEM', itemId, cost });
  };
  return h('div', { style: { minHeight: '100vh', position: 'relative' } },
    h(FloatingParticles, null),
    state.screen !== 'start' && h(HUD, { xp: state.xp, gold: state.gold, level: state.level, streak: state.streak, currentZone: state.currentZone, onMap: () => dispatch({ type: 'GO_TO_MAP' }), onVault: () => dispatch({ type: 'GO_TO_VAULT' }), onShop: () => dispatch({ type: 'GO_TO_SHOP' }), onSettings: () => dispatch({ type: 'GO_TO_SETTINGS' }) }),
    h('main', { style: { paddingTop: state.screen !== 'start' ? '5rem' : '0', paddingBottom: '2rem', paddingLeft: '1rem', paddingRight: '1rem', position: 'relative', zIndex: 10 } },
      state.screen === 'start' && h(StartScreen, { onStart: () => dispatch({ type: 'START_GAME' }) }),
      state.screen === 'map' && h(WorldMap, { zones: allZoneIds, currentZone: state.currentZone, completedZones, unlockedZones, onSelectZone: (id) => dispatch({ type: 'SELECT_ZONE', zoneId: id }) }),
      state.screen === 'zone' && h(ZoneView, { zoneId: state.currentZone, completedTrials: state.completedTrials[state.currentZone] || [], bossDefeated: !!state.bossDefeated[state.currentZone], needsRecap: needsRecap(state.currentZone), canStartBoss: canStartBoss(state.currentZone), onStartTrial: (type) => dispatch({ type: 'START_TRIAL', trialType: type }), onStartRecap: () => dispatch({ type: 'START_RECAP' }), onStartBoss: () => dispatch({ type: 'START_BOSS' }), onBack: () => dispatch({ type: 'GO_TO_MAP' }) }),
      state.screen === 'trial' && h(TrialScreen, { trialType: state.currentTrial, zoneId: state.currentZone, onComplete: handleTrialComplete, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'boss' && h(BossBattle, { zoneId: state.currentZone, onDefeat: handleBossDefeat, onFail: handleBossFail, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'recap' && h(RecapQuiz, { zoneId: state.currentZone, onComplete: handleRecapComplete, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'vault' && h(Vault, { artifacts: state.artifacts, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'shop' && h(Shop, { gold: state.gold, artifacts: state.artifacts, onBuy: handleBuyItem, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) }),
      state.screen === 'settings' && h(SettingsScreen, { settings: state.settings, onUpdate: (s) => dispatch({ type: 'UPDATE_SETTINGS', settings: s }), onReset: () => { if (confirm('Wirklich zurücksetzen? Alle Daten gehen verloren.')) dispatch({ type: 'RESET' }); }, onBack: () => dispatch({ type: 'BACK_TO_ZONE' }) })
    ),
    state.screen !== 'start' && h(BertramFox, { message: getBertramMessage() })
  );
}

// ─── RENDER ───────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App, null));
})();
</script>
</body>
</html>
