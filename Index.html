<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Schattenreich: Der Nigerianische Weg — A1</title>
<style>
:root{
  --bg:#07001a;--bg2:#100030;--card:#0e0028;--cream:#F5E6D3;
  --gold:#FFD700;--gdim:#8a7200;--green:#4CAF50;--burg:#8B0000;
  --blue:#00BFFF;--slate:#8090a8;--fox:#FF8C00;--correct:#0d2e0d;--wrong:#2e0d0d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--cream);font-family:Georgia,serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 40%,#180040 0%,transparent 55%),
  radial-gradient(ellipse at 85% 15%,#0a0030 0%,transparent 50%)}
.cinzel{font-family:'Cinzel Decorative',Georgia,serif;letter-spacing:.5px}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,215,0,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 8%,rgba(255,215,0,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 65%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 35%,rgba(255,215,0,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 25% 80%,rgba(255,215,0,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 90%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 95% 55%,rgba(255,215,0,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 5% 50%,rgba(255,255,255,.3) 0%,transparent 100%)}

/* HUD */
.hud{position:sticky;top:0;z-index:100;background:rgba(7,0,26,.97);
  border-bottom:1px solid rgba(255,215,0,.15);padding:8px 14px;
  display:flex;align-items:center;gap:10px}
.hud-xp{flex:1}
.hud-xp-label{font-size:10px;color:var(--slate);display:flex;justify-content:space-between}
.hud-bar{height:3px;background:rgba(255,215,0,.15);border-radius:2px;margin-top:3px}
.hud-fill{height:100%;background:linear-gradient(90deg,var(--gdim),var(--gold));border-radius:2px;transition:width .5s}
.hud-gold{font-size:13px;color:var(--gold);display:flex;align-items:center;gap:3px}
.hud-streak{font-size:16px}
.hud-lvl{font-size:10px;color:var(--slate)}

/* Screens */
.screen{padding:16px;animation:fadeIn .35s ease;position:relative;z-index:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* START SCREEN */
.start{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:32px 20px}
.fox-anim{font-size:72px;animation:bob 3s ease-in-out infinite;margin-bottom:12px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.start-title{font-size:26px;color:var(--gold);line-height:1.2;margin-bottom:6px;
  text-shadow:0 0 40px rgba(255,215,0,.4)}
.start-sub{font-size:11px;color:var(--slate);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
.bertram-quote{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.18);
  border-radius:12px;padding:16px;margin-bottom:24px;font-style:italic;
  font-size:14px;line-height:1.7;color:var(--cream);position:relative}
.bertram-quote::before{content:'"';font-size:48px;color:var(--gold);opacity:.2;
  position:absolute;top:2px;left:8px;line-height:1;font-family:Georgia,serif}
.start-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-bottom:24px}
.info-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:10px;text-align:center}
.info-val{font-size:20px;color:var(--gold);font-family:Georgia,serif}
.info-key{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:1px}

/* BUTTONS */
.btn{display:block;width:100%;padding:14px 18px;border:none;border-radius:8px;
  cursor:pointer;font-size:13px;letter-spacing:1px;transition:all .2s;text-align:center}
.btn-gold{background:linear-gradient(135deg,#7a6000,var(--gold),#7a6000);
  color:#07001a;font-weight:700;box-shadow:0 4px 20px rgba(255,215,0,.25)}
.btn-gold:active{transform:scale(.97)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(255,215,0,.35)}
.btn-outline:active{background:rgba(255,215,0,.08)}
.btn-sm{width:auto;display:inline-block;padding:8px 16px;font-size:12px}
.btn-danger{background:rgba(139,0,0,.4);color:#ff9999;border:1px solid rgba(139,0,0,.5)}
.btn-success{background:rgba(76,175,80,.2);color:var(--green);border:1px solid rgba(76,175,80,.4)}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}
.flex-row{display:flex;gap:10px}.flex1{flex:1}

/* MAP */
.map-title{font-size:21px;color:var(--gold);text-align:center;margin-bottom:4px}
.map-sub{font-size:11px;color:var(--slate);text-align:center;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:18px}
.level-sec{margin-bottom:22px}
.level-hdr{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gdim);
  margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid rgba(255,215,0,.12)}
.zones-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.zone-node{aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
  border:2px solid transparent;position:relative}
.zone-node.done{background:linear-gradient(135deg,#0d3a0d,#1a5a1a);border-color:var(--green)}
.zone-node.current{background:linear-gradient(135deg,#2a1a00,#4a3000);border-color:var(--gold);
  box-shadow:0 0 18px rgba(255,215,0,.45);animation:zpulse 2s infinite}
.zone-node.locked{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.08);
  cursor:not-allowed;opacity:.5}
@keyframes zpulse{0%,100%{box-shadow:0 0 18px rgba(255,215,0,.45)}50%{box-shadow:0 0 30px rgba(255,215,0,.7)}}
.zone-emoji{font-size:18px;margin-bottom:2px}
.zone-num{font-size:9px;color:inherit;font-family:Georgia,serif}

/* ZONE VIEW */
.zone-hdr{background:linear-gradient(135deg,rgba(255,215,0,.06),rgba(255,215,0,.02));
  border:1px solid rgba(255,215,0,.18);border-radius:12px;padding:16px;
  margin-bottom:14px;text-align:center}
.zone-big-emoji{font-size:44px;margin-bottom:8px}
.zone-name{font-size:19px;color:var(--gold);margin-bottom:4px}
.zone-subtitle{font-size:12px;color:var(--slate)}
.zone-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;
  letter-spacing:1px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);
  color:var(--gold);margin-top:8px}

/* GRAMMAR CARD */
.gram-card{background:rgba(0,191,255,.04);border:1px solid rgba(0,191,255,.18);
  border-radius:10px;padding:14px;margin-bottom:12px}
.gram-title{font-size:12px;color:var(--blue);margin-bottom:5px;letter-spacing:.5px}
.gram-rule{font-size:14px;color:var(--cream);line-height:1.6;margin-bottom:8px}
.gram-de{font-style:italic;color:var(--gold);font-size:15px}
.gram-en{font-size:12px;color:var(--slate);margin-top:2px}
.gram-hack{font-size:12px;color:var(--fox);margin-top:6px;padding-top:6px;
  border-top:1px solid rgba(255,140,0,.15)}

/* TRIALS */
.trials-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.trial-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:13px 15px;cursor:pointer;display:flex;align-items:center;
  gap:12px;transition:all .2s}
.trial-card:active{transform:scale(.98)}
.trial-card.done{border-color:rgba(76,175,80,.35);background:rgba(76,175,80,.04)}
.trial-card.locked{opacity:.35;cursor:not-allowed}
.trial-icon{font-size:22px;width:34px;text-align:center}
.trial-name{font-size:13px;color:var(--cream)}
.trial-desc{font-size:11px;color:var(--slate);margin-top:2px}
.trial-check{font-size:18px;margin-left:auto}

/* TRIAL SCREENS */
.trial-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;
  padding-bottom:12px;border-bottom:1px solid rgba(255,215,0,.12)}
.t-back{font-size:22px;cursor:pointer;color:var(--gold);padding:4px 8px 4px 0}
.t-title{font-size:15px;color:var(--gold)}
.prog-bar{height:3px;background:rgba(255,215,0,.15);border-radius:2px;margin-bottom:18px}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}

/* FLASHCARD */
.flashcard{background:linear-gradient(135deg,rgba(255,215,0,.06),rgba(255,215,0,.02));
  border:1px solid rgba(255,215,0,.28);border-radius:14px;padding:26px 18px;
  text-align:center;margin-bottom:14px;min-height:150px;
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.fc-de{font-size:26px;color:var(--gold);margin-bottom:8px;line-height:1.4}
.fc-en{font-size:15px;color:var(--slate)}
.speak-btn{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.28);
  border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;
  margin:8px auto;display:flex;align-items:center;justify-content:center}
.speak-btn:active{background:rgba(255,215,0,.25);transform:scale(.9)}

/* QUIZ */
.quiz-q{font-size:15px;color:var(--cream);margin-bottom:18px;line-height:1.6;text-align:center}
.quiz-de{font-size:21px;color:var(--gold);display:block;margin:6px 0;font-family:Georgia,serif}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.13);
  border-radius:9px;padding:13px 15px;cursor:pointer;font-size:14px;color:var(--cream);
  text-align:left;transition:all .2s;width:100%}
.opt:active{transform:scale(.98)}
.opt.correct{background:var(--correct);border-color:var(--green);color:#90EE90}
.opt.wrong{background:var(--wrong);border-color:var(--burg);color:#ff9999}
.opt.disabled{cursor:not-allowed}

/* FEEDBACK */
.feedback{border-radius:9px;padding:13px;margin:10px 0;font-size:13px;
  line-height:1.6;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fb-ok{background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.28);color:#a0e8a0}
.fb-err{background:rgba(139,0,0,.15);border:1px solid rgba(139,0,0,.35);color:#ff9999}
.bertram{font-style:italic;color:var(--gold);margin-top:5px;font-size:12px}

/* WORD TILES */
.tiles-area{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;min-height:50px;
  padding:10px;background:rgba(0,0,0,.2);border-radius:9px;border:1px dashed rgba(255,215,0,.18)}
.answer-area{background:rgba(255,215,0,.02);border-color:rgba(255,215,0,.28);min-height:50px}
.tile{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.28);border-radius:6px;
  padding:6px 11px;font-size:14px;color:var(--gold);cursor:pointer;
  transition:all .15s;user-select:none;font-family:Georgia,serif}
.tile:active{transform:scale(.95)}
.tile.placed{opacity:.35;cursor:default}

/* HACK CARDS */
.hack-card{background:linear-gradient(135deg,rgba(255,140,0,.07),rgba(255,140,0,.02));
  border:1px solid rgba(255,140,0,.28);border-radius:12px;padding:15px;margin-bottom:12px}
.hack-title{font-size:12px;color:var(--fox);margin-bottom:7px;display:flex;
  align-items:center;gap:7px;letter-spacing:.5px}
.hack-icon{font-size:18px}
.hack-new{background:var(--fox);color:#000;font-size:9px;padding:2px 7px;
  border-radius:10px;letter-spacing:1px;font-weight:700}
.hack-rule{font-size:13px;color:var(--cream);line-height:1.7;margin-bottom:10px}
.hack-chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.2);
  border-radius:20px;padding:4px 11px;font-size:12px;color:var(--cream)}
.chip-hl{color:var(--fox);font-weight:700}

/* HACK LAB PUZZLE */
.hack-puzzle{background:rgba(255,140,0,.04);border:1px solid rgba(255,140,0,.2);
  border-radius:9px;padding:13px;margin-bottom:12px}
.puzzle-q{font-size:14px;color:var(--cream);margin-bottom:12px;line-height:1.5}
.puzzle-en{font-size:16px;color:var(--blue);font-weight:700;margin-bottom:8px}

/* LISTENING */
.listen-hint{text-align:center;color:var(--slate);font-size:13px;margin-bottom:12px}
.play-btn{background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,215,0,.08));
  border:2px solid rgba(255,215,0,.38);border-radius:50%;width:68px;height:68px;
  font-size:26px;cursor:pointer;margin:14px auto;display:flex;align-items:center;
  justify-content:center;transition:all .2s;animation:glow 2.5s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.2)}50%{box-shadow:0 0 28px rgba(255,215,0,.5)}}
.play-btn:active{transform:scale(.9)}
.listen-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.18);
  border-radius:8px;padding:12px 13px;color:var(--cream);font-size:15px;
  font-family:Georgia,serif;outline:none;resize:none}
.listen-input:focus{border-color:rgba(255,215,0,.38)}
.diff-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.diff-word{padding:2px 7px;border-radius:4px;font-size:13px;font-family:Georgia,serif}
.diff-ok{background:rgba(76,175,80,.15);color:#90EE90}
.diff-bad{background:rgba(139,0,0,.2);color:#ff9999}

/* SPEAKING */
.speak-prompt{font-size:15px;color:var(--cream);margin-bottom:14px;line-height:1.6;
  background:rgba(0,191,255,.04);border:1px solid rgba(0,191,255,.18);border-radius:9px;padding:13px}
.model-ans{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.18);
  border-radius:9px;padding:13px;margin-top:14px}
.model-lbl{font-size:10px;color:var(--gdim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.model-de{font-size:16px;color:var(--gold);font-family:Georgia,serif;margin-bottom:5px;line-height:1.5}
.model-en{font-size:12px;color:var(--slate);font-style:italic;margin-bottom:8px}
.breakdown{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.breakdown-item{font-size:12px;color:var(--cream);padding:3px 0;
  border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
.rate-btns{display:flex;gap:9px;margin-top:14px}
.rate-btn{flex:1;padding:11px;border-radius:8px;border:none;cursor:pointer;font-size:12px}
.rate-great{background:rgba(76,175,80,.15);border:1px solid var(--green);color:var(--green)}
.rate-ok{background:rgba(255,215,0,.08);border:1px solid var(--gdim);color:var(--gold)}
.rate-bad{background:rgba(139,0,0,.15);border:1px solid var(--burg);color:#ff9999}

/* BOSS */
.boss-arena{text-align:center;padding:16px 0}
.boss-emoji{font-size:60px;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.boss-name{font-size:17px;color:var(--burg);margin-bottom:14px;
  text-shadow:0 0 25px rgba(139,0,0,.5)}
.hp-wrap{margin-bottom:14px}
.hp-label{font-size:10px;color:var(--slate);display:flex;justify-content:space-between;margin-bottom:3px}
.hp-bar{height:7px;background:rgba(255,255,255,.08);border-radius:4px}
.hp-fill{height:100%;border-radius:4px;transition:width .5s ease}
.boss-hp{background:linear-gradient(90deg,var(--burg),#dd2200)}
.player-hp{background:linear-gradient(90deg,var(--green),#66ff66)}
.timer{font-size:26px;color:var(--gold);margin-bottom:12px;font-family:Georgia,serif}
.timer.warn{color:#ff4444;animation:tflash .5s infinite}
@keyframes tflash{0%,100%{opacity:1}50%{opacity:.4}}
.score-lbl{font-size:14px;color:var(--gold);margin-bottom:14px;font-family:Georgia,serif}

/* RECAP */
.recap-hdr{text-align:center;margin-bottom:18px}
.recap-title{font-size:19px;color:var(--gold)}
.recap-sub{font-size:12px;color:var(--slate);margin-top:5px}
.recap-warn{background:rgba(139,0,0,.12);border:1px solid rgba(139,0,0,.28);
  border-radius:8px;padding:10px 13px;font-size:12px;color:#ff9999;margin-bottom:14px}

/* SUMMARY */
.summary{text-align:center;padding:28px 16px}
.sum-emoji{font-size:60px;margin-bottom:14px}
.sum-title{font-size:22px;color:var(--gold);margin-bottom:6px}
.sum-sub{font-size:14px;color:var(--slate);margin-bottom:22px;font-style:italic}
.stats-row{display:flex;justify-content:center;gap:22px;margin-bottom:22px}
.stat{text-align:center}
.stat-val{font-size:26px;color:var(--gold);font-family:Georgia,serif}
.stat-key{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:1px}

/* BERTRAM COMPANION */
.companion{position:fixed;bottom:14px;right:14px;z-index:200;
  display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.bubble{background:rgba(16,0,48,.96);border:1px solid rgba(255,215,0,.25);
  border-radius:12px 12px 0 12px;padding:9px 13px;max-width:210px;
  font-size:12px;font-style:italic;color:var(--cream);line-height:1.5;
  animation:fadeIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.fox-btn{font-size:34px;cursor:pointer}

/* JOURNAL OVERLAY */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(7,0,26,.97);
  overflow-y:auto;animation:fadeIn .3s ease}
.overlay-hdr{padding:14px;border-bottom:1px solid rgba(255,215,0,.18);
  display:flex;align-items:center;gap:10px}
.overlay-title{font-size:17px;color:var(--gold);flex:1}
.close-btn{font-size:22px;cursor:pointer;color:var(--slate);padding:4px}
.overlay-body{padding:14px}

/* XP Burst */
.xp-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:30px;color:var(--gold);pointer-events:none;z-index:500;font-family:Georgia,serif;
  animation:burst 1s ease forwards}
@keyframes burst{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
  50%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}

/* DIVIDER */
.divider{height:1px;background:rgba(255,215,0,.09);margin:14px 0}
.section-lbl{font-size:10px;color:var(--slate);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:9px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:9px;padding:13px}
.text-center{text-align:center}
.text-gold{color:var(--gold)}
.text-slate{color:var(--slate);font-size:13px}
.text-green{color:var(--green)}

/* REPLACE METHOD */
.replace-sentence{font-size:17px;color:var(--cream);line-height:1.9;margin-bottom:14px;font-family:Georgia,serif}
.rslot{display:inline-block;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.38);
  border-radius:6px;padding:1px 9px;margin:0 2px;color:var(--gold);cursor:pointer;transition:all .2s}
.rslot.active{background:rgba(255,215,0,.22);box-shadow:0 0 10px rgba(255,215,0,.3)}
.replace-opts{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.ropt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.13);
  border-radius:20px;padding:5px 13px;font-size:13px;cursor:pointer;
  color:var(--cream);transition:all .2s;font-family:Georgia,serif}
.ropt:active{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.38)}
</style>
</head>
<body>
<div class="stars"></div>
<div class="app" id="app"></div>

<script>
// =====================================================================
// ZONE DATA — A1 Zones 1-16 (Complete)
// =====================================================================
const ZONES = [
{
  id:1,name:"Das Stille Tor von Lagos",sub:"Greetings & First Steps",
  level:"A1",emoji:"🌅",
  grammar:[
    {title:"Verb Second Position (V2)",
     rule:"The verb ALWAYS comes second in a German statement — no matter what comes first. Time, place, anything can be first, but the verb is always second.",
     de:"Heute lerne ich Deutsch.",en:"Today I learn German.",

    {q:"Connector: 'Das Niveau war hoch. ___ hinaus war es lang.'",opts:["Infolge","Demzufolge","Darüber","Dennoch"],c:2,exp:"Darüber hinaus = furthermore. Full two-word phrase: darüber hinaus."},
    {q:"Translate: 'Ich bin stolz auf meine Fortschritte.'",opts:["I am happy about my grades.","I am proud of my progress.","My progress makes me proud.","I am proud to progress."],c:1,exp:"stolz=proud, auf=on/about, Fortschritte=progress (plural)."},
    {q:"Which ending ALWAYS makes a noun feminine?",opts:["-chen","-ung","-lein","-er"],c:1,exp:"-ung ALWAYS = die. die Ausbildung, die Wohnung, die Lösung, die Verbindung. No exceptions!"}
  ]
}
];

// =====================================================================
const SAVE_KEY = 'schattenreich_a1_v1';

function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch { return {}; }
}
function doSave(state) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch {}
}

// =====================================================================
// AUDIO
// =====================================================================
function speak(text, rate=0.82) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=rate; u.pitch=1.05;
  const voices = window.speechSynthesis.getVoices();
  const de = voices.find(v=>v.lang.startsWith('de'));
  if (de) u.voice = de;
  window.speechSynthesis.speak(u);
}

// =====================================================================
// MAIN APP
// =====================================================================
class App {
  constructor() {
    const saved = loadSave();
    this.state = {
      screen: saved.screen||'start',
      zoneId: saved.zoneId||null,
      trialType: saved.trialType||null,
      xp: saved.xp||0,
      gold: saved.gold||0,
      level: saved.level||1,
      streak: saved.streak||0,
      lastDate: saved.lastDate||null,
      completed: saved.completed||{},   // { "z1_vocab": true, ... }
      bossDefeated: saved.bossDefeated||{},
      recapDone: saved.recapDone||{},
      unlockedHacks: saved.unlockedHacks||[],
      weakSpots: saved.weakSpots||{},
      bertramMsg: null,
      showJournal: false,
      burst: null
    };
    this.render();
    this.checkStreak();
  }

  checkStreak() {
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now()-86400000).toDateString();
    if (this.state.lastDate===today) return;
    const newStreak = this.state.lastDate===yesterday ? this.state.streak+1 : 1;
    this.setState({streak:newStreak, lastDate:today});
  }

  setState(updates, cb) {
    Object.assign(this.state, updates);
    doSave({
      screen:this.state.screen, zoneId:this.state.zoneId,
      xp:this.state.xp, gold:this.state.gold, level:this.state.level,
      streak:this.state.streak, lastDate:this.state.lastDate,
      completed:this.state.completed, bossDefeated:this.state.bossDefeated,
      recapDone:this.state.recapDone, unlockedHacks:this.state.unlockedHacks,
      weakSpots:this.state.weakSpots
    });
    this.render();
    if (cb) cb();
  }

  getZone(id) { return ZONES.find(z=>z.id===id); }
  isZoneDone(id) { return !!this.state.bossDefeated[id]; }
  isZoneUnlocked(id) {
    if (id===1) return true;
    return this.isZoneDone(id-1) && (id===1||this.state.recapDone[id]||id===1);
  }
  isTrialDone(zid, type) { return !!this.state.completed[`z${zid}_${type}`]; }
  completeTrial(zid, type, xpAmt=40, goldAmt=25) {
    const key = `z${zid}_${type}`;
    const newXP = this.state.xp + xpAmt;
    this.setState({
      completed: {...this.state.completed, [key]:true},
      xp: newXP, gold: this.state.gold+goldAmt,
      level: Math.floor(newXP/250)+1,
      burst: `+${xpAmt}XP`
    });
    setTimeout(()=>this.setState({burst:null}), 1100);
  }
  countCompletedTrials(zid) {
    const types = ['vocab','grammar','listen','speak','hacks'];
    return types.filter(t=>this.isTrialDone(zid,t)).length;
  }

  // =====================================================================
  // RENDER
  // =====================================================================
  render() {
    const {screen,zoneId,trialType,burst,showJournal,bertramMsg} = this.state;
    const app = document.getElementById('app');
    app.innerHTML = '';

    // HUD
    if (screen!=='start') {
      app.appendChild(this.renderHUD());
    }

    // Main content
    let content;
    if (screen==='start') content = this.renderStart();
    else if (screen==='map') content = this.renderMap();
    else if (screen==='zone') content = this.renderZone();
    else if (screen==='trial') content = this.renderTrial();
    else if (screen==='recap') content = this.renderRecap();
    else if (screen==='boss') content = this.renderBoss();
    else if (screen==='summary') content = this.renderSummary();
    else content = this.renderMap();

    app.appendChild(content);

    // Burst
    if (burst) {
      const b = document.createElement('div');
      b.className='xp-burst'; b.textContent=burst;
      app.appendChild(b);
    }

    // Journal overlay
    if (showJournal) app.appendChild(this.renderJournal());

    // Bertram companion
    if (screen!=='start') app.appendChild(this.renderCompanion());
  }

  renderHUD() {
    const {xp,gold,streak,level} = this.state;
    const xpForNext = level*250;
    const xpInLevel = xp - (level-1)*250;
    const pct = Math.min(100, Math.round((xpInLevel/250)*100));
    const div = document.createElement('div');
    div.className='hud';
    div.innerHTML=`
      <div class="hud-xp">
        <div class="hud-xp-label">
          <span style="font-size:11px;color:var(--gold)">Lvl ${level}</span>
          <span>${xp} XP</span>
        </div>
        <div class="hud-bar"><div class="hud-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="hud-gold">💰${gold}</div>
      <div class="hud-streak">${streak>0?'🔥'+streak:''}</div>
    `;
    return div;
  }

  renderStart() {
    const div = document.createElement('div');
    div.className='start screen';
    div.innerHTML=`

      <div class="start-title cinzel">Schattenreich</div>
      <div class="start-sub">Der Nigerianische Weg — A1</div>
      <div class="bertram-quote">
        76 zones stand between you and the Ausbildungsvertrag. The Germans built their language

      </div>
      <div class="start-info">

        <div class="info-card"><div class="info-val">48</div><div class="info-key">Hacks</div></div>
        <div class="info-card"><div class="info-val">100%</div><div class="info-key">Offline</div></div>
      </div>
      <button class="btn btn-gold" id="startBtn">BEGIN THE JOURNEY</button>
      <button class="btn btn-outline mt8" id="continueBtn" style="display:${this.state.xp>0?'block':'none'}">Continue Journey</button>

    setTimeout(()=>{
      div.querySelector('#startBtn').onclick = ()=>this.setState({screen:'map'});
      const cb = div.querySelector('#continueBtn');
      if (cb) cb.onclick = ()=>this.setState({screen:'map'});
    },0);

  }

  renderMap() {
    const div = document.createElement('div');
    div.className='screen';
    div.innerHTML=`
      <div class="map-title cinzel">🗺 Die Schattenkarte</div>
      <div class="map-sub">Lagos → Deutschland — A1 Path</div>
      <div class="level-sec">
        <div class="level-hdr">⚡ A1 — Die Nigerianische Wurzel (Zones 1-16)</div>
        <div class="zones-grid" id="zonesGrid"></div>
      </div>
    `;
    setTimeout(()=>{
      const grid = div.querySelector('#zonesGrid');
      ZONES.forEach(z=>{
        const done = this.isZoneDone(z.id);
        const isCurrent = !done && (z.id===1 || this.isZoneDone(z.id-1));
        const locked = !done && !isCurrent;
        const node = document.createElement('div');
        node.className=`zone-node ${done?'done':isCurrent?'current':'locked'}`;
        node.innerHTML=`<div class="zone-emoji">${z.emoji}</div><div class="zone-num">${z.id}</div>`;
        node.title=z.name;
        if (!locked) {
          node.onclick=()=>this.openZone(z.id);
        }
        grid.appendChild(node);
      });
    },0);
    return div;
  }

  openZone(id) {
    const done = this.isZoneDone(id);
    const isFirst = id===1;
    const prevDone = isFirst || this.isZoneDone(id-1);
    if (!prevDone) return;
    // Check if recap needed
    if (!isFirst && !this.state.recapDone[id] && !done) {
      this.setState({screen:'recap', zoneId:id});
      return;
    }
    this.setState({screen:'zone', zoneId:id, bertramMsg:this.getZoneGreeting(id)});
  }

  getZoneGreeting(id) {
    const greetings = {
      1:"Lagos to Germany starts with one word: Hallo. You know this one.",
      2:"Genders in German. Even the Germans sometimes forget them. You will not.",
      3:"Separable verbs. The prefix flies to the end. Like a boomerang.",
      4:"The accusative case. Only masculine changes. Remember: MASC-ulative.",
      5:"Dative prepositions. MIT NACH BEI VON ZU AUS SEIT. Chant it.",
      6:"IT vocabulary. This is where your superpower begins.",
      7:"Future tense. You will succeed. Ich werde erfolgreich sein.",
      8:"Comparatives. Billiger. Schneller. Besser. Your German, improving.",
      9:"Passive voice. Very common in IT documentation. Very important.",
      10:"Job applications. This is why you came.",
      11:"Your journey to Germany begins. You had prepared. Past perfect.",
      12:"Opinions. You have them. Now express them in German.",
      13:"IT documentation German. Your future workplace speaks this.",
      14:"Modal particles. The secret soul of German conversation.",
      15:"Integration. The real work begins here.",
      16:"A1 complete. The foundation is built. Onto A2."
    };
    return greetings[id] || "Another zone. Another step closer.";

  renderZone() {
    const zone = this.getZone(this.state.zoneId);

    const done = this.isZoneDone(zone.id);
    const completedCount = this.countCompletedTrials(zone.id);

    div.className='screen';
    div.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span id="backBtn" style="font-size:22px;cursor:pointer;color:var(--gold)">←</span>
        <span class="cinzel" style="font-size:14px;color:var(--gold)">Zone ${zone.id} / 16</span>
      </div>
      <div class="zone-hdr">
        <div class="zone-big-emoji">${zone.emoji}</div>
        <div class="zone-name cinzel">${zone.name}</div>
        <div class="zone-subtitle">${zone.sub}</div>
        <span class="zone-badge">${zone.level}</span>
        ${done?'<span class="zone-badge" style="background:rgba(76,175,80,.15);border-color:var(--green);color:var(--green);margin-left:6px">✓ COMPLETE</span>':''}
      </div>
      <div class="section-lbl">Grammar Focus</div>
      ${zone.grammar.map(g=>`
        <div class="gram-card">
          <div class="gram-title cinzel">${g.title}</div>
          <div class="gram-rule">${g.rule}</div>
          ${g.de?`<div class="gram-de">${g.de}</div><div class="gram-en">${g.en}</div>`:''}
          ${g.hack?`<div class="gram-hack">💡 ${g.hack}</div>`:''}
        </div>
      `).join('')}
      <div class="section-lbl mt16">Trials (${completedCount}/5)</div>
      <div class="trials-list">
        ${this.trialCard('vocab','📚','Satz-Speicher','Learn & practice 20 sentences',zone.id)}
        ${this.trialCard('grammar','⚡','Muster-Schmiede','Grammar puzzle solving',zone.id)}
        ${this.trialCard('listen','👂','Hör-Gewölbe','Listen & transcribe German',zone.id)}
        ${this.trialCard('speak','🗣️','Sprech-Halle','Speaking with model answers',zone.id)}
        ${this.trialCard('hacks','🦊','Hack Lab','Unlock Bertram\'s language hacks',zone.id)}
      </div>
      <div class="section-lbl">Boss Battle</div>
      <button class="btn ${canBoss||done?'btn-gold':'btn-outline'}" id="bossBtn" ${!canBoss&&!done?'disabled':''}>
        ${done?'⚔️ Replay Boss':'⚔️ Challenge Boss (10 questions, 85% to pass)'}
        ${!canBoss&&!done?'<br><span style="font-size:11px;opacity:.7">Complete 4 trials first</span>':''}
      </button>
    `;
    setTimeout(()=>{
      div.querySelector('#backBtn').onclick=()=>this.setState({screen:'map',zoneId:null});
      const bossBtn = div.querySelector('#bossBtn');

        bossBtn.onclick=()=>this.setState({screen:'boss',zoneId:zone.id});
      }
      div.querySelectorAll('.trial-card:not(.locked)').forEach(card=>{
        card.onclick=()=>{
          const type=card.dataset.trial;
          this.setState({screen:'trial',trialType:type});
        };
      });
    },0);
    return div;
  }

  trialCard(type, icon, name, desc, zid) {
    const done = this.isTrialDone(zid, type);
    return `<div class="trial-card ${done?'done':''}" data-trial="${type}">
      <div class="trial-icon">${icon}</div>
      <div class="trial-info">
        <div class="trial-name">${name}</div>
        <div class="trial-desc">${desc}</div>
      </div>
      <div class="trial-check">${done?'✅':'○'}</div>
    </div>`;
  }

  renderTrial() {
    const {trialType, zoneId} = this.state;
    const zone = this.getZone(zoneId);
    if (!zone) return this.renderMap();

    if (trialType==='vocab') return this.renderVocabTrial(zone);
    if (trialType==='grammar') return this.renderGrammarTrial(zone);
    if (trialType==='listen') return this.renderListenTrial(zone);
    if (trialType==='speak') return this.renderSpeakTrial(zone);
    if (trialType==='hacks') return this.renderHacksTrial(zone);
    return this.renderZone();
  }

  // =====================================================================
  // TRIAL: VOCAB (Satz-Speicher)
  // =====================================================================
  renderVocabTrial(zone) {
    const sentences = zone.sentences;
    let phase = 0; // 0=study, 1=replace, 2=quiz
    let cardIdx = 0;
    let quizIdx = 0;
    let answered = false;
    let score = 0;
    let selected = null;
    let currentSlotVal = null;

    const div = document.createElement('div');
    div.className='screen';

    const renderStudy = ()=>{
      const s = sentences[cardIdx];
      const hasSlot = !!s.slot;
      currentSlotVal = s.slot ? s.slot.word : null;
      div.innerHTML=`
        <div class="trial-hdr">
          <span class="t-back" id="back">←</span>
          <span class="t-title cinzel">📚 Satz-Speicher</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${((cardIdx+1)/Math.min(10,sentences.length))*100}%"></div></div>
        <p class="text-slate text-center mb8">Card ${cardIdx+1} of ${Math.min(10,sentences.length)} — Study phase</p>
        <div class="flashcard">
          <div class="fc-de" id="fcDe">${s.de.replace(/\[.*?\]/g,`<span class="rslot">${currentSlotVal||''}</span>`)}</div>
          <button class="speak-btn" id="speakBtn">🔊</button>
          <div class="fc-en">${s.en}</div>
          ${hasSlot?'<p style="font-size:11px;color:var(--fox);margin-top:8px">Tap the highlighted word to replace it</p>':''}
        </div>
        ${hasSlot?`<div class="replace-opts" id="replaceOpts">
          ${s.slot.alts.map(a=>`<button class="ropt" data-val="${a}">${a}</button>`).join('')}
        </div>`:''}
        <div class="flex-row mt16">
          ${cardIdx>0?`<button class="btn btn-outline flex1" id="prevBtn">← Prev</button>`:'<div class="flex1"></div>'}
          ${cardIdx<Math.min(9,sentences.length-1)
            ?`<button class="btn btn-gold flex1" id="nextBtn">Next →</button>`
            :`<button class="btn btn-gold flex1" id="quizBtn">Take Quiz →</button>`
          }
        </div>
      `;
      div.querySelector('#back').onclick=()=>this.setState({screen:'zone',trialType:null});
      div.querySelector('#speakBtn').onclick=()=>speak(sentences[cardIdx].de);
      if (hasSlot) {
        div.querySelectorAll('.ropt').forEach(btn=>{
          btn.onclick=()=>{
            currentSlotVal=btn.dataset.val;
            div.querySelector('#fcDe').innerHTML=sentences[cardIdx].de.replace(/\[.*?\]/g,`<span class="rslot active">${currentSlotVal}</span>`);
            speak(sentences[cardIdx].de.replace(/\[.*?\]/g,currentSlotVal));
          };
        });
      }
      const prevBtn=div.querySelector('#prevBtn');
      if (prevBtn) prevBtn.onclick=()=>{cardIdx--;renderStudy();};
      const nextBtn=div.querySelector('#nextBtn');
      if (nextBtn) nextBtn.onclick=()=>{cardIdx++;renderStudy();};
      const quizBtn=div.querySelector('#quizBtn');
      if (quizBtn) quizBtn.onclick=()=>renderQuiz();
    };

    const quizSentences = sentences.slice(0,5);
    const renderQuiz = ()=>{
      quizIdx=0; score=0; answered=false; selected=null;
      showQ();
    };
    const showQ = ()=>{
      if (quizIdx>=quizSentences.length) {
        // Done
        this.completeTrial(zone.id,'vocab',40,25);
        div.innerHTML=`
          <div class="summary">
            <div class="sum-emoji">📚</div>
            <div class="sum-title cinzel">Satz-Speicher Complete!</div>
            <div class="sum-sub">Score: ${score}/${quizSentences.length}</div>
            <div class="stats-row">
              <div class="stat"><div class="stat-val">${score}</div><div class="stat-key">Correct</div></div>
              <div class="stat"><div class="stat-val">${quizSentences.length-score}</div><div class="stat-key">Missed</div></div>
            </div>
            <button class="btn btn-gold" id="doneBtn">Return to Zone</button>
          </div>`;
        div.querySelector('#doneBtn').onclick=()=>this.setState({screen:'zone',trialType:null});
        return;
      }
      const s = quizSentences[quizIdx];
      // Generate options: correct = s.en, wrong = 3 random others
      const allEn = sentences.map(x=>x.en).filter(e=>e!==s.en);
      const wrongs = allEn.sort(()=>Math.random()-.5).slice(0,3);
      const opts = [s.en,...wrongs].sort(()=>Math.random()-.5);
      answered=false; selected=null;
      div.innerHTML=`
        <div class="trial-hdr">
          <span class="t-back" id="back">←</span>
          <span class="t-title cinzel">📚 Quiz</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(quizIdx/quizSentences.length)*100}%"></div></div>
        <div class="quiz-q">What does this mean?<br><span class="quiz-de">${s.de}</span></div>
        <div class="opts" id="opts">
          ${opts.map((o,i)=>`<button class="opt" data-idx="${i}" data-val="${o}">${o}</button>`).join('')}
        </div>
        <div id="fb"></div>
        ${answered?`<button class="btn btn-outline mt16" id="nextQ">Next →</button>`:''}
      `;
      div.querySelector('#back').onclick=()=>this.setState({screen:'zone',trialType:null});
      div.querySelectorAll('.opt').forEach(btn=>{
        btn.onclick=()=>{
          if (answered) return;
          answered=true; selected=btn.dataset.val;
          const isCorrect = btn.dataset.val===s.en;
          if (isCorrect) score++;
          btn.classList.add(isCorrect?'correct':'wrong');
          if (!isCorrect) div.querySelectorAll('.opt').forEach(b=>{ if (b.dataset.val===s.en) b.classList.add('correct'); });
          div.querySelector('#fb').innerHTML=`<div class="feedback ${isCorrect?'fb-ok':'fb-err'}">
            ${isCorrect?'✅ Correct!':'❌ The correct answer is: '+s.en}
            <div class="bertram">${isCorrect?getBR():getBW()}</div>
          </div>`;
          const nq = document.createElement('button');
          nq.className='btn btn-outline mt16'; nq.textContent=quizIdx<quizSentences.length-1?'Next →':'See Results';
          nq.onclick=()=>{quizIdx++;showQ();};
          div.querySelector('#fb').after(nq);
        };
      });
    };

    renderStudy();
    return div;
  }

  // =====================================================================
  // TRIAL: GRAMMAR (Muster-Schmiede)
  // =====================================================================
  renderGrammarTrial(zone) {
    const questions = zone.boss.slice(0,5); // Use first 5 boss questions for grammar practice
    let qIdx=0, score=0, answered=false;

    const div = document.createElement('div');
    div.className='screen';

    const showQ = ()=>{
      if (qIdx>=questions.length) {
        this.completeTrial(zone.id,'grammar',40,25);
        div.innerHTML=`
          <div class="summary">
            <div class="sum-emoji">⚡</div>
            <div class="sum-title cinzel">Muster-Schmiede Complete!</div>
            <div class="sum-sub">Grammar mastery: ${score}/${questions.length}</div>
            <button class="btn btn-gold mt16" id="doneBtn">Return to Zone</button>
          </div>`;
        div.querySelector('#doneBtn').onclick=()=>this.setState({screen:'zone',trialType:null});
        return;
      }
      const q = questions[qIdx];
      answered=false;
      div.innerHTML=`
        <div class="trial-hdr">
          <span class="t-back" id="back">←</span>
          <span class="t-title cinzel">⚡ Muster-Schmiede</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(qIdx/questions.length)*100}%"></div></div>
        <p class="text-slate mb8">Question ${qIdx+1} of ${questions.length} — Grammar Puzzle</p>
        <div class="quiz-q">${q.q}</div>
        <div class="opts">
          ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}
        </div>
        <div id="fb"></div>
      `;
      div.querySelector('#back').onclick=()=>this.setState({screen:'zone',trialType:null});
      div.querySelectorAll('.opt').forEach(btn=>{
        btn.onclick=()=>{
          if (answered) return;
          answered=true;
          const i=parseInt(btn.dataset.i);
          const correct=i===q.c;
          if (correct) score++;
          btn.classList.add(correct?'correct':'wrong');
          div.querySelectorAll('.opt')[q.c].classList.add('correct');
          div.querySelector('#fb').innerHTML=`
            <div class="feedback ${correct?'fb-ok':'fb-err'}">
              ${correct?'✅ Correct!':'❌ Wrong.'}
              <div style="margin-top:5px;font-size:13px;color:var(--cream)">${q.exp}</div>
              <div class="bertram">${correct?getBR():getBW()}</div>
            </div>`;
          const nq=document.createElement('button');
          nq.className='btn btn-outline mt16'; nq.textContent=qIdx<questions.length-1?'Next →':'See Results';
          nq.onclick=()=>{qIdx++;showQ();};
          div.querySelector('#fb').after(nq);
        };
      });
    };
    showQ();
    return div;
  }

  // =====================================================================
  // TRIAL: LISTENING (Hör-Gewölbe)
  // =====================================================================
  renderListenTrial(zone) {
    let idx=0, score=0;
    const sentences = zone.dictation;

    const div = document.createElement('div');
    div.className='screen';

    const showQ = ()=>{
      if (idx>=sentences.length) {
        this.completeTrial(zone.id,'listen',40,25);
        div.innerHTML=`
          <div class="summary">
            <div class="sum-emoji">👂</div>
            <div class="sum-title cinzel">Hör-Gewölbe Complete!</div>
            <div class="sum-sub">Listening score: ${score}/${sentences.length}</div>
            <button class="btn btn-gold mt16" id="doneBtn">Return to Zone</button>
          </div>`;
        div.querySelector('#doneBtn').onclick=()=>this.setState({screen:'zone',trialType:null});
        return;
      }
      const s = sentences[idx];
      div.innerHTML=`
        <div class="trial-hdr">
          <span class="t-back" id="back">←</span>
          <span class="t-title cinzel">👂 Hör-Gewölbe</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(idx/sentences.length)*100}%"></div></div>
        <p class="listen-hint">Press play, listen, then type what you hear</p>
        <div class="text-center">
          <button class="play-btn" id="playBtn">▶</button>
        </div>
        <textarea class="listen-input" id="userInput" rows="2" placeholder="Type what you heard in German..."></textarea>
        <div id="fb"></div>
        <button class="btn btn-gold mt16" id="checkBtn">Check Answer</button>
      `;
      div.querySelector('#back').onclick=()=>this.setState({screen:'zone',trialType:null});
      div.querySelector('#playBtn').onclick=()=>speak(s, 0.75);
      div.querySelector('#checkBtn').onclick=()=>{
        const input = div.querySelector('#userInput').value.trim();
        const clean = (str)=>str.toLowerCase().replace(/[.,!?;:]/g,'').replace(/\s+/g,' ').trim();
        const isOk = clean(input)===clean(s);
        if (isOk) score++;

        // Generate diff
        const inputWords = input.split(' ');
        const targetWords = s.split(' ');
        const diffHtml = targetWords.map((w,i)=>{
          const iw = inputWords[i]||'';
          const ok = iw.toLowerCase().replace(/[.,!?]/g,'')===w.toLowerCase().replace(/[.,!?]/g,'');
          return `<span class="diff-word ${ok?'diff-ok':'diff-bad'}">${w}</span>`;
        }).join(' ');

        div.querySelector('#fb').innerHTML=`
          <div class="feedback ${isOk?'fb-ok':'fb-err'}">
            ${isOk?'✅ Perfect!':'❌ Correct sentence:'}
            <div class="diff-row">${diffHtml}</div>
            <div class="bertram">${isOk?getBR():getBW()}</div>
          </div>`;
        const nBtn=document.createElement('button');
        nBtn.className='btn btn-outline mt16'; nBtn.textContent=idx<sentences.length-1?'Next →':'See Results';
        nBtn.onclick=()=>{idx++;showQ();};
        div.querySelector('#checkBtn').replaceWith(nBtn);
      };
    };
    showQ();
    return div;
  }

  // =====================================================================
  // TRIAL: SPEAKING (Sprech-Halle)
  // =====================================================================
  renderSpeakTrial(zone) {
    let idx=0, showModel=false;
    const prompts = zone.speaking;

    const div = document.createElement('div');
    div.className='screen';

    const showP = ()=>{
      if (idx>=prompts.length) {
        this.completeTrial(zone.id,'speak',40,25);
        div.innerHTML=`
          <div class="summary">
            <div class="sum-emoji">🗣️</div>
            <div class="sum-title cinzel">Sprech-Halle Complete!</div>
            <div class="sum-sub">Three speaking prompts completed.</div>
            <button class="btn btn-gold mt16" id="doneBtn">Return to Zone</button>
          </div>`;
        div.querySelector('#doneBtn').onclick=()=>this.setState({screen:'zone',trialType:null});
        return;
      }
      const p = prompts[idx];
      showModel=false;
      div.innerHTML=`
        <div class="trial-hdr">
          <span class="t-back" id="back">←</span>
          <span class="t-title cinzel">🗣️ Sprech-Halle</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${((idx)/prompts.length)*100}%"></div></div>
        <p class="text-slate mb8">Prompt ${idx+1} of ${prompts.length}</p>
        <div class="speak-prompt">${p.prompt}</div>
        <p class="text-slate mb8" style="margin-top:12px">Try to answer in German. Then tap "Show Model Answer" to compare.</p>
        <button class="btn btn-outline" id="modelBtn">Show Model Answer</button>
        <div id="modelArea"></div>
        <div id="rateArea"></div>
      `;
      div.querySelector('#back').onclick=()=>this.setState({screen:'zone',trialType:null});
      div.querySelector('#modelBtn').onclick=()=>{
        div.querySelector('#modelBtn').style.display='none';
        div.querySelector('#modelArea').innerHTML=`
          <div class="model-ans">
            <div class="model-lbl">Model Answer</div>
            <div class="model-de">${p.model}</div>
            <button class="speak-btn" id="speakModel">🔊</button>
            <div class="model-en">${p.en||''}</div>
            <div class="breakdown">
              ${p.breakdown.map(b=>`<div class="breakdown-item">→ ${b}</div>`).join('')}
            </div>
          </div>
        `;
        div.querySelector('#speakModel').onclick=()=>speak(p.model);
        div.querySelector('#rateArea').innerHTML=`
          <p class="text-slate mt16 mb8">How did your attempt compare?</p>
          <div class="rate-btns">
            <button class="rate-btn rate-great" data-r="3">😎 Great</button>
            <button class="rate-btn rate-ok" data-r="2">🙂 OK</button>
            <button class="rate-btn rate-bad" data-r="1">😬 Needs Work</button>
          </div>
        `;
        div.querySelectorAll('.rate-btn').forEach(btn=>{
          btn.onclick=()=>{idx++;showP();};
        });
      };
    };
    showP();
    return div;
  }

  // =====================================================================
  // TRIAL: HACKS LAB
  // =====================================================================
  renderHacksTrial(zone) {
    let hackIdx=0;
    const hacks = zone.hacks;

    const div = document.createElement('div');
    div.className='screen';

    const showHack = ()=>{
      if (hackIdx>=hacks.length) {
        this.completeTrial(zone.id,'hacks',50,30);
        // Unlock hacks
        hacks.forEach(h=>{
          const hid=`z${zone.id}_${h.title}`;
          if (!this.state.unlockedHacks.includes(hid)) {
            this.setState({unlockedHacks:[...this.state.unlockedHacks, hid]});
          }
        });
        div.innerHTML=`
          <div class="summary">
            <div class="sum-emoji">🦊</div>
            <div class="sum-title cinzel">Hacks Unlocked!</div>
            <div class="sum-sub">${hacks.length} new hacks added to Bertram's Journal</div>
            <button class="btn btn-gold mt16" id="doneBtn">Return to Zone</button>
          </div>`;
        div.querySelector('#doneBtn').onclick=()=>this.setState({screen:'zone',trialType:null});
        return;
      }
      const h = hacks[hackIdx];
      div.innerHTML=`
        <div class="trial-hdr">
          <span class="t-back" id="back">←</span>
          <span class="t-title cinzel">🦊 Hack Lab</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(hackIdx/hacks.length)*100}%"></div></div>
        <p class="text-slate mb8">Hack ${hackIdx+1} of ${hacks.length}</p>
        <div class="hack-card">
          <div class="hack-title">
            <span class="hack-icon">${h.icon}</span>
            <span>${h.title}</span>
            <span class="hack-new">NEW</span>
          </div>
          <div class="hack-rule">${h.rule}</div>
          <div class="hack-chips">${h.chips.map(c=>`<span class="chip">${c.replace(/→/g,'<span class="chip-hl">→</span>')}</span>`).join('')}</div>
        </div>
        <p class="text-slate mt16 mb8">Test this hack: which word uses this pattern?</p>
        ${this.hackPuzzle(h, hackIdx)}
        <div id="hackFb"></div>
        <button class="btn btn-gold mt16" id="nextHack" style="display:none">Next Hack →</button>
      `;
      div.querySelector('#back').onclick=()=>this.setState({screen:'zone',trialType:null});
      // Puzzle logic
      const ans = div.querySelectorAll('.hack-ans');
      ans.forEach(btn=>{
        btn.onclick=()=>{
          const correct=btn.dataset.correct==='true';
          btn.style.background=correct?'rgba(76,175,80,.2)':'rgba(139,0,0,.2)';
          btn.style.borderColor=correct?'var(--green)':'var(--burg)';
          div.querySelector('#hackFb').innerHTML=`
            <div class="feedback ${correct?'fb-ok':'fb-err'}">
              ${correct?'✅ You got it!':'❌ Try again — look at the examples above.'}
              <div class="bertram">${correct?getBR():getBW()}</div>
            </div>`;
          div.querySelector('#nextHack').style.display='block';
          div.querySelector('#nextHack').onclick=()=>{hackIdx++;showHack();};
        };
      });
    };

    showHack();
    return div;
  }

  hackPuzzle(hack, idx) {
    // Generate a simple multiple choice puzzle for each hack type
    const puzzles = [
      {q:"Which word uses the -en verb hack?", opts:["schön","machen","und","aber"], correct:1},
      {q:"Which word is always feminine due to -tion?", opts:["der Computer","das System","die Information","der Server"], correct:2},
      {q:"Which word ends in -ung (always die)?", opts:["das Haus","die Wohnung","der Mann","das Auto"], correct:1},
      {q:"Which is a separable verb?", opts:["sein","haben","aufstehen","werden"], correct:2},
      {q:"Which word uses -lich = -ly?", opts:["Haus","freundlich","Buch","Auto"], correct:1},
      {q:"halb drei = which time?", opts:["3:30","2:30","3:15","2:15"], correct:1},
      {q:"Which shows dative contraction?", opts:["in die Stadt","von dem Chef → vom Chef","durch den Park","für die Arbeit"], correct:1},
      {q:"Which IT word is the same in German?", opts:["Rechner","Fernseher","Server","Drucker"], correct:2},
    ];
    const p = puzzles[idx % puzzles.length];
    const optsHtml = p.opts.map((o,i)=>`
      <button class="opt hack-ans" data-correct="${i===p.correct}" style="margin-bottom:8px;width:100%;padding:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.13);border-radius:8px;cursor:pointer;font-size:14px;color:var(--cream);text-align:left">${o}</button>
    `).join('');
    return `<div class="quiz-q">${p.q}</div><div>${optsHtml}</div>`;
  }

  // =====================================================================
  // RECAP QUIZ
  // =====================================================================
  renderRecap() {
    const zoneId = this.state.zoneId;
    const prevZone = this.getZone(zoneId-1);
    if (!prevZone) { this.openZone(zoneId); return document.createElement('div'); }

    let qIdx=0, allCorrect=true;
    // Mix questions from previous zone boss
    const questions = [...prevZone.boss].sort(()=>Math.random()-.5).slice(0,8);
    let answered=false;

    const div=document.createElement('div');
    div.className='screen';

    const showQ=()=>{
      if (qIdx>=questions.length) {
        if (allCorrect) {
          this.setState({recapDone:{...this.state.recapDone,[zoneId]:true}});
          this.openZone(zoneId);
        } else {
          // Reset and retry
          qIdx=0; allCorrect=true;
          div.innerHTML=`
            <div class="recap-hdr">
              <div class="recap-title cinzel">Not quite.</div>
              <div class="recap-sub">You must score 100% on the recap. Bertram believes in you. Barely.</div>
            </div>
            <div class="recap-warn">❌ You had some errors. The previous zone must be mastered before advancing. Try again.</div>
            <button class="btn btn-gold" id="retryBtn">Retry Recap</button>
          `;
          div.querySelector('#retryBtn').onclick=()=>{
            qIdx=0;allCorrect=true;answered=false;showQ();
          };
        }
        return;
      }
      const q=questions[qIdx];
      answered=false;
      div.innerHTML=`
        <div class="recap-hdr">
          <div class="recap-title cinzel">📋 Daily Recap</div>
          <div class="recap-sub">Review Zone ${zoneId-1} before entering Zone ${zoneId} — 100% required</div>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(qIdx/questions.length)*100}%"></div></div>
        <div class="quiz-q">${q.q}</div>
        <div class="opts">
          ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}
        </div>
        <div id="fb"></div>
      `;
      div.querySelectorAll('.opt').forEach(btn=>{
        btn.onclick=()=>{
          if (answered) return;
          answered=true;
          const i=parseInt(btn.dataset.i);
          const correct=i===q.c;
          if (!correct) allCorrect=false;
          btn.classList.add(correct?'correct':'wrong');
          div.querySelectorAll('.opt')[q.c].classList.add('correct');
          div.querySelector('#fb').innerHTML=`
            <div class="feedback ${correct?'fb-ok':'fb-err'}">
              ${correct?'✅ Correct!':'❌ '+q.exp}
            </div>`;
          const nb=document.createElement('button');
          nb.className='btn btn-outline mt16';nb.textContent=qIdx<questions.length-1?'Next →':'Finish Recap';
          nb.onclick=()=>{qIdx++;showQ();};
          div.querySelector('#fb').after(nb);
        };
      });
    };
    showQ();
    return div;
  }

  // =====================================================================
  // BOSS BATTLE
  // =====================================================================
  renderBoss() {
    const zone=this.getZone(this.state.zoneId);
    if (!zone) return this.renderMap();

    let qIdx=0, bossHP=100, playerHP=100;
    let answered=false, score=0;
    let timer=45, timerInt=null;
    const questions=[...zone.boss].sort(()=>Math.random()-.5);

    const div=document.createElement('div');
    div.className='screen';

    const updateHP=()=>{
      const bf=div.querySelector('#bossHP');
      const pf=div.querySelector('#playerHP');
      if (bf) bf.style.width=bossHP+'%';
      if (pf) pf.style.width=playerHP+'%';
    };

    const showBossIntro=()=>{
      div.innerHTML=`
        <div class="boss-arena">
          <div class="boss-emoji">👹</div>
          <div class="boss-name cinzel">Der Wächter von ${zone.name}</div>
          <div class="hp-wrap">
            <div class="hp-label"><span>Boss HP</span><span>100%</span></div>
            <div class="hp-bar"><div class="hp-fill boss-hp" id="bossHP" style="width:100%"></div></div>
          </div>
          <div class="hp-wrap">
            <div class="hp-label"><span>Your HP</span><span>100%</span></div>
            <div class="hp-bar"><div class="hp-fill player-hp" id="playerHP" style="width:100%"></div></div>
          </div>
          <p style="color:var(--slate);font-size:13px;margin:12px 0">10 questions. 85% to pass (9/10). 45 seconds per question.</p>
          <button class="btn btn-danger" id="fightBtn">⚔️ FIGHT!</button>
          <button class="btn btn-outline mt8" id="backBtn">← Retreat</button>
        </div>
      `;
      div.querySelector('#fightBtn').onclick=()=>showQ();
      div.querySelector('#backBtn').onclick=()=>this.setState({screen:'zone'});
    };

    const showQ=()=>{
      if (qIdx>=questions.length) {
        clearInterval(timerInt);
        const passed=score>=9;
        if (passed) {
          this.setState({
            bossDefeated:{...this.state.bossDefeated,[zone.id]:true},
            xp:this.state.xp+200, gold:this.state.gold+150,
            level:Math.floor((this.state.xp+200)/250)+1
          });
        } else {
          this.setState({gold:Math.max(0,this.state.gold-40)});
        }
        showBossResult(passed);
        return;
      }
      const q=questions[qIdx];
      answered=false; timer=45;
      div.innerHTML=`
        <div class="boss-arena">
          <div class="boss-emoji" style="font-size:40px">👹</div>
          <div class="hp-wrap">
            <div class="hp-label"><span>Boss</span><span>${bossHP}%</span></div>
            <div class="hp-bar"><div class="hp-fill boss-hp" id="bossHP" style="width:${bossHP}%"></div></div>
          </div>
          <div class="hp-wrap">
            <div class="hp-label"><span>You</span><span>${playerHP}%</span></div>
            <div class="hp-bar"><div class="hp-fill player-hp" id="playerHP" style="width:${playerHP}%"></div></div>
          </div>
          <div class="timer ${timer<=10?'warn':''}" id="timerDisp">${timer}s</div>
          <div class="score-lbl">${score}/${qIdx} correct</div>
          <div class="quiz-q">${q.q}</div>
          <div class="opts">
            ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}
          </div>
          <div id="fb"></div>
        </div>
      `;
      clearInterval(timerInt);
      timerInt=setInterval(()=>{
        timer--;
        const td=div.querySelector('#timerDisp');
        if (td) {td.textContent=timer+'s';td.className='timer'+(timer<=10?' warn':'');}
        if (timer<=0) {
          clearInterval(timerInt);
          if (!answered) {
            answered=true;
            playerHP=Math.max(0,playerHP-10);
            updateHP();
            div.querySelector('#fb').innerHTML=`<div class="feedback fb-err">⏰ Time's up! ${q.exp}</div>`;
            setTimeout(()=>{qIdx++;showQ();},1500);
          }
        }
      },1000);
      div.querySelectorAll('.opt').forEach(btn=>{
        btn.onclick=()=>{
          if (answered) return;
          answered=true;
          clearInterval(timerInt);
          const i=parseInt(btn.dataset.i);
          const correct=i===q.c;
          if (correct){score++;bossHP=Math.max(0,bossHP-10);}
          else{playerHP=Math.max(0,playerHP-10);}
          btn.classList.add(correct?'correct':'wrong');
          div.querySelectorAll('.opt')[q.c].classList.add('correct');
          updateHP();
          div.querySelector('#fb').innerHTML=`
            <div class="feedback ${correct?'fb-ok':'fb-err'}">
              ${correct?'⚔️ Hit!':'💥 Blocked! '+q.exp}
              <div class="bertram">${correct?getBR():getBW()}</div>
            </div>`;
          setTimeout(()=>{qIdx++;showQ();},1800);
        };
      });
    };

    const showBossResult=(passed)=>{
      div.innerHTML=`
        <div class="summary">
          <div class="sum-emoji">${passed?'🏆':'💀'}</div>
          <div class="sum-title cinzel">${passed?'Victory!':'Defeated'}</div>
          <div class="sum-sub">${passed?`Zone ${zone.id} complete! +200XP +150 Gold`:`${score}/10 — Need 9 to pass. -40 Gold`}</div>
          <div class="stats-row">
            <div class="stat"><div class="stat-val">${score}</div><div class="stat-key">Correct</div></div>
            <div class="stat"><div class="stat-val">${10-score}</div><div class="stat-key">Missed</div></div>
          </div>
          ${passed?`<div class="feedback fb-ok" style="margin-bottom:16px">
            ${zone.id===16?"🎉 A1 Complete! You've built your foundation. A2 awaits — coming soon!":`Zone ${zone.id+1} unlocked! Continue your journey.`}
          </div>`:''}
          <button class="btn btn-gold" id="contBtn">${passed?'Continue →':'Try Again'}</button>
          <button class="btn btn-outline mt8" id="mapBtn">Back to Map</button>
        </div>
      `;
      div.querySelector('#contBtn').onclick=()=>{
        if (passed && zone.id<16) {
          this.setState({screen:'map', zoneId:null});
        } else {
          this.setState({screen:'zone'});
        }
      };
      div.querySelector('#mapBtn').onclick=()=>this.setState({screen:'map',zoneId:null});
    };

    showBossIntro();
    return div;
  }

  // =====================================================================
  // JOURNAL OVERLAY
  // =====================================================================
  renderJournal() {
    const div=document.createElement('div');
    div.className='overlay';
    const unlocked=this.state.unlockedHacks;
    const allHacks=ZONES.flatMap(z=>z.hacks.map(h=>({...h,zoneId:z.id,zoneName:z.name})));
    const unlockedSet=new Set(unlocked);
    div.innerHTML=`
      <div class="overlay-hdr">
        <span class="overlay-title cinzel">🦊 Bertram's Hack Journal</span>
        <span class="close-btn" id="closeJ">✕</span>
      </div>
      <div class="overlay-body">
        <p class="text-slate mb16">${unlocked.length} hacks collected · Complete Zone 5 trials to unlock more</p>
        ${allHacks.map(h=>{
          const hid=`z${h.zoneId}_${h.title}`;
          const isUnlocked=unlockedSet.has(hid);
          return `<div class="hack-card" style="${!isUnlocked?'opacity:.35;filter:blur(1px)':''}">
            <div class="hack-title">
              <span class="hack-icon">${h.icon}</span>
              <span>${h.title}</span>
              ${isUnlocked?'<span class="hack-new">UNLOCKED</span>':'<span style="font-size:10px;color:var(--slate)">Zone ${h.zoneId}</span>'}
            </div>
            ${isUnlocked?`<div class="hack-rule">${h.rule}</div>
            <div class="hack-chips">${h.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`
            :`<div class="hack-rule" style="filter:blur(3px)">Complete Zone ${h.zoneId} Hack Lab to unlock</div>`}
          </div>`;
        }).join('')}
      </div>
    `;
    div.querySelector('#closeJ').onclick=()=>this.setState({showJournal:false});
    return div;
  }

  // =====================================================================
  // BERTRAM COMPANION
  // =====================================================================
  renderCompanion() {
    const div=document.createElement('div');
    div.className='companion';
    if (this.state.bertramMsg) {
      const bubble=document.createElement('div');
      bubble.className='bubble';
      bubble.textContent=this.state.bertramMsg;
      div.appendChild(bubble);
    }
    const fox=document.createElement('div');
    fox.className='fox-btn';
    fox.textContent='🦊';
    fox.onclick=()=>this.setState({showJournal:true});
    div.appendChild(fox);
    return div;
  }

  // =====================================================================
  // SUMMARY (not used yet but ready)
  // =====================================================================
  renderSummary() { return this.renderMap(); }
}

window.addEventListener('load', ()=>{
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>{};
  }
  new App();
});
</script>
